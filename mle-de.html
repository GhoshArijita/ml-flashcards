<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>ML &amp; Data Engineering · Flashcards</title>
<style>
  :root{
    --bg:#eef2f7; --surface:#ffffff; --ink:#0f1b2d; --muted:#5b6878; --faint:#8a96a6;
    --line:#e3e8ef; --line-soft:#eef1f6;
    --accent:#0891b2; --accent-dark:#076e87; --accent-soft:#e2f6fb;
    --green:#0f9d58; --green-soft:#e6f6ec; --red:#e0443e; --red-soft:#fdecea;
    --shadow:0 10px 30px rgba(17,34,64,.10); --shadow-lg:0 24px 60px rgba(17,34,64,.16);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;
    display:flex; flex-direction:column; height:100dvh; overflow:hidden;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  /* ---- top app bar ---- */
  .appbar{display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--surface);
    border-bottom:1px solid var(--line); flex:0 0 auto}
  .appbar a.home{display:inline-flex; align-items:center; gap:6px; color:var(--muted); text-decoration:none;
    font-size:13px; font-weight:600; padding:6px 8px; border-radius:8px}
  .appbar a.home:hover{background:var(--line-soft); color:var(--ink)}
  .appbar .deck{min-width:0}
  .appbar .deck h1{font-size:15px; margin:0; font-weight:700; letter-spacing:-.2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .appbar .deck .sub{font-size:11px; color:var(--faint); margin-top:1px}
  .appbar .spacer{flex:1}
  .ghost{background:var(--surface); border:1px solid var(--line); color:var(--muted); border-radius:9px;
    padding:7px 11px; font-size:12px; font-weight:600; cursor:pointer; display:inline-flex; gap:5px; align-items:center; white-space:nowrap}
  .ghost:hover{border-color:#cfd8e3; color:var(--ink)}
  .ghost:active{transform:scale(.97)}
  /* ---- controls ---- */
  .controls{padding:12px 16px 4px; flex:0 0 auto}
  select,input{background:var(--surface); border:1px solid var(--line); color:var(--ink); border-radius:10px;
    padding:10px 12px; font-size:14px; outline:none; -webkit-appearance:none}
  select:focus,input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .searchrow{display:flex; gap:8px}
  .searchrow input{flex:1; min-width:0}
  .searchrow .go{background:var(--accent); color:#fff; border:none; border-radius:10px; padding:10px 16px;
    font-size:14px; font-weight:600; cursor:pointer}
  .searchrow .go:active{transform:scale(.97); background:var(--accent-dark)}
  .row2{display:flex; gap:8px; margin-top:8px}
  .row2 select{flex:1; min-width:0}
  .pills{display:flex; gap:7px; margin-top:10px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px}
  .pill{flex:0 0 auto; background:var(--surface); border:1px solid var(--line); color:var(--muted);
    border-radius:99px; padding:7px 13px; font-size:12.5px; font-weight:600; cursor:pointer; display:flex; gap:6px; align-items:center}
  .pill .c{font-weight:800; color:var(--ink)}
  .pill.active{background:var(--accent); border-color:var(--accent); color:#fff}
  .pill.active .c{color:#fff}
  .progresswrap{margin-top:11px}
  .bar{height:8px; background:#dde4ee; border-radius:99px; overflow:hidden}
  .bar > i{display:block; height:100%; width:0; border-radius:99px;
    background:linear-gradient(90deg,var(--accent),var(--green)); transition:width .35s ease}
  .stats{display:flex; justify-content:space-between; font-size:11.5px; color:var(--muted); margin-top:7px; font-weight:600}
  /* ---- card stage ---- */
  .stage{flex:1 1 auto; position:relative; display:flex; align-items:center; justify-content:center; padding:10px 16px 4px}
  .deckwrap{position:relative; width:100%; max-width:460px; height:100%; max-height:580px}
  .card{position:absolute; inset:0; border-radius:20px; background:var(--surface); color:var(--ink);
    box-shadow:var(--shadow-lg); border:1px solid var(--line); cursor:pointer; user-select:none;
    transition:transform .12s ease, opacity .2s ease; will-change:transform; touch-action:pan-y}
  .card.flipped .inner{transform:rotateY(180deg)}
  .inner{position:absolute; inset:0; transition:transform .55s cubic-bezier(.2,.7,.2,1); transform-style:preserve-3d}
  .face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
    border-radius:20px; padding:24px 24px 20px; display:flex; flex-direction:column; overflow:hidden}
  .back{transform:rotateY(180deg); background:var(--surface)}
  .meta{display:flex; align-items:center; justify-content:space-between; gap:8px}
  .section{font-size:11px; font-weight:800; letter-spacing:.7px; text-transform:uppercase; color:var(--accent)}
  .badge{font-size:10px; font-weight:800; letter-spacing:.4px; padding:4px 9px; border-radius:99px;
    background:var(--accent-soft); color:var(--accent-dark); white-space:nowrap}
  .badge.REF{background:#fef0e4; color:#b5651d}
  .state-dot{font-size:10px; font-weight:800; padding:3px 9px; border-radius:99px}
  .state-known{background:var(--green-soft); color:#0f7a45}
  .state-review{background:var(--red-soft); color:#c2362f}
  .num{font-size:11px; color:var(--faint); font-weight:700}
  .front .title{font-size:clamp(23px,6.6vw,33px); font-weight:800; line-height:1.16; margin:auto 0;
    letter-spacing:-.4px; color:var(--ink)}
  .hint{font-size:11px; color:var(--faint); text-align:center; margin-top:8px; font-weight:600}
  .back .scroll{overflow:auto; -webkit-overflow-scrolling:touch; margin-top:12px; padding-right:2px}
  .back .title{font-size:18px; font-weight:800; margin:2px 0 2px; color:var(--ink)}
  .label{font-size:10px; font-weight:800; letter-spacing:.9px; color:var(--accent); text-transform:uppercase; margin:15px 0 5px}
  .body{font-size:15px; line-height:1.55; color:#243244}
  .refbody{font-size:13.5px; line-height:1.6; color:#243244}
  .refbody .row{padding:7px 0; border-bottom:1px solid var(--line-soft)}
  .refbody .row:last-child{border-bottom:0}
  .refbody .k{font-weight:800; color:var(--ink)}
  mark{background:#fff1a8; color:inherit; padding:0 2px; border-radius:3px}
  .stamp{position:absolute; top:22px; font-size:23px; font-weight:900; letter-spacing:1px;
    padding:6px 13px; border-radius:10px; border:3px solid; opacity:0; transform:rotate(-11deg); pointer-events:none}
  .stamp.know{left:20px; color:var(--green); border-color:var(--green)}
  .stamp.dont{right:20px; color:var(--red); border-color:var(--red)}
  /* ---- footer actions ---- */
  .footer{flex:0 0 auto; padding:8px 16px calc(14px + env(safe-area-inset-bottom)); display:flex;
    align-items:center; justify-content:center; gap:16px}
  .fab{width:60px; height:60px; border-radius:50%; border:none; font-size:23px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); color:#fff}
  .fab:active{transform:scale(.92)}
  .fab.no{background:var(--red)}
  .fab.flip{width:50px; height:50px; font-size:17px; background:var(--surface); color:var(--muted); border:1px solid var(--line)}
  .fab.yes{background:var(--green)}
  .fab.undo{width:46px; height:46px; font-size:17px; background:var(--surface); color:var(--muted); border:1px solid var(--line)}
  .fab.undo:disabled{opacity:.4; cursor:default}
  .empty{position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; color:var(--ink); padding:30px}
  .empty h2{margin:0 0 8px; font-size:22px}
  .empty p{margin:0 0 18px; color:var(--muted); font-size:14px; line-height:1.5}
  .empty button{background:var(--accent); color:#fff; border:none; padding:12px 22px; border-radius:11px; font-size:15px; font-weight:600; cursor:pointer}
  .toast{position:fixed; left:50%; bottom:94px; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:9px 15px; border-radius:10px; font-size:13px; font-weight:600;
    opacity:0; pointer-events:none; transition:.25s; z-index:30}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="appbar">
  <a class="home" href="index.html">← All decks</a>
  <div class="deck">
    <h1>ML &amp; Data Engineering</h1>
    <div class="sub" id="subline">Ingestion → compute → features → pipelines → serving → MLOps → monitoring → streaming</div>
  </div>
  <div class="spacer"></div>
  <button class="ghost" id="shuffleBtn" title="Shuffle">🔀 Shuffle</button>
</div>

<div class="controls">
  <div class="searchrow">
    <input id="searchInput" type="search" enterkeyhint="search"
       placeholder="Search by number or keyword…" aria-label="Search by number or keyword">
    <button class="go" id="goBtn">Go</button>
  </div>
  <div class="row2"><select id="sectionSel" aria-label="Filter by section"></select></div>
  <div class="pills" id="pills">
    <button class="pill active" data-pile="ALL">All <span class="c" id="cAll">0</span></button>
    <button class="pill" data-pile="new">New <span class="c" id="cNew">0</span></button>
    <button class="pill" data-pile="review">Review <span class="c" id="cReview">0</span></button>
    <button class="pill" data-pile="known">Known <span class="c" id="cKnown">0</span></button>
  </div>
  <div class="progresswrap">
    <div class="bar"><i id="barFill"></i></div>
    <div class="stats"><span id="statMastered">Mastered 0</span><span id="statPos">0 / 0</span></div>
  </div>
</div>

<div class="stage">
  <div class="deckwrap" id="deck"></div>
  <div class="empty" id="empty">
    <h2>🎉 All done!</h2>
    <p id="emptyMsg">You've gone through every card in this view.</p>
    <button id="restartBtn">Study again</button>
  </div>
</div>

<div class="footer">
  <button class="fab undo" id="undoBtn" title="Undo last swipe" disabled>↶</button>
  <button class="fab no" id="noBtn" title="Review later">✗</button>
  <button class="fab flip" id="flipBtn" title="Flip">⟳</button>
  <button class="fab yes" id="yesBtn" title="Got it">✓</button>
</div>
<div class="toast" id="toast"></div>

<script>
const CARDS = [{"n": 1, "cardNo": 1, "type": "concept", "section": "Data Engineering Foundations", "difficulty": "FOUNDATIONS", "title": "Batch vs Stream Processing", "whatItIs": "Batch processing runs a computation over a bounded, stored dataset on a schedule. Stream processing runs continuously over an unbounded sequence of events as they arrive. The right choice depends on acceptable latency and data arrival patterns.", "example": "Nightly churn model retraining on yesterday's transactions = batch. Flagging a fraudulent card transaction within 50 ms of swipe = stream."}, {"n": 2, "cardNo": 2, "type": "concept", "section": "Data Engineering Foundations", "difficulty": "FOUNDATIONS", "title": "Data Lake", "whatItIs": "A storage repository that holds raw data in its native format (files: Parquet, JSON, CSV, images) at any scale. Schema is applied on read, not write, making it flexible but requiring discipline to avoid becoming a 'data swamp'.", "example": "S3 bucket containing raw clickstream JSON, raw DICOM images, and CSVs from a CRM -- all ingested as-is, transformed only when consumed by a pipeline."}, {"n": 3, "cardNo": 3, "type": "concept", "section": "Data Engineering Foundations", "difficulty": "FOUNDATIONS", "title": "Data Warehouse", "whatItIs": "A columnar, schema-on-write store optimized for analytical queries (OLAP). Data is cleaned and modeled before loading. Typically holds structured, historical data and is the source of truth for BI dashboards and batch ML features.", "example": "Snowflake or BigQuery holding a star-schema fact_transactions table joined to dim_customer -- used to train a monthly churn model."}, {"n": 4, "cardNo": 4, "type": "concept", "section": "Data Engineering Foundations", "difficulty": "FOUNDATIONS", "title": "Data Lakehouse", "whatItIs": "An architecture that adds ACID transactions, schema enforcement, and SQL access directly on top of cloud object storage, combining the flexibility of a lake with the reliability of a warehouse. Implemented via open table formats.", "example": "Delta Lake on S3: raw Parquet files gain ACID guarantees, time-travel, and Z-order clustering -- queried by Spark or Trino without copying to a separate warehouse."}, {"n": 5, "cardNo": 5, "type": "concept", "section": "Data Engineering Foundations", "difficulty": "FOUNDATIONS", "title": "Open Table Formats (Delta, Iceberg, Hudi)", "whatItIs": "Metadata layers sitting above object storage that add transactional semantics to Parquet files: ACID commits, schema evolution, partition pruning, and time-travel. Delta Lake (Databricks), Apache Iceberg (Netflix/Apple origin), and Apache Hudi (Uber origin) are the three dominant formats.", "example": "With Iceberg, you can ALTER TABLE to add a column and query data as it existed last Tuesday -- without locking or copying files."}, {"n": 6, "cardNo": 6, "type": "concept", "section": "Data Engineering Foundations", "difficulty": "FOUNDATIONS", "title": "Partitioning", "whatItIs": "Physically grouping data files by the value of one or more columns (e.g., date, region) so that queries filtering on those columns only read the relevant files. Eliminates full-table scans; critical for large-scale analytics and feature computation.", "example": "Partitioning a transactions table by year/month means a query for Jan 2024 reads only 1/36th of a 3-year dataset."}, {"n": 7, "cardNo": 7, "type": "concept", "section": "Data Engineering Foundations", "difficulty": "FOUNDATIONS", "title": "Columnar Storage (Parquet / ORC)", "whatItIs": "File formats that store all values of each column together rather than row-by-row. This dramatically improves analytical query performance (only relevant columns are read) and compresses better because values in a column are often similar.", "example": "A SELECT AVG(amount) on a 100-column Parquet table reads only the 'amount' column bytes from disk -- ~100x less I/O than a CSV."}, {"n": 8, "cardNo": 8, "type": "concept", "section": "Data Engineering Foundations", "difficulty": "FOUNDATIONS", "title": "ETL vs ELT", "whatItIs": "ETL (Extract-Transform-Load) transforms data before loading it into the destination. ELT (Extract-Load-Transform) loads raw data first and transforms it inside the warehouse using SQL. ELT is dominant in cloud data warehouses where compute is cheap at scale.", "example": "dbt is an ELT tool: data lands raw in BigQuery, then dbt runs SQL models to produce cleaned, modeled tables inside the same warehouse."}, {"n": 9, "cardNo": 9, "type": "concept", "section": "Data Engineering Foundations", "difficulty": "FOUNDATIONS", "title": "Data Catalog", "whatItIs": "A metadata repository that indexes datasets, their schemas, owners, freshness, lineage, and usage. Enables data discovery, governance, and trust. Without a catalog, engineers waste time reverse-engineering tables from code.", "example": "Datahub or Apache Atlas showing that 'feature_store.customer_rfm' is owned by the growth team, last updated 6 hours ago, and derived from raw_orders."}, {"n": 10, "cardNo": 10, "type": "concept", "section": "Data Engineering Foundations", "difficulty": "FOUNDATIONS", "title": "Data Lineage", "whatItIs": "A record of where each dataset came from and how it was transformed -- the full upstream -> downstream graph of data dependencies. Essential for debugging data quality issues, assessing the blast radius of a schema change, and regulatory audits.", "example": "When a fraud model's AUC drops, lineage shows that the 'merchant_category' feature trace back to a raw table that had a schema change three days ago."}, {"n": 11, "cardNo": 11, "type": "concept", "section": "Ingestion Patterns & Pipelines", "difficulty": "DATA ENGINEERING", "title": "Change Data Capture (CDC)", "whatItIs": "A technique for tracking row-level changes (INSERT, UPDATE, DELETE) in a source database and streaming them downstream in near-real-time, typically by reading the database's write-ahead log (WAL). Avoids full-table dumps and enables low-latency sync.", "example": "Debezium reads Postgres WAL and publishes every customer record change to a Kafka topic -- the data warehouse stays in sync within seconds without a nightly bulk export."}, {"n": 12, "cardNo": 12, "type": "concept", "section": "Ingestion Patterns & Pipelines", "difficulty": "DATA ENGINEERING", "title": "Message Queue vs Event Log", "whatItIs": "A message queue (RabbitMQ, SQS) delivers each message to exactly one consumer and deletes it after acknowledgment -- point-to-point, ephemeral. An event log (Kafka, Kinesis) is a durable, ordered, replayable sequence readable by many consumers independently.", "example": "Use SQS to dispatch one payment task to one worker. Use Kafka so both a fraud model and a feature store can independently consume the same payment event stream."}, {"n": 13, "cardNo": 13, "type": "concept", "section": "Ingestion Patterns & Pipelines", "difficulty": "DATA ENGINEERING", "title": "Apache Kafka", "whatItIs": "A distributed, partitioned, replicated event log. Producers append events to topics; consumers read from any offset. Retention is configurable (hours to forever). Kafka's durability and throughput (millions of events/sec) make it the backbone of real-time data platforms.", "example": "A topic 'user_events' with 12 partitions lets 12 consumer-group members read in parallel; a new ML feature pipeline joins the same topic independently without affecting existing consumers."}, {"n": 14, "cardNo": 14, "type": "concept", "section": "Ingestion Patterns & Pipelines", "difficulty": "DATA ENGINEERING", "title": "Kafka Partitions and Ordering", "whatItIs": "Within a Kafka partition, events are totally ordered. Across partitions, there is no ordering guarantee. Producers route events to partitions by key (e.g., user_id) so all events for a given entity land in the same partition and stay ordered.", "example": "Keying payment events by account_id ensures all transactions for account 42 arrive in order to the same consumer -- necessary for a running balance feature."}, {"n": 15, "cardNo": 15, "type": "concept", "section": "Ingestion Patterns & Pipelines", "difficulty": "DATA ENGINEERING", "title": "Idempotent Writes", "whatItIs": "A write operation that can be applied multiple times with the same effect as applying it once. Critical in distributed pipelines where failures cause retries. Achieved via upserts, deduplication keys, or exactly-once semantics in the messaging layer.", "example": "An ingestion job uses INSERT ... ON CONFLICT (event_id) DO NOTHING -- so replaying a batch of events after a crash never creates duplicate rows."}, {"n": 16, "cardNo": 16, "type": "concept", "section": "Ingestion Patterns & Pipelines", "difficulty": "DATA ENGINEERING", "title": "Exactly-Once Semantics", "whatItIs": "A guarantee that each message is processed and its effects are applied exactly one time -- no duplicates, no losses. Harder than at-least-once (may duplicate) or at-most-once (may lose). Kafka achieves this with idempotent producers and transactional APIs.", "example": "A Kafka Streams job that aggregates click counts writes results transactionally: if the job crashes and restarts, counts are not double-counted."}, {"n": 17, "cardNo": 17, "type": "concept", "section": "Ingestion Patterns & Pipelines", "difficulty": "DATA ENGINEERING", "title": "Watermark (Streaming)", "whatItIs": "A declared threshold in event-time processing that tells the streaming engine 'no events with timestamp before T will arrive.' It allows the engine to close windows and emit results without waiting forever for late data. Watermarks trade latency for completeness.", "example": "A watermark of 10 minutes on a clickstream means the engine closes the 14:00-14:05 window at event-time 14:15, accepting up to 10 min of late arrivals."}, {"n": 18, "cardNo": 18, "type": "concept", "section": "Ingestion Patterns & Pipelines", "difficulty": "DATA ENGINEERING", "title": "Event Time vs Processing Time", "whatItIs": "Event time is when the event actually occurred (embedded in the payload). Processing time is when the streaming engine sees it. They differ because of network delays, mobile offline buffering, and log replay. ML feature pipelines must use event time to avoid lookahead bias.", "example": "A mobile click logged at 14:02 but received by Kafka at 14:11 has event_time=14:02, processing_time=14:11 -- a session window must use event_time to correctly group user activity."}, {"n": 19, "cardNo": 19, "type": "concept", "section": "Ingestion Patterns & Pipelines", "difficulty": "DATA ENGINEERING", "title": "Schema Registry", "whatItIs": "A service that stores and versions message schemas (Avro, Protobuf, JSON Schema) for Kafka topics. Producers register schemas; consumers fetch them by ID embedded in each message. Prevents breaking changes from silently corrupting downstream pipelines.", "example": "Confluent Schema Registry rejects a producer that tries to remove a required field from the 'payments' Avro schema -- protecting the fraud model that depends on that field."}, {"n": 20, "cardNo": 20, "type": "concept", "section": "Ingestion Patterns & Pipelines", "difficulty": "DATA ENGINEERING", "title": "Batch Ingestion with Airflow", "whatItIs": "Apache Airflow schedules and orchestrates batch data pipelines as DAGs (Directed Acyclic Graphs). Each node is an operator (SQL, Python, Spark, etc.). Airflow manages dependencies, retries, alerting, and backfills -- the most widely deployed batch orchestrator.", "example": "A DAG with four tasks: extract from Postgres -> upload to S3 -> run dbt model -> refresh BI cache -- runs nightly at 02:00 with email alert on failure."}, {"n": 21, "cardNo": 21, "type": "concept", "section": "Compute & Distributed Processing", "difficulty": "DATA ENGINEERING", "title": "Apache Spark", "whatItIs": "A distributed, in-memory processing engine for batch and streaming workloads. Programs are expressed as transformations on RDDs or DataFrames; Spark compiles them into a DAG of tasks distributed across a cluster. The dominant large-scale ML preprocessing and feature engineering tool.", "example": "Computing 90-day rolling purchase totals for 50 million customers in under 10 minutes using Spark on a 20-node cluster -- impossible on a single machine."}, {"n": 22, "cardNo": 22, "type": "concept", "section": "Compute & Distributed Processing", "difficulty": "DATA ENGINEERING", "title": "Spark Lazy Evaluation", "whatItIs": "Spark builds a logical plan of transformations but does not execute until an action (collect, write, count) is called. This allows the Catalyst optimizer to reorder, prune, and fuse operations before execution, often dramatically reducing computation.", "example": "A chain of 10 .filter() and .select() calls does not run a single job until .write() is called -- at which point Spark may eliminate several unnecessary steps."}, {"n": 23, "cardNo": 23, "type": "concept", "section": "Compute & Distributed Processing", "difficulty": "DATA ENGINEERING", "title": "Shuffle", "whatItIs": "The most expensive Spark operation: redistributing data across all partitions for operations like groupBy, join, or sort. Shuffle writes intermediate data to disk and sends it over the network. Minimizing shuffle (via partitioning and broadcast joins) is the #1 Spark tuning lever.", "example": "A join between a 500 GB transactions table and a 10 MB lookup table should use broadcast join -- pushing the small table to all nodes avoids a full shuffle of the large one."}, {"n": 24, "cardNo": 24, "type": "concept", "section": "Compute & Distributed Processing", "difficulty": "DATA ENGINEERING", "title": "Broadcast Join", "whatItIs": "A Spark join strategy where the smaller table is replicated (broadcast) to every executor, so each executor can join its local partition of the large table without any data movement across the network. Auto-triggered when the small table is below spark.sql.autoBroadcastJoinThreshold.", "example": "broadcast(dim_product) in a join against 2 TB fact_sales eliminates shuffle entirely -- join time drops from 40 minutes to 4."}, {"n": 25, "cardNo": 25, "type": "concept", "section": "Compute & Distributed Processing", "difficulty": "DATA ENGINEERING", "title": "Spark Structured Streaming", "whatItIs": "Spark's streaming API that treats a live stream as an unbounded table. Micro-batch or continuous processing modes. Uses the same DataFrame API as batch, allowing the same feature logic to run in both batch and streaming contexts.", "example": "A feature pipeline written as a Spark DataFrame transformation can be reused as-is on a Kafka stream by switching from spark.read to spark.readStream."}, {"n": 26, "cardNo": 26, "type": "concept", "section": "Compute & Distributed Processing", "difficulty": "DATA ENGINEERING", "title": "Dask", "whatItIs": "A Python-native parallel computing library that scales NumPy, pandas, and scikit-learn workflows to multi-core machines or clusters without leaving Python. Useful when data just exceeds single-machine RAM but Spark's JVM overhead is undesirable.", "example": "A 50 GB pandas DataFrame that OOMs on one machine is processed with dask.dataframe using identical API syntax across 8 cores or a small cluster."}, {"n": 27, "cardNo": 27, "type": "concept", "section": "Compute & Distributed Processing", "difficulty": "DATA ENGINEERING", "title": "Ray", "whatItIs": "A distributed computing framework for Python that excels at task parallelism, actor-based stateful computation, and distributed ML workloads. Ray ecosystem includes Ray Train (distributed model training), Ray Tune (hyperparameter search), and Ray Serve (model serving).", "example": "Ray Tune runs 200 hyperparameter trials in parallel across 20 GPUs, with early stopping -- replacing a sequential sklearn GridSearchCV that would take days."}, {"n": 28, "cardNo": 28, "type": "concept", "section": "Compute & Distributed Processing", "difficulty": "DATA ENGINEERING", "title": "Partitioning Strategy for Features", "whatItIs": "Choosing the partition key for feature tables governs query performance and job parallelism. Partition by entity ID (user_id, account_id) when joining to training data. Partition by date when scanning time windows. Mispartitioned feature tables are a common cause of slow ML pipelines.", "example": "A customer feature table partitioned by user_id % 256 allows a training job to read exactly the shards for a 10% sample without scanning the full table."}, {"n": 29, "cardNo": 29, "type": "concept", "section": "Feature Engineering & Feature Stores", "difficulty": "ML ENGINEERING", "title": "Feature Store", "whatItIs": "A centralized platform for defining, storing, and serving ML features with consistency guarantees across training and inference. Eliminates training-serving skew, enables feature reuse, and provides point-in-time correct feature retrieval.", "example": "Feast stores 'customer_30d_spend' computed by a Spark job. The training pipeline fetches historical values; the inference API fetches the same feature from Redis -- guaranteed identical logic."}, {"n": 30, "cardNo": 30, "type": "concept", "section": "Feature Engineering & Feature Stores", "difficulty": "ML ENGINEERING", "title": "Training-Serving Skew", "whatItIs": "A mismatch between feature values seen during model training and those seen at inference time. One of the most common causes of silent model degradation in production. Root causes: different code paths, different data sources, or time-based differences.", "example": "Training used raw SQL AVG(amount) over 30 days. Serving computed a rolling mean in Python with a slightly different window boundary -- predictions shifted by 3% consistently."}, {"n": 31, "cardNo": 31, "type": "concept", "section": "Feature Engineering & Feature Stores", "difficulty": "ML ENGINEERING", "title": "Point-in-Time Correctness", "whatItIs": "The guarantee that when assembling a training dataset, each row's feature values reflect only information available at the moment that row's label event occurred -- no future leakage. Implemented via 'as-of' joins on event timestamps.", "example": "For a loan default label at 2024-03-15, point-in-time correct features use the customer's account balance as of 2024-03-15, not today's balance which reflects later payments."}, {"n": 32, "cardNo": 32, "type": "concept", "section": "Feature Engineering & Feature Stores", "difficulty": "ML ENGINEERING", "title": "Online vs Offline Feature Store", "whatItIs": "The offline store (data warehouse / lake) holds full feature history for training data generation. The online store (Redis, DynamoDB, Cassandra) holds the latest feature values for low-latency inference (<10 ms). Both must serve identical feature logic.", "example": "Offline: 3 years of daily 'customer_avg_txn_7d' in BigQuery for training. Online: today's value in Redis, updated every hour, served to the real-time fraud model."}, {"n": 33, "cardNo": 33, "type": "concept", "section": "Feature Engineering & Feature Stores", "difficulty": "ML ENGINEERING", "title": "Feature Reuse", "whatItIs": "Using the same registered feature definition across multiple models instead of recomputing it per team. Reduces redundant compute, ensures consistent definitions, and lets downstream models benefit from upstream investments.", "example": "'account_days_since_last_login' is computed once and registered in the feature store -- shared by churn, fraud, and recommender models without each team re-implementing it."}, {"n": 34, "cardNo": 34, "type": "concept", "section": "Feature Engineering & Feature Stores", "difficulty": "ML ENGINEERING", "title": "Entity vs Event Features", "whatItIs": "Entity features (profile features) describe a slowly-changing object: customer age, account tier. Event features are computed from recent event streams: transactions in the last 7 days. The two require different update frequencies and different storage patterns.", "example": "customer_credit_score is an entity feature updated monthly; customer_txn_count_24h is an event feature needing near-real-time streaming computation."}, {"n": 35, "cardNo": 35, "type": "concept", "section": "Feature Engineering & Feature Stores", "difficulty": "ML ENGINEERING", "title": "Backfill", "whatItIs": "Computing feature values for historical time periods retroactively -- typically to populate a training dataset after a new feature is defined. Backfills are often expensive Spark jobs and may require careful point-in-time logic to avoid leakage.", "example": "A new 'merchant_velocity_7d' feature is defined today but needed for 2 years of training data -- a backfill job re-runs the computation for each historical date, storing results in the offline store."}, {"n": 36, "cardNo": 36, "type": "concept", "section": "Feature Engineering & Feature Stores", "difficulty": "ML ENGINEERING", "title": "Feature Drift", "whatItIs": "A shift in the statistical distribution of a feature over time, caused by changes in user behavior, upstream data sources, or business logic changes. Feature drift is the most common root cause of model degradation and must be monitored in production.", "example": "After a product redesign, 'session_duration_minutes' drops from a mean of 8 to 3 -- a model trained on old distributions begins mispredicting, detectable by monitoring PSI on that feature."}, {"n": 37, "cardNo": 37, "type": "concept", "section": "Feature Engineering & Feature Stores", "difficulty": "ML ENGINEERING", "title": "PSI (Population Stability Index)", "whatItIs": "A metric that quantifies how much the distribution of a variable has shifted between a reference period and a current period. PSI < 0.1 = stable, 0.1-0.2 = some shift worth investigating, > 0.2 = significant shift requiring action.", "example": "Monitoring credit score distribution monthly with PSI: a sudden PSI of 0.35 on 'income_band' triggers an alert that a data pipeline upstream changed its binning logic."}, {"n": 38, "cardNo": 38, "type": "concept", "section": "Feature Engineering & Feature Stores", "difficulty": "ML ENGINEERING", "title": "Embeddings as Features", "whatItIs": "Dense vector representations learned by neural networks (text, image, user behavior) that can be stored as feature vectors and retrieved at serving time. Storing precomputed embeddings avoids re-running inference on raw inputs for every prediction.", "example": "User behavioral embeddings (128-dim) computed nightly by a two-tower model, stored in Redis as the 'user_emb' feature, consumed by a downstream product recommendation model."}, {"n": 39, "cardNo": 39, "type": "concept", "section": "Ml Pipelines & Orchestration", "difficulty": "ML ENGINEERING", "title": "ML Pipeline", "whatItIs": "A reproducible, automated sequence of steps that transforms raw data into a trained, evaluated model artifact: data extraction -> preprocessing -> feature engineering -> training -> evaluation -> registration. Pipelines replace ad-hoc notebooks for production ML.", "example": "A Vertex AI Pipeline with 6 steps runs on schedule: pulls 90 days of events, computes features, trains XGBoost, evaluates on holdout, and pushes to the model registry if AUC > 0.82."}, {"n": 40, "cardNo": 40, "type": "concept", "section": "Ml Pipelines & Orchestration", "difficulty": "ML ENGINEERING", "title": "DAG (Directed Acyclic Graph)", "whatItIs": "The computational graph structure underlying most pipeline and workflow systems. Nodes are tasks; directed edges represent dependencies; 'acyclic' means no circular dependencies. DAGs allow parallel execution of independent branches and clear dependency tracking.", "example": "In an Airflow DAG, 'compute_features' and 'generate_labels' run in parallel; 'join_dataset' runs only after both complete."}, {"n": 41, "cardNo": 41, "type": "concept", "section": "Ml Pipelines & Orchestration", "difficulty": "ML ENGINEERING", "title": "Kubeflow Pipelines", "whatItIs": "A Kubernetes-native ML pipeline system where each step is a containerized component. Pipelines are defined in Python (via the KFP SDK) and compiled to YAML. Provides artifact tracking, parameter passing, and a UI for pipeline runs. Foundation of Vertex AI Pipelines.", "example": "A KFP component 'train_xgboost' is a Docker image that reads feature Parquet from GCS, trains, and outputs a model artifact URI -- fully reproducible and environment-isolated."}, {"n": 42, "cardNo": 42, "type": "concept", "section": "Ml Pipelines & Orchestration", "difficulty": "ML ENGINEERING", "title": "Prefect / Dagster", "whatItIs": "Modern Python-first orchestrators that treat data pipelines as code with rich typing, observability, and scheduling. Dagster introduces 'software-defined assets' -- the output artifact (table, model) is the first-class concept rather than the task.", "example": "In Dagster, a 'customer_features' asset depends on 'raw_events' and 'dim_customer' assets -- when upstream assets are refreshed, downstream ones can be automatically re-materialized."}, {"n": 43, "cardNo": 43, "type": "concept", "section": "Ml Pipelines & Orchestration", "difficulty": "ML ENGINEERING", "title": "Parameterized Pipelines", "whatItIs": "Pipeline runs that accept input parameters (training date range, model hyperparameters, target segment) at execution time rather than hardcoding them. Enables backfills, A/B experiments, and scheduled re-runs with different configs without code changes.", "example": "Running the same training pipeline with start_date=2023-01-01 and start_date=2024-01-01 produces two separate model artifacts -- used to compare model performance across time periods."}, {"n": 44, "cardNo": 44, "type": "concept", "section": "Ml Pipelines & Orchestration", "difficulty": "ML ENGINEERING", "title": "Caching / Memoization in Pipelines", "whatItIs": "Skipping re-execution of a pipeline step when its inputs and code have not changed since the last run. Reduces compute cost for iterative development and speeds up pipeline reruns after downstream failures.", "example": "After fixing a bug in the evaluation step, re-running the pipeline skips the 3-hour feature computation and 2-hour training steps because their inputs are unchanged -- only the evaluation step reruns."}, {"n": 45, "cardNo": 45, "type": "concept", "section": "Ml Pipelines & Orchestration", "difficulty": "ML ENGINEERING", "title": "Artifact Tracking", "whatItIs": "Recording the inputs, outputs, and metadata of each pipeline step -- which dataset version was used, which model binary was produced, what the evaluation metrics were. Enables reproducibility, auditing, and debugging of production incidents.", "example": "MLflow logs: dataset hash = a3f7..., hyperparams = {n_estimators: 200, max_depth: 6}, AUC = 0.843, model artifact = s3://models/xgb_v12.pkl."}, {"n": 46, "cardNo": 46, "type": "concept", "section": "Ml Pipelines & Orchestration", "difficulty": "ML ENGINEERING", "title": "Trigger Strategies", "whatItIs": "When to run an ML pipeline: schedule-based (cron), event-based (new data arrival, upstream asset materialization), or threshold-based (model performance drops below a target). Matching trigger strategy to business requirements avoids both stale models and wasted compute.", "example": "A churn model retrains weekly on schedule; a fraud model retrains when upstream feature drift PSI > 0.2 -- different decay rates call for different triggers."}, {"n": 47, "cardNo": 47, "type": "concept", "section": "Experiment Tracking & Model Registry", "difficulty": "ML ENGINEERING", "title": "Experiment Tracking", "whatItIs": "Automatically recording all inputs (hyperparameters, dataset versions, code commit), outputs (metrics, artifacts), and environment of every model training run. Makes it possible to reproduce any past result and compare hundreds of runs systematically.", "example": "MLflow autolog captures n_estimators=200, learning_rate=0.05, AUC=0.843, feature importances, and the saved model binary -- for every run, without extra code."}, {"n": 48, "cardNo": 48, "type": "concept", "section": "Experiment Tracking & Model Registry", "difficulty": "ML ENGINEERING", "title": "MLflow", "whatItIs": "An open-source platform with four components: Tracking (log params/metrics/artifacts), Projects (reproducible run packaging), Models (standard model format with flavors), and Registry (staging/production lifecycle). The most widely deployed experiment tracking system.", "example": "mlflow.log_metric('auc', 0.843) during training; later mlflow.load_model('models:/fraud_v3/Production') at inference -- same API regardless of model framework."}, {"n": 49, "cardNo": 49, "type": "concept", "section": "Experiment Tracking & Model Registry", "difficulty": "ML ENGINEERING", "title": "Model Registry", "whatItIs": "A versioned catalog of trained model artifacts with lifecycle stages: Staging (being tested), Production (serving live traffic), Archived (retired). Provides auditability of what model is running where and enables controlled promotion workflows.", "example": "A new XGBoost fraud model passes offline evaluation -> registered as version 7 in Staging -> shadow-tested on live traffic -> promoted to Production by a human approval step in CI/CD."}, {"n": 50, "cardNo": 50, "type": "concept", "section": "Experiment Tracking & Model Registry", "difficulty": "ML ENGINEERING", "title": "Model Versioning", "whatItIs": "Assigning unique, incrementing versions to model artifacts so that each production deployment is traceable to a specific training run, dataset snapshot, and code commit. Enables rollback when a new version underperforms.", "example": "fraud_model v8 goes to production and AUC degrades on Monday's data -- ops team rolls back to v7 in 2 minutes by updating the registry stage, without re-deploying infrastructure."}, {"n": 51, "cardNo": 51, "type": "concept", "section": "Experiment Tracking & Model Registry", "difficulty": "ML ENGINEERING", "title": "Hyperparameter Search", "whatItIs": "Systematically exploring the space of model configuration choices (learning rate, depth, regularization) to find combinations that maximize a validation metric. Strategies: grid search (exhaustive), random search (random samples), Bayesian optimization (smart sequential sampling).", "example": "Optuna with 100 Bayesian trials finds max_depth=7, learning_rate=0.03 as the optimal XGBoost config -- converging faster than grid search over 1000 combinations would."}, {"n": 52, "cardNo": 52, "type": "concept", "section": "Experiment Tracking & Model Registry", "difficulty": "ML ENGINEERING", "title": "Cross-Validation in ML Pipelines", "whatItIs": "Evaluating a model on multiple train/validation splits of the data to get a less biased estimate of generalization performance. In time-series and financial ML, walk-forward (expanding window) cross-validation must be used to prevent future leakage.", "example": "Walk-forward CV: train on Jan-Mar, validate on Apr; train on Jan-Apr, validate on May; etc. -- correctly simulating how the model would have been deployed each month."}, {"n": 53, "cardNo": 53, "type": "concept", "section": "Experiment Tracking & Model Registry", "difficulty": "ML ENGINEERING", "title": "Evaluation Metrics Selection", "whatItIs": "Choosing metrics that align with the business objective, not default accuracy. Classification: AUC-ROC (ranking ability), F1, precision at K, KS statistic. Regression: MAE, RMSE, MAPE. Always evaluate on the population the model will actually encounter in production.", "example": "A fraud model evaluated by AUC looks strong at 0.91, but precision at top 1% of scores is what ops actually cares about -- 40% precision at top-1% is the real business metric."}, {"n": 54, "cardNo": 54, "type": "concept", "section": "Experiment Tracking & Model Registry", "difficulty": "ML ENGINEERING", "title": "Reproducibility", "whatItIs": "The ability to re-run a training job on the same data and code and get the same (or statistically equivalent) model. Requires: fixed random seeds, pinned library versions, immutable dataset snapshots, and logged environment. Non-reproducible training is untestable.", "example": "requirements.txt pins scikit-learn==1.4.2; training uses random_state=42; the dataset is a versioned snapshot in S3 -- six months later anyone can reproduce the model exactly."}, {"n": 55, "cardNo": 55, "type": "concept", "section": "Containerisation & Kubernetes", "difficulty": "INFRASTRUCTURE", "title": "Docker Container", "whatItIs": "A lightweight, portable, self-contained unit that packages an application with all its dependencies (libraries, runtime, config). Containers share the host OS kernel but are isolated from each other. The standard packaging unit for ML training jobs and serving endpoints.", "example": "A Docker image containing Python 3.11, scikit-learn 1.4, and a training script: run anywhere with docker run -- eliminating 'works on my machine' problems."}, {"n": 56, "cardNo": 56, "type": "concept", "section": "Containerisation & Kubernetes", "difficulty": "INFRASTRUCTURE", "title": "Docker Image Layers", "whatItIs": "A Docker image is built as a stack of immutable layers; each instruction in a Dockerfile adds a layer. Layers are cached and shared across images. Ordering instructions from least- to most-frequently-changed maximises cache reuse and speeds up builds.", "example": "COPY requirements.txt -> RUN pip install -> COPY src/ : changing only src code reuses the pip install layer, cutting build time from 5 minutes to 20 seconds."}, {"n": 57, "cardNo": 57, "type": "concept", "section": "Containerisation & Kubernetes", "difficulty": "INFRASTRUCTURE", "title": "Container Registry", "whatItIs": "A storage and distribution system for Docker images (ECR on AWS, Artifact Registry on GCP, Docker Hub). ML platforms pull images from registries when launching training jobs or inference pods. Images should be versioned and scanned for vulnerabilities.", "example": "ML training pipeline step pulls gcr.io/myproject/trainer:v42 -- the exact Python environment and training code are guaranteed, not whatever is installed on a worker node."}, {"n": 58, "cardNo": 58, "type": "concept", "section": "Containerisation & Kubernetes", "difficulty": "INFRASTRUCTURE", "title": "Kubernetes (K8s) Core Concepts", "whatItIs": "Kubernetes is a container orchestration system that schedules, scales, and manages containerized workloads across a cluster. Key objects: Pod (running container group), Deployment (desired state for pods), Service (stable network endpoint), Namespace (isolation boundary).", "example": "A Deployment spec says 'run 3 replicas of the fraud inference image' -- K8s ensures 3 pods are always running, restarting failed ones automatically."}, {"n": 59, "cardNo": 59, "type": "concept", "section": "Containerisation & Kubernetes", "difficulty": "INFRASTRUCTURE", "title": "Resource Requests and Limits", "whatItIs": "Kubernetes allows each container to declare CPU/memory requests (the minimum guaranteed resources) and limits (the maximum allowed). The scheduler uses requests to place pods on suitable nodes; limits prevent a runaway process from starving neighbors.", "example": "A training pod with requests: {cpu: '4', memory: '16Gi'} and limits: {cpu: '8', memory: '32Gi'} is guaranteed 4 cores but can burst to 8 if the node has spare capacity."}, {"n": 60, "cardNo": 60, "type": "concept", "section": "Containerisation & Kubernetes", "difficulty": "INFRASTRUCTURE", "title": "GPU Scheduling in K8s", "whatItIs": "GPUs are exposed to Kubernetes via device plugins (NVIDIA). Pods request GPUs with resources.limits.nvidia.com/gpu: 1. The scheduler places the pod on a node with available GPUs. GPU nodes are typically tainted so only ML workloads are scheduled on them.", "example": "A training job requests 2 GPUs; K8s places it on an A100 node with available capacity; a taint ensures CPU-only inference pods are never scheduled on that expensive node."}, {"n": 61, "cardNo": 61, "type": "concept", "section": "Containerisation & Kubernetes", "difficulty": "INFRASTRUCTURE", "title": "Horizontal Pod Autoscaling (HPA)", "whatItIs": "A K8s controller that automatically adjusts the number of pod replicas based on observed CPU utilization, memory, or custom metrics (e.g., inference queue depth). Enables inference services to scale with traffic without manual intervention.", "example": "A model serving deployment scales from 2 to 12 pods when CPU utilization exceeds 70% -- handling a Black Friday traffic spike without over-provisioning at baseline."}, {"n": 62, "cardNo": 62, "type": "concept", "section": "Containerisation & Kubernetes", "difficulty": "INFRASTRUCTURE", "title": "Kubernetes Jobs and CronJobs", "whatItIs": "A Job runs a pod to completion (useful for batch ML training runs). A CronJob runs a Job on a cron schedule. Both are the native K8s primitives for batch ML pipelines without a full orchestrator, though most teams layer Argo Workflows or Kubeflow on top.", "example": "A CronJob scheduled at 03:00 daily launches a training pod, waits for it to exit 0, and records completion -- the simplest possible scheduled ML retraining setup."}, {"n": 63, "cardNo": 63, "type": "concept", "section": "Model Serving & Deployment", "difficulty": "ML ENGINEERING", "title": "Online vs Batch Inference", "whatItIs": "Online inference: a single-record (or small batch) prediction returned synchronously via an API, latency in milliseconds. Batch inference: scoring a large dataset asynchronously, results written to storage, latency in minutes to hours. Most teams need both.", "example": "Online: fraud score returned in 50 ms at payment swipe. Batch: churn probability for all 5 million customers computed overnight and stored in the CRM."}, {"n": 64, "cardNo": 64, "type": "concept", "section": "Model Serving & Deployment", "difficulty": "ML ENGINEERING", "title": "REST vs gRPC for Serving", "whatItIs": "REST APIs use JSON over HTTP/1.1 -- easy to debug, universal client support, higher latency (~1-2 ms overhead). gRPC uses Protobuf over HTTP/2 -- smaller payloads, streaming, lower latency, but requires generated client code. gRPC is preferred for high-throughput internal services.", "example": "A public-facing recommendation API uses REST for browser/mobile compatibility. An internal feature-retrieval microservice uses gRPC for 3x throughput and typed contracts."}, {"n": 65, "cardNo": 65, "type": "concept", "section": "Model Serving & Deployment", "difficulty": "ML ENGINEERING", "title": "Model Server (TorchServe / TF Serving / Triton)", "whatItIs": "Dedicated inference servers optimized for model loading, request batching, GPU utilization, and health management. NVIDIA Triton supports multiple frameworks and dynamic batching. TF Serving handles TensorFlow SavedModels. TorchServe handles PyTorch. Preferable to a raw Flask API for production.", "example": "Triton Inference Server serves a PyTorch BERT model with dynamic batching: 20 individual requests arriving within 5 ms are batched into one GPU forward pass, doubling throughput."}, {"n": 66, "cardNo": 66, "type": "concept", "section": "Model Serving & Deployment", "difficulty": "ML ENGINEERING", "title": "Dynamic Batching", "whatItIs": "A serving optimization where the inference server accumulates multiple individual prediction requests arriving within a short time window and processes them together as one batch. Dramatically improves GPU utilization because GPUs are idle on single-sample requests.", "example": "Without batching, 100 requests/sec send 100 separate GPU forward passes. With dynamic batching at 10 ms window, they may be merged into 5-10 batch calls -- GPU utilization rises from 15% to 80%."}, {"n": 67, "cardNo": 67, "type": "concept", "section": "Model Serving & Deployment", "difficulty": "ML ENGINEERING", "title": "Blue-Green Deployment", "whatItIs": "Maintaining two identical production environments: 'blue' (current) and 'green' (new version). Traffic is switched from blue to green atomically. If green fails, switching back to blue is instant. Eliminates deployment downtime but requires double the infrastructure temporarily.", "example": "Fraud model v8 deployed to the green environment; 100% traffic switched from blue (v7) to green in one load-balancer update; v7 kept warm for 30 minutes as rollback safety net."}, {"n": 68, "cardNo": 68, "type": "concept", "section": "Model Serving & Deployment", "difficulty": "ML ENGINEERING", "title": "Canary Deployment", "whatItIs": "Gradually routing a small percentage of live traffic to a new model version before full rollout. The canary receives, say, 5% of requests while metrics are monitored. If metrics are stable, traffic is progressively increased; on regression, the canary is pulled.", "example": "Churn model v4 receives 5% of scoring traffic for 48 hours; PSI and precision are monitored; on passing thresholds, traffic is ramped to 25%, 50%, 100% over the next week."}, {"n": 69, "cardNo": 69, "type": "concept", "section": "Model Serving & Deployment", "difficulty": "ML ENGINEERING", "title": "Shadow Mode Testing", "whatItIs": "Sending live requests to a new model in parallel with the production model but discarding the new model's responses. The new model's predictions are logged for offline comparison without affecting users. Enables realistic evaluation before any traffic shift.", "example": "Fraud model v8 receives every transaction in shadow mode alongside v7 -- after 7 days, analysts compare v8's shadow scores to actual fraud outcomes, validating improvement before going live."}, {"n": 70, "cardNo": 70, "type": "concept", "section": "Model Serving & Deployment", "difficulty": "ML ENGINEERING", "title": "Feature Retrieval Latency", "whatItIs": "The time to fetch all required features for a single prediction from the online feature store. This is often the dominant latency component in real-time ML serving -- not model inference itself. Keep feature retrieval under 5-10 ms via Redis/in-process caching.", "example": "A fraud model needs 40 features from Redis: a single MGET call fetches all 40 in one round trip (~1 ms) rather than 40 sequential GETs (~40 ms)."}, {"n": 71, "cardNo": 71, "type": "concept", "section": "Model Serving & Deployment", "difficulty": "ML ENGINEERING", "title": "A/B Testing for Models", "whatItIs": "Randomly assigning users or requests to model variants and measuring downstream business metrics (conversion, revenue, false positive rate) to determine which model produces better real-world outcomes. The gold standard for model evaluation alongside offline metrics.", "example": "Users are randomly split 50/50: group A gets recommendation model v3, group B gets v4 -- after 2 weeks, group B shows 8% higher click-through rate with p < 0.01."}, {"n": 72, "cardNo": 72, "type": "concept", "section": "Model Serving & Deployment", "difficulty": "ML ENGINEERING", "title": "Inference Cost Optimization", "whatItIs": "Techniques to reduce per-prediction compute cost: model quantization (INT8/FP16), pruning (removing low-weight neurons), distillation (training a smaller student model), caching predictions for repeated inputs, and right-sizing hardware (CPU vs GPU vs specialized accelerators).", "example": "Quantizing a BERT model from FP32 to INT8 reduces inference latency by 3x and GPU memory by 4x with less than 1% accuracy loss on the target task -- enabling CPU serving at scale."}, {"n": 73, "cardNo": 73, "type": "concept", "section": "Ci/Cd For Ml (Mlops)", "difficulty": "MLOPS", "title": "CI/CD for ML", "whatItIs": "Applying software engineering's Continuous Integration / Continuous Delivery practices to ML: automated testing of data quality, model training, evaluation gating, and deployment. A model PR should fail CI if evaluation metrics regress, just as a code PR fails on broken tests.", "example": "A GitHub Actions workflow on PR: lint data schema -> run unit tests -> train on sample data -> evaluate on holdout -> block merge if AUC < 0.80."}, {"n": 74, "cardNo": 74, "type": "concept", "section": "Ci/Cd For Ml (Mlops)", "difficulty": "MLOPS", "title": "Model Evaluation Gate", "whatItIs": "A mandatory, automated check in the deployment pipeline that only allows a new model to proceed to production if it meets predefined metric thresholds on a held-out evaluation set. Prevents performance regression from shipping silently.", "example": "Pipeline step 'evaluate': if AUC < 0.82 OR recall_at_fpr5 < 0.40 -> pipeline fails and posts results to Slack; human review required before manual override."}, {"n": 75, "cardNo": 75, "type": "concept", "section": "Ci/Cd For Ml (Mlops)", "difficulty": "MLOPS", "title": "Data Validation in CI", "whatItIs": "Automated checks that run against incoming data or generated features before any training: schema validation, null rate checks, distribution sanity checks, referential integrity. Catches upstream data quality issues before they corrupt a model.", "example": "Great Expectations suite: assert customer_id is not null (100%), assert amount > 0 for all rows, assert transaction_date within last 90 days -- run at the start of every pipeline."}, {"n": 76, "cardNo": 76, "type": "concept", "section": "Ci/Cd For Ml (Mlops)", "difficulty": "MLOPS", "title": "Great Expectations", "whatItIs": "An open-source Python framework for expressing and running data quality checks ('expectations') against dataframes, SQL tables, or files. Expectations are human-readable assertions that generate HTML data docs and integrate into pipeline CI gates.", "example": "expect_column_values_to_not_be_null('customer_id') + expect_column_mean_to_be_between('amount', 50, 500) -- both auto-run and produce a pass/fail report before training starts."}, {"n": 77, "cardNo": 77, "type": "concept", "section": "Ci/Cd For Ml (Mlops)", "difficulty": "MLOPS", "title": "Infrastructure as Code (IaC)", "whatItIs": "Defining and provisioning infrastructure (cloud instances, databases, networking, Kubernetes clusters) through machine-readable configuration files rather than manual UI clicks. Makes environments reproducible, version-controlled, and deployable via CI/CD.", "example": "Terraform code defines the Vertex AI training cluster, feature store BigQuery tables, and Cloud Run serving endpoint -- provisioned identically in dev, staging, and prod with one command."}, {"n": 78, "cardNo": 78, "type": "concept", "section": "Ci/Cd For Ml (Mlops)", "difficulty": "MLOPS", "title": "Model Card", "whatItIs": "A structured document that accompanies a trained model artifact describing its intended use, performance across subgroups, known limitations, training data, and ethical considerations. Required for responsible ML deployment and often mandatory in regulated industries.", "example": "A credit scoring model card states: trained on 2022-2023 US consumer data, AUC 0.86 overall but 0.79 for applicants aged 18-24 -- the lower subgroup performance is documented and acknowledged."}, {"n": 79, "cardNo": 79, "type": "concept", "section": "Ci/Cd For Ml (Mlops)", "difficulty": "MLOPS", "title": "Rollback Strategy", "whatItIs": "A pre-defined procedure for reverting a model deployment to the last known good version when the new version degrades. Requires: model registry with previous versions intact, infrastructure that can re-point traffic without re-deploying, and monitoring that auto-triggers rollback.", "example": "Ops runbook: if precision@5% declines > 10% relative for 30 consecutive minutes -> auto-rollback to previous registry version -> page on-call -> file incident report."}, {"n": 80, "cardNo": 80, "type": "concept", "section": "Ci/Cd For Ml (Mlops)", "difficulty": "MLOPS", "title": "Makefile / Task Runners for ML Repos", "whatItIs": "A Makefile or tool like Invoke or Just codifies common developer tasks (install deps, run tests, train locally, build Docker image) as named commands. Reduces onboarding friction and ensures consistency across team members' environments.", "example": "make train DATA=2024-01 runs: activate venv -> validate data -> run training script -> log to MLflow -- one command, same result for every engineer on the team."}, {"n": 81, "cardNo": 81, "type": "concept", "section": "Monitoring & Observability", "difficulty": "MLOPS", "title": "Model Monitoring", "whatItIs": "Continuously tracking the health of a deployed model across three axes: input data quality (schema, nulls, value ranges), feature distribution shift (PSI, KL divergence), and prediction quality (output distribution, business metrics, ground truth labels when available).", "example": "A dashboard monitors fraud model daily: input null rate on 'merchant_category' (should be 0%), PSI on 'account_age_days' (threshold 0.1), and precision at top 5% of scores (should stay above 40%)."}, {"n": 82, "cardNo": 82, "type": "concept", "section": "Monitoring & Observability", "difficulty": "MLOPS", "title": "Concept Drift", "whatItIs": "A change in the statistical relationship between input features and the target variable -- the world has changed, so the model's learned mapping is no longer correct. Distinct from feature drift (input distribution change). Concept drift requires model retraining, not just input monitoring.", "example": "A churn model trained pre-COVID had 'low login frequency' as the top churn predictor; post-COVID, remote workers login frequently regardless of churn intent -- the feature-label relationship changed."}, {"n": 83, "cardNo": 83, "type": "concept", "section": "Monitoring & Observability", "difficulty": "MLOPS", "title": "Ground Truth Delay", "whatItIs": "The lag between making a prediction and receiving the true label to evaluate it against. Short in some domains (click = label in seconds); long in others (loan default = label in months). Ground truth delay determines how quickly you can detect model degradation.", "example": "A credit model predicts default risk at origination; true default labels arrive 6-18 months later -- monitoring must rely on proxy metrics (delinquency at 30 days) while waiting for ground truth."}, {"n": 84, "cardNo": 84, "type": "concept", "section": "Monitoring & Observability", "difficulty": "MLOPS", "title": "Metrics Stack (Prometheus + Grafana)", "whatItIs": "Prometheus is a time-series metrics database that scrapes endpoints at regular intervals and stores labeled numeric metrics. Grafana is a visualization layer that queries Prometheus and renders dashboards. Together they are the standard observability stack for ML inference services.", "example": "The model serving pod exposes /metrics: Prometheus scrapes inference_latency_seconds and prediction_count every 15 seconds; Grafana shows a dashboard with p50/p99 latency and request rate."}, {"n": 85, "cardNo": 85, "type": "concept", "section": "Monitoring & Observability", "difficulty": "MLOPS", "title": "Alerting and SLOs", "whatItIs": "A Service Level Objective (SLO) defines a reliability target for a service (e.g., p99 latency < 200 ms, error rate < 0.1%). Alerts fire when the SLO is at risk. ML systems need SLOs for both infrastructure (latency, availability) and model quality (output distribution).", "example": "SLO: fraud model prediction endpoint p99 latency < 150 ms, measured over a rolling 1-hour window. PagerDuty alert fires if the 30-minute burn rate threatens the weekly error budget."}, {"n": 86, "cardNo": 86, "type": "concept", "section": "Monitoring & Observability", "difficulty": "MLOPS", "title": "Log Aggregation (ELK / Cloud Logging)", "whatItIs": "Centralising logs from training jobs, pipeline steps, and inference services into a searchable system (Elasticsearch-Logstash-Kibana, or cloud equivalents). Enables post-incident debugging, auditing, and correlating prediction IDs with feature values and labels.", "example": "Every inference request logs: request_id, model_version, feature_hash, score, latency_ms -- when a customer disputes a fraud block, the full prediction context is queryable within seconds."}, {"n": 87, "cardNo": 87, "type": "concept", "section": "Monitoring & Observability", "difficulty": "MLOPS", "title": "Tracing (OpenTelemetry)", "whatItIs": "Distributed tracing tracks a request across multiple services as a trace -- a tree of spans with timestamps and metadata. OpenTelemetry is the vendor-neutral standard. In ML serving, tracing reveals whether latency is dominated by feature retrieval, model inference, or post-processing.", "example": "A 120 ms inference latency traced with OpenTelemetry: feature_fetch=90 ms, model_inference=20 ms, post_process=10 ms -- revealing that the Redis call is the optimization target."}, {"n": 88, "cardNo": 88, "type": "concept", "section": "Monitoring & Observability", "difficulty": "MLOPS", "title": "Data Quality Monitoring", "whatItIs": "Continuously checking that data arriving in production pipelines conforms to expectations: no unexpected nulls, values in valid ranges, no schema changes, referential integrity. Distinct from model monitoring -- catches upstream data issues before they corrupt predictions.", "example": "A daily check on the 'transactions' pipeline: null rate on 'amount' exceeded 0.5% threshold (should be 0%) -- alerts fire before the imputed features train a corrupted next version."}, {"n": 89, "cardNo": 89, "type": "concept", "section": "Cloud Ml Platforms", "difficulty": "PLATFORMS", "title": "Vertex AI (GCP)", "whatItIs": "Google Cloud's unified ML platform: Vertex AI Workbench (notebooks), Training (managed training jobs), Pipelines (KFP-based orchestration), Model Registry, Endpoints (online serving), Feature Store, and Model Monitoring. Tightly integrated with BigQuery and GCS.", "example": "An end-to-end pipeline: BigQuery feature extraction -> Vertex Pipelines training job -> model registered in Vertex Registry -> deployed to a Vertex Endpoint -> monitored for skew."}, {"n": 90, "cardNo": 90, "type": "concept", "section": "Cloud Ml Platforms", "difficulty": "PLATFORMS", "title": "SageMaker (AWS)", "whatItIs": "AWS's ML platform: SageMaker Studio (IDE), Training Jobs (managed GPU training), Pipelines (orchestration), Model Registry, Endpoints (online/batch serving), Feature Store, and Clarify (bias/explainability). Tightly integrated with S3 and ECR.", "example": "SageMaker Training Job pulls training data from S3, runs on a ml.p3.8xlarge, logs to CloudWatch, and saves the model to S3 -- no infrastructure management required."}, {"n": 91, "cardNo": 91, "type": "concept", "section": "Cloud Ml Platforms", "difficulty": "PLATFORMS", "title": "Databricks", "whatItIs": "A unified analytics and ML platform built on Apache Spark, Delta Lake, and MLflow. Provides collaborative notebooks, scalable Spark clusters, Delta Lake storage, Unity Catalog for governance, and MLflow for experiment tracking and model registry. Popular in data-heavy enterprises.", "example": "A team uses Databricks: Delta Lake for feature storage, a Jobs cluster for nightly training, MLflow for experiment tracking, and Model Serving for real-time inference -- all within one platform."}, {"n": 92, "cardNo": 92, "type": "concept", "section": "Cloud Ml Platforms", "difficulty": "PLATFORMS", "title": "Spot / Preemptible Instances", "whatItIs": "Cloud instances available at 60-90% discounts in exchange for the possibility of being terminated with short notice when the provider needs capacity. Well-suited for fault-tolerant ML training jobs with checkpointing, but not for latency-sensitive inference serving.", "example": "A 10-hour XGBoost training job on spot instances costs $8 instead of $50; checkpoints saved to S3 every 30 minutes means at most 30 minutes is lost if the instance is preempted."}, {"n": 93, "cardNo": 93, "type": "concept", "section": "Cloud Ml Platforms", "difficulty": "PLATFORMS", "title": "Managed Notebooks (Workbench / SageMaker Studio)", "whatItIs": "Cloud-hosted Jupyter environments with pre-installed ML libraries, managed kernels, and direct access to cloud storage and compute. Lower friction for exploration than setting up local environments, but care is needed to not do production work inside a notebook.", "example": "A data scientist uses Vertex AI Workbench to prototype a feature engineering script, accesses BigQuery directly via BigQuery magic, then refactors the script into a containerized pipeline step."}, {"n": 94, "cardNo": 94, "type": "concept", "section": "Cloud Ml Platforms", "difficulty": "PLATFORMS", "title": "Auto-scaling Inference Endpoints", "whatItIs": "Cloud serving endpoints that automatically scale the number of inference replicas based on traffic (requests/sec, CPU, latency). Pay for actual traffic rather than provisioning for peak. Works best when startup time for a new instance is short (< 30 sec).", "example": "A SageMaker endpoint scales from 1 to 8 instances during a marketing campaign; traffic returns to baseline and it scales back to 1 -- cost tracked to actual usage rather than worst-case sizing."}, {"n": 95, "cardNo": 95, "type": "concept", "section": "Cloud Ml Platforms", "difficulty": "PLATFORMS", "title": "Serverless Inference", "whatItIs": "A serving pattern where the cloud provider manages all infrastructure -- no persistent instances. Containers start on demand per request. Zero cost at zero traffic, but cold start latency (1-5 sec) makes it unsuitable for strict low-latency requirements.", "example": "A low-traffic internal model (100 requests/day) deployed on Vertex AI Serverless Prediction costs nearly nothing when idle; a cold start takes 2 seconds, which is acceptable for batch scoring triggered by a dashboard."}, {"n": 96, "cardNo": 96, "type": "concept", "section": "Data Contracts & Governance", "difficulty": "DATA ENGINEERING", "title": "Data Contract", "whatItIs": "A formal, versioned agreement between a data producer (team/service) and data consumers specifying: schema, field types, SLAs (freshness, completeness), allowed breaking change policies, and ownership. Treats datasets as first-class APIs.", "example": "The payments team publishes a data contract for 'payments.transactions': Avro schema v3, updated within 15 minutes of event, null rate < 0.01% on amount -- downstream ML teams can rely on these guarantees."}, {"n": 97, "cardNo": 97, "type": "concept", "section": "Data Contracts & Governance", "difficulty": "DATA ENGINEERING", "title": "Data Mesh", "whatItIs": "An organizational architecture that distributes data ownership to domain teams (rather than a central data team). Each domain team owns, publishes, and maintains its datasets as products. A central platform team provides self-service tooling. Addresses scaling limits of centralized data teams.", "example": "The risk team owns and publishes 'risk.credit_features' as a data product; the growth team consumes it -- no central data engineering bottleneck for every new feature request."}, {"n": 98, "cardNo": 98, "type": "concept", "section": "Data Contracts & Governance", "difficulty": "DATA ENGINEERING", "title": "Data Product", "whatItIs": "A curated, reliable dataset treated with product discipline: it has an owner, an SLA, documentation, a schema contract, and a versioning policy. Consumers can depend on it without understanding its internals. The atomic unit of a data mesh architecture.", "example": "'customer.360_profile' is a data product owned by the CX team: updated daily, Parquet on S3, v2 schema (backward compatible with v1), documented in the data catalog with 99.5% freshness SLA."}, {"n": 99, "cardNo": 99, "type": "concept", "section": "Data Contracts & Governance", "difficulty": "DATA ENGINEERING", "title": "Role-Based Access Control (RBAC)", "whatItIs": "A permissions model where access to data assets is granted to roles rather than individuals. Roles are assigned based on job function; individuals inherit permissions from their roles. Enables least-privilege access to sensitive training data and feature stores.", "example": "Role 'ml_engineer' can read from the feature store and write to the model registry but cannot access raw PII tables -- only 'data_steward' role can access raw customer data."}, {"n": 100, "cardNo": 100, "type": "concept", "section": "Data Contracts & Governance", "difficulty": "DATA ENGINEERING", "title": "Data Anonymization Techniques", "whatItIs": "Methods for reducing re-identification risk in training data: k-anonymity (each record is indistinguishable from k-1 others), pseudonymization (replace identifiers with tokens), differential privacy (add calibrated noise to outputs), and aggregation (never expose individual records).", "example": "Training a churn model on pseudonymized data: customer_id replaced with a hash, name/email removed, zip code generalized to state -- model performance is preserved while PII risk is eliminated."}, {"n": 101, "cardNo": 101, "type": "concept", "section": "Data Contracts & Governance", "difficulty": "DATA ENGINEERING", "title": "Column-Level Security", "whatItIs": "Fine-grained access control that restricts visibility of specific columns within a table based on user role or policy -- even when the rest of the table is accessible. Critical for training data workflows where engineers need statistical columns but not PII columns.", "example": "BigQuery column-level security: 'ml_engineer' can SELECT all columns from fact_transactions EXCEPT ssn and full_name -- enforced at the query engine level, not application level."}, {"n": 102, "cardNo": 102, "type": "concept", "section": "Data Contracts & Governance", "difficulty": "DATA ENGINEERING", "title": "Data Freshness SLA", "whatItIs": "A defined maximum acceptable age for data in a pipeline or feature store, measured from event occurrence to availability. Freshness SLAs drive pipeline scheduling, monitoring alerting thresholds, and architecture choices (batch vs streaming).", "example": "The 'customer_spend_7d' feature has a freshness SLA of 2 hours -- a monitoring alert fires if the feature store timestamp is more than 2 hours behind current time, blocking model serving if violated."}, {"n": 103, "cardNo": 103, "type": "concept", "section": "Data Contracts & Governance", "difficulty": "DATA ENGINEERING", "title": "Data Observability", "whatItIs": "An end-to-end practice of understanding the health and state of data across the pipeline: freshness, volume, schema, distribution, and lineage -- proactively, not reactively. Tools: Monte Carlo, Datafold, Metaplane. Analogous to software observability but for data.", "example": "Monte Carlo detects that 'orders' table row count dropped 40% at 03:00 -- before the morning batch pipeline runs and before any model is affected -- enabling engineers to fix the upstream issue first."}, {"n": 104, "cardNo": 104, "type": "concept", "section": "Real-Time Ml & Streaming Features", "difficulty": "ADVANCED", "title": "Lambda Architecture", "whatItIs": "A data processing architecture with two parallel paths: a batch layer (accurate, slow) and a speed layer (approximate, fast). Query results merge both layers. Historically used for real-time + historical feature serving; now largely superseded by Kappa Architecture.", "example": "Batch layer: accurate 30-day spend computed nightly in Spark. Speed layer: approximate spend updated in Flink in real-time. Serving layer merges them for the fraud model -- today's spend is accurate, yesterday's is approximate."}, {"n": 105, "cardNo": 105, "type": "concept", "section": "Real-Time Ml & Streaming Features", "difficulty": "ADVANCED", "title": "Kappa Architecture", "whatItIs": "A simplification of Lambda: use a single streaming system for both real-time and historical (reprocessed) data. Historical reprocessing is done by replaying the event log from Kafka with the same streaming pipeline. Eliminates maintaining two codebases.", "example": "One Flink job computes 'customer_spend_7d' in real-time from Kafka. To backfill 2 years of history, the same job replays 2 years of Kafka log at high speed -- one codebase, no batch/stream divergence."}, {"n": 106, "cardNo": 106, "type": "concept", "section": "Real-Time Ml & Streaming Features", "difficulty": "ADVANCED", "title": "Flink (Apache Flink)", "whatItIs": "A stateful stream processing engine with true event-time semantics, low-latency exactly-once guarantees, and high throughput. Stores per-key state natively (RocksDB backend). The dominant choice for complex real-time feature computation requiring stateful aggregations.", "example": "Flink maintains per-account state: when a new transaction arrives, it updates 'running 1h transaction count' and 'max single transaction last 24h' atomically and writes both to Redis within 100 ms."}, {"n": 107, "cardNo": 107, "type": "concept", "section": "Real-Time Ml & Streaming Features", "difficulty": "ADVANCED", "title": "Stateful Stream Processing", "whatItIs": "Processing where the result for a given input depends on accumulated state from previous inputs (e.g., running counts, windows, aggregates per user). State is stored in the stream processor (not in a separate DB), enabling low-latency stateful feature updates.", "example": "A Flink job maintains per-card state: {last_3_merchants, total_1h_spend, velocity_count_15m}. Each incoming transaction updates this state and emits fresh feature values to Redis."}, {"n": 108, "cardNo": 108, "type": "concept", "section": "Real-Time Ml & Streaming Features", "difficulty": "ADVANCED", "title": "Materialized Feature Views", "whatItIs": "Pre-computed, persisted snapshots of feature aggregations that are updated continuously or on schedule and stored in the online store. Unlike computing on-the-fly at inference time, materialized views provide sub-millisecond feature lookup at the cost of staleness.", "example": "A materialized view 'customer_features' updated every 5 minutes stores 15 aggregated features per customer in Redis -- the fraud model fetches all 15 in one Redis MGET call taking 1 ms."}, {"n": 109, "cardNo": 109, "type": "concept", "section": "Real-Time Ml & Streaming Features", "difficulty": "ADVANCED", "title": "Stream-Table Join", "whatItIs": "Joining a real-time event stream with a slowly-changing reference table (dimension) at processing time. The stream processor enriches each event with current dimension data. Implemented as a lookup on each event against a local cache or external KV store.", "example": "Each incoming transaction event is joined with the 'merchant_category' lookup table -- Flink maintains a cached copy of the lookup table, enriching events without an external database call per event."}, {"n": 110, "cardNo": 110, "type": "concept", "section": "Real-Time Ml & Streaming Features", "difficulty": "ADVANCED", "title": "Redis for Online Feature Serving", "whatItIs": "Redis is the most common online store for real-time feature serving: in-memory key-value with microsecond latency, hash data structures for per-entity feature bundles, and TTL for automatic staleness cleanup. MGET fetches multiple feature values in one round trip.", "example": "Feature key schema: 'customer:{id}:features' -> Redis hash with fields {spend_7d, login_count_24h, risk_tier, last_txn_merchant}. MGET on 40-feature keys returns in under 1 ms."}, {"n": 111, "cardNo": 111, "type": "concept", "section": "Real-Time Ml & Streaming Features", "difficulty": "ADVANCED", "title": "Near-Real-Time vs True Real-Time", "whatItIs": "Near-real-time (NRT) features update on a micro-batch schedule (every 1-10 minutes) using Spark Structured Streaming or scheduled jobs. True real-time features update per-event using Flink or Kafka Streams. NRT is far simpler to operate; use true real-time only when business latency requires it.", "example": "Fraud detection needs true real-time velocity features (sub-second). A recommendation system can use NRT features updated every 5 minutes -- matching engineering complexity to actual business need."}, {"n": 112, "cardNo": 112, "type": "concept", "section": "Mlops Maturity & Best Practi
