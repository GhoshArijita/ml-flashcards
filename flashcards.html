null, "type": "reference", "section": "Goodness Of Fit & Error Metrics", "difficulty": "REFERENCE", "title": "Clustering Metrics", "body": "Inertia / WCSS   —   total within-cluster distance (k-means elbow); lower = tighter\nSilhouette   —   fit to own vs nearest cluster (-1 to 1; higher is better)\nDavies-Bouldin   —   average cluster overlap; lower is better\nCalinski-Harabasz   —   between- vs within-cluster dispersion ratio; higher is better\nAIC / BIC (GMM)   —   likelihood penalized for the number of components (model choice)\nARI / NMI   —   agreement with true labels when they happen to exist"}, {"n": 166, "cardNo": null, "type": "reference", "section": "Goodness Of Fit & Error Metrics", "difficulty": "REFERENCE", "title": "Dimensionality Reduction & Ranking", "body": "Explained variance ratio   —   (PCA) information kept per component; the cumulative curve picks how many to keep\nReconstruction error   —   (PCA / autoencoder) information lost by compressing then rebuilding\nTrustworthiness   —   (t-SNE / UMAP) whether local neighbourhoods survive the projection\nPrecision@k / Recall@k   —   quality of the top-k recommendations or retrieved items\nMAP / NDCG   —   ranking quality that rewards putting the right items higher"}, {"n": 167, "cardNo": null, "type": "reference", "section": "Goodness Of Fit & Error Metrics", "difficulty": "REFERENCE", "title": "Validation & Fit Diagnostics", "body": "Train / Validation / Test   —   fit, tune and judge on data the model has never seen\nk-fold cross-validation   —   rotate the held-out fold for a stable, less lucky estimate\nBias-variance trade-off   —   underfit (high bias) vs overfit (high variance) - the metrics reveal which\nTrain-vs-validation gap   —   a large gap signals overfitting\nCalibration   —   do predicted probabilities match observed frequencies"}];
const STORE_KEY = "ml_ds_flashcards_v1";

/* ---------- state ---------- */
let known = {};            // {n:true}
try { known = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e){ known = {}; }
function save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(known)); }catch(e){} }

let order = [];            // array of card indices in current view
let pos = 0;              // pointer into order
let sectionFilter = "ALL";

const $ = id => document.getElementById(id);

/* ---------- build section dropdown ---------- */
(function(){
  const sel = $("sectionSel");
  const sections = [...new Set(CARDS.map(c=>c.section))];
  sel.innerHTML = '<option value="ALL">All sections ('+CARDS.length+')</option>' +
    sections.map(s=>{
      const n = CARDS.filter(c=>c.section===s).length;
      return '<option value="'+encodeURIComponent(s)+'">'+s+' ('+n+')</option>';
    }).join('');
  sel.addEventListener('change', ()=>{
    sectionFilter = sel.value==="ALL" ? "ALL" : decodeURIComponent(sel.value);
    buildOrder(); pos=0; render();
  });
})();

/* ---------- ordering ---------- */
function viewIndices(){
  let idx = CARDS.map((c,i)=>i);
  if(sectionFilter!=="ALL") idx = idx.filter(i=>CARDS[i].section===sectionFilter);
  return idx;
}
function buildOrder(){ order = viewIndices(); }
function shuffle(){
  for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
}

/* ---------- rendering ---------- */
function esc(s){return (s||"").replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function refRows(body){
  return esc(body).split('\n').map(line=>{
    const parts = line.split('—');
    if(parts.length>=2){
      return '<div class="row"><span class="k">'+parts[0].trim()+'</span> — '+parts.slice(1).join('—').trim()+'</div>';
    }
    return '<div class="row">'+line+'</div>';
  }).join('');
}
function cardHTML(c, viewPos, viewTotal){
  const badgeCls = c.difficulty==="REFERENCE" ? "badge REF" : "badge";
  let back;
  if(c.type==="reference"){
    back = '<div class="back face"><div class="meta"><span class="section">'+esc(c.section)+'</span>'+
      '<span class="'+badgeCls+'">REFERENCE</span></div>'+
      '<div class="scroll"><div class="title">'+esc(c.title)+'</div>'+
      '<div class="refbody">'+refRows(c.body)+'</div></div></div>';
  } else {
    back = '<div class="back face"><div class="meta"><span class="section">'+esc(c.section)+'</span>'+
      '<span class="'+badgeCls+'">'+esc(c.difficulty)+'</span></div>'+
      '<div class="scroll"><div class="title">'+esc(c.title)+'</div>'+
      '<div class="label">What it is</div><div class="body">'+esc(c.whatItIs)+'</div>'+
      '<div class="label">Example</div><div class="body">'+esc(c.example)+'</div></div></div>';
  }
  const front = '<div class="front face">'+
      '<div class="meta"><span class="section">'+esc(c.section)+'</span>'+
      '<span class="'+badgeCls+'">'+esc(c.difficulty)+'</span></div>'+
      '<div class="title">'+esc(c.title)+'</div>'+
      '<div class="meta"><span class="num">'+(c.type==="reference"?"REF":("Card "+c.cardNo))+'</span>'+
      '<span class="num">'+viewPos+' / '+viewTotal+'</span></div>'+
      '<div class="hint">tap to flip · swipe ✓ / ✗</div></div>';
  return '<div class="inner">'+front+back+'</div>'+
      '<div class="stamp know">GOT IT</div><div class="stamp dont">REVIEW</div>';
}

let cardEl = null;
function render(){
  const deck = $("deck");
  deck.innerHTML = "";
  const total = order.length;
  updateStats();
  if(total===0 || pos>=total){
    $("empty").style.display = "flex";
    $("emptyMsg").textContent = total===0 ? "No cards in this view." :
       "You've gone through all "+total+" cards in this view.";
    return;
  }
  $("empty").style.display = "none";
  const ci = order[pos];
  const c = CARDS[ci];
  const el = document.createElement("div");
  el.className = "card";
  el.innerHTML = cardHTML(c, pos+1, total);
  deck.appendChild(el);
  cardEl = el;
  attachGestures(el);
  $("pageInput").value = "";
  $("statPos").textContent = (pos+1)+" / "+total;
}

function updateStats(){
  const total = order.length;
  const knownInView = order.filter(i=>known[CARDS[i].n]).length;
  $("statKnown").textContent = "Known "+knownInView;
  $("statLeft").textContent = "Left "+Math.max(0,total-knownInView);
  const pct = total? Math.round(knownInView/total*100):0;
  $("barFill").style.width = pct+"%";
  $("subline").textContent = "dSights · "+CARDS.length+" cards · "+
     Object.values(known).filter(Boolean).length+" mastered";
}

/* ---------- flip ---------- */
function flip(){ if(cardEl) cardEl.classList.toggle("flipped"); }

/* ---------- swipe / decision ---------- */
function decide(gotIt){
  if(!cardEl) return;
  const c = CARDS[order[pos]];
  known[c.n] = gotIt ? true : (known[c.n]||false);
  if(!gotIt) delete known[c.n];
  save();
  const dir = gotIt ? 1 : -1;
  cardEl.style.transition = "transform .35s ease, opacity .35s ease";
  cardEl.style.transform = "translateX("+(dir*windowW()*1.2)+"px) rotate("+(dir*18)+"deg)";
  cardEl.style.opacity = "0";
  toast(gotIt ? "✓ Got it" : "✗ Marked for review");
  setTimeout(()=>{ pos++; render(); }, 280);
}
function windowW(){ return Math.max(window.innerWidth, 360); }

function attachGestures(el){
  let sx=0, sy=0, dx=0, dy=0, dragging=false, moved=false;
  const know = el.querySelector(".stamp.know");
  const dont = el.querySelector(".stamp.dont");
  function down(x,y){ dragging=true; moved=false; sx=x; sy=y; el.style.transition="none"; }
  function move(x,y){
    if(!dragging) return;
    dx=x-sx; dy=y-sy;
    if(Math.abs(dx)>6||Math.abs(dy)>6) moved=true;
    el.style.transform="translate("+dx+"px,"+dy*0.25+"px) rotate("+(dx*0.05)+"deg)";
    const k = Math.max(0,Math.min(1,dx/120));
    const d = Math.max(0,Math.min(1,-dx/120));
    know.style.opacity=k; dont.style.opacity=d;
  }
  function up(){
    if(!dragging) return;
    dragging=false;
    if(Math.abs(dx)>110){ decide(dx>0); return; }
    el.style.transition="transform .25s ease";
    el.style.transform=""; know.style.opacity=0; dont.style.opacity=0;
    if(!moved) flip();
  }
  el.addEventListener("touchstart",e=>down(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
  el.addEventListener("touchmove",e=>{move(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  el.addEventListener("touchend",up);
  // mouse (desktop testing)
  el.addEventListener("mousedown",e=>down(e.clientX,e.clientY));
  window.addEventListener("mousemove",e=>{ if(dragging) move(e.clientX,e.clientY); });
  window.addEventListener("mouseup",up);
}

/* ---------- toast ---------- */
let toastT;
function toast(msg){
  const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1100);
}

/* ---------- jump to page / card number ---------- */
function jump(){
  const v = parseInt($("pageInput").value,10);
  if(!v){ return; }
  // find card by printed cardNo (concept) first, else by sequential n
  let target = order.findIndex(i=>CARDS[i].cardNo===v);
  if(target<0) target = order.findIndex(i=>CARDS[i].n===v);
  if(target<0){ toast("No card #"+v+" in this view"); return; }
  pos = target; render();
}

/* ---------- buttons ---------- */
$("yesBtn").onclick = ()=>decide(true);
$("noBtn").onclick = ()=>decide(false);
$("flipBtn").onclick = flip;
$("goBtn").onclick = jump;
$("pageInput").addEventListener("keydown",e=>{ if(e.key==="Enter") jump(); });
$("shuffleBtn").onclick = ()=>{ shuffle(); pos=0; render(); toast("Shuffled"); };
$("restartBtn").onclick = ()=>{ pos=0; render(); };
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT") return;
  if(e.key==="ArrowRight") decide(true);
  else if(e.key==="ArrowLeft") decide(false);
  else if(e.key===" "||e.key==="ArrowUp"||e.key==="ArrowDown"){ e.preventDefault(); flip(); }
});

/* ---------- init ---------- */
buildOrder(); render();
</script>
</body>
</html>
