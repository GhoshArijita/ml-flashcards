<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1220">
<title>ML & DS Flashcards</title>
<style>
  :root{
    --bg:#0f1220; --panel:#171a2b; --card:#ffffff; --ink:#1a1d29; --muted:#6b7280;
    --line:#e6e8ef; --accent:#6366f1; --green:#16a34a; --red:#ef4444;
    --shadow:0 18px 50px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 600px at 50% -10%,#222843 0%,var(--bg) 60%);
    color:#e7e9f3; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; flex-direction:column; height:100dvh; overflow:hidden;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  header{padding:14px 16px 6px; flex:0 0 auto}
  .titlerow{display:flex; align-items:center; justify-content:space-between; gap:10px}
  .titlerow h1{font-size:16px; margin:0; font-weight:700; letter-spacing:.2px}
  .titlerow .sub{font-size:11px; color:#9aa0b4; margin-top:2px}
  .iconbtn{background:#222843; border:1px solid #2c3350; color:#cdd2e6; border-radius:10px;
    padding:7px 9px; font-size:12px; cursor:pointer; display:inline-flex; gap:5px; align-items:center}
  .iconbtn:active{transform:scale(.96)}
  .controls{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; align-items:center}
  select,input{background:#222843; border:1px solid #2c3350; color:#e7e9f3; border-radius:10px;
    padding:8px 10px; font-size:13px; outline:none}
  select{flex:1; min-width:120px}
  .jump{display:flex; gap:6px; align-items:center}
  .jump input{width:62px; text-align:center}
  .progresswrap{margin-top:10px}
  .bar{height:7px; background:#222843; border-radius:99px; overflow:hidden; border:1px solid #2c3350}
  .bar > i{display:block; height:100%; width:0;
    background:linear-gradient(90deg,#6366f1,#22c55e); transition:width .3s ease}
  .stats{display:flex; justify-content:space-between; font-size:11px; color:#9aa0b4; margin-top:6px}
  .stage{flex:1 1 auto; position:relative; display:flex; align-items:center; justify-content:center; padding:10px 16px 6px}
  .deck{position:relative; width:100%; max-width:440px; height:100%; max-height:560px}
  .card{
    position:absolute; inset:0; border-radius:22px; background:var(--card); color:var(--ink);
    box-shadow:var(--shadow); cursor:pointer; user-select:none;
    transform-style:preserve-3d; transition:transform .12s ease, opacity .2s ease;
    will-change:transform;
  }
  .card.flipped .inner{transform:rotateY(180deg)}
  .inner{position:absolute; inset:0; transition:transform .5s cubic-bezier(.2,.7,.2,1); transform-style:preserve-3d}
  .face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
    border-radius:22px; padding:22px 22px 18px; display:flex; flex-direction:column; overflow:hidden}
  .back{transform:rotateY(180deg); background:#fbfbfe}
  .meta{display:flex; align-items:center; justify-content:space-between; gap:8px}
  .section{font-size:11px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--accent)}
  .badge{font-size:10px; font-weight:700; letter-spacing:.5px; padding:4px 8px; border-radius:99px;
    background:#eef0fb; color:#4b50c4; white-space:nowrap}
  .badge.REF{background:#fdf0e6; color:#b5651d}
  .num{font-size:11px; color:#9aa0b4; font-weight:600}
  .front .title{font-size:clamp(22px,6.5vw,32px); font-weight:800; line-height:1.15; margin:auto 0;
    letter-spacing:-.3px}
  .hint{font-size:11px; color:#9aa0b4; text-align:center; margin-top:6px}
  .back .scroll{overflow:auto; -webkit-overflow-scrolling:touch; margin-top:10px; padding-right:2px}
  .back .title{font-size:18px; font-weight:800; margin:2px 0 2px}
  .label{font-size:10px; font-weight:800; letter-spacing:.8px; color:var(--accent); text-transform:uppercase; margin:14px 0 4px}
  .body{font-size:15px; line-height:1.5; color:#2a2d3a}
  .refbody{font-size:13.5px; line-height:1.55; color:#2a2d3a}
  .refbody .row{padding:6px 0; border-bottom:1px solid #eef0f4}
  .refbody .row:last-child{border-bottom:0}
  .refbody .k{font-weight:700; color:#1a1d29}
  .stamp{position:absolute; top:22px; font-size:24px; font-weight:900; letter-spacing:1px;
    padding:6px 12px; border-radius:10px; border:3px solid; opacity:0; transform:rotate(-12deg); pointer-events:none}
  .stamp.know{left:20px; color:var(--green); border-color:var(--green)}
  .stamp.dont{right:20px; color:var(--red); border-color:var(--red)}
  .footer{flex:0 0 auto; padding:8px 16px calc(14px + env(safe-area-inset-bottom)); display:flex;
    align-items:center; justify-content:center; gap:18px}
  .fab{width:62px; height:62px; border-radius:50%; border:none; font-size:24px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; box-shadow:0 10px 24px rgba(0,0,0,.3); color:#fff}
  .fab:active{transform:scale(.92)}
  .fab.no{background:linear-gradient(180deg,#ff6b6b,#ef4444)}
  .fab.flip{width:52px; height:52px; font-size:18px; background:#2c3350; color:#cdd2e6}
  .fab.yes{background:linear-gradient(180deg,#34d399,#16a34a)}
  .swipehint{text-align:center; font-size:11px; color:#7d8398; padding-bottom:6px}
  .empty{position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; color:#cdd2e6; padding:30px}
  .empty h2{margin:0 0 8px; font-size:22px}
  .empty p{margin:0 0 18px; color:#9aa0b4; font-size:14px; line-height:1.5}
  .empty button{background:var(--accent); color:#fff; border:none; padding:12px 20px; border-radius:12px; font-size:15px; cursor:pointer}
  .toast{position:fixed; left:50%; bottom:96px; transform:translateX(-50%) translateY(20px);
    background:#11131f; border:1px solid #2c3350; color:#e7e9f3; padding:9px 14px; border-radius:10px;
    font-size:13px; opacity:0; pointer-events:none; transition:.25s; z-index:30}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <div class="titlerow">
    <div>
      <h1>ML &amp; DS Flashcards</h1>
      <div class="sub" id="subline">dSights · 167 cards</div>
    </div>
    <button class="iconbtn" id="shuffleBtn" title="Shuffle">🔀 Shuffle</button>
  </div>
  <div class="controls">
    <select id="sectionSel" aria-label="Filter by section"></select>
    <div class="jump">
      <input id="pageInput" type="number" inputmode="numeric" min="1" placeholder="#" aria-label="Card number">
      <button class="iconbtn" id="goBtn">Go</button>
    </div>
  </div>
  <div class="progresswrap">
    <div class="bar"><i id="barFill"></i></div>
    <div class="stats">
      <span id="statKnown">Known 0</span>
      <span id="statPos">0 / 0</span>
      <span id="statLeft">Left 0</span>
    </div>
  </div>
</header>

<div class="stage">
  <div class="deck" id="deck"></div>
  <div class="empty" id="empty">
    <h2>🎉 All done!</h2>
    <p id="emptyMsg">You've gone through every card in this view.</p>
    <button id="restartBtn">Study again</button>
  </div>
</div>

<div class="footer">
  <button class="fab no" id="noBtn" title="Didn't know">✗</button>
  <button class="fab flip" id="flipBtn" title="Flip">⟳</button>
  <button class="fab yes" id="yesBtn" title="Got it">✓</button>
</div>
<div class="toast" id="toast"></div>

<script>
const CARDS = [{"n": 1, "cardNo": 1, "type": "concept", "section": "Foundations & Math", "difficulty": "BASIC", "title": "Machine Learning", "whatItIs": "A way to make computers learn patterns from data instead of being programmed with explicit rules; the model improves as it sees more examples.", "example": "Instead of writing rules to catch spam, you show the system thousands of labelled spam / not-spam emails and it learns the patterns itself."}, {"n": 2, "cardNo": 2, "type": "concept", "section": "Foundations & Math", "difficulty": "BASIC", "title": "Supervised vs Unsupervised vs Reinforcement", "whatItIs": "Three learning styles: supervised learns from labelled examples (input → known answer), unsupervised finds structure in unlabelled data, reinforcement learns by trial and error using rewards.", "example": "Supervised = predict loan default from labelled history; unsupervised = group customers by behaviour; reinforcement = a bot learning chess by winning and losing."}, {"n": 3, "cardNo": 3, "type": "concept", "section": "Foundations & Math", "difficulty": "BASIC", "title": "Features and Labels", "whatItIs": "Features are the input variables describing each example; the label is the answer you want the model to predict.", "example": "To predict a house price, features are size, location and bedrooms; the label is the actual sale price."}, {"n": 4, "cardNo": 4, "type": "concept", "section": "Foundations & Math", "difficulty": "BASIC", "title": "Train, Validation and Test Sets", "whatItIs": "Data is split so the model learns on one part (train), is tuned on another (validation), and is judged on data it has never seen (test).", "example": "From 10,000 records: train on 7,000, tune on 1,500, and keep 1,500 hidden for the final, honest score."}, {"n": 5, "cardNo": 5, "type": "concept", "section": "Foundations & Math", "difficulty": "BASIC", "title": "Vectors and Matrices", "whatItIs": "ML represents data as numbers in vectors (a list) and matrices (a grid); operations on them power nearly every algorithm.", "example": "One customer is a vector [age, income, tenure]; a whole dataset of customers stacked together forms a matrix."}, {"n": 6, "cardNo": 6, "type": "concept", "section": "Foundations & Math", "difficulty": "BASIC", "title": "Dot Product", "whatItIs": "Multiply two vectors element-by-element and sum the results; it measures how much two vectors point in the same direction.", "example": "A model score = weights · features. With weights [2,3] and features [1,4], the dot product is 2x1 + 3x4 = 14."}, {"n": 7, "cardNo": 7, "type": "concept", "section": "Foundations & Math", "difficulty": "BASIC", "title": "Probability Basics", "whatItIs": "A number from 0 to 1 expressing how likely an event is; ML models often output probabilities rather than hard yes/no answers.", "example": "A fraud model outputs 0.92, meaning it estimates a 92% chance the transaction is fraudulent."}, {"n": 8, "cardNo": 8, "type": "concept", "section": "Foundations & Math", "difficulty": "BASIC", "title": "Normal (Gaussian) Distribution", "whatItIs": "The bell-shaped curve where most values cluster near the mean and extremes are rare; many measurements and model assumptions rely on it.", "example": "Adult heights follow a bell curve: most people are near average, very few are extremely short or tall."}, {"n": 9, "cardNo": 9, "type": "concept", "section": "Foundations & Math", "difficulty": "BASIC", "title": "Mean, Variance and Standard Deviation", "whatItIs": "Mean is the average; variance measures spread; standard deviation is the square root of variance, in the same units as the data.", "example": "Two classes both average 70%, but one clusters tightly near 70 (low SD) while the other ranges 40-100 (high SD)."}, {"n": 10, "cardNo": 10, "type": "concept", "section": "Foundations & Math", "difficulty": "BASIC", "title": "Correlation vs Causation", "whatItIs": "Correlation means two things move together; causation means one actually drives the other. Correlation alone never proves cause.", "example": "Ice-cream sales and drownings both rise in summer, but ice cream doesn't cause drowning - hot weather drives both."}, {"n": 11, "cardNo": 11, "type": "concept", "section": "Foundations & Math", "difficulty": "BASIC", "title": "Bayes' Theorem", "whatItIs": "A rule for updating the probability of something after seeing new evidence, combining prior belief with how well the evidence fits.", "example": "A disease is rare (low prior). A positive test raises the probability, but because it's rare, many positives are still false alarms."}, {"n": 12, "cardNo": 12, "type": "concept", "section": "Foundations & Math", "difficulty": "BASIC", "title": "Gradient (Derivative Intuition)", "whatItIs": "The gradient is the slope: which direction and how steeply a function changes. ML uses it to know which way to adjust a model to cut error.", "example": "Standing on a hill in fog, the gradient is the downhill direction; following it leads you to the valley (the minimum)."}, {"n": 13, "cardNo": 13, "type": "concept", "section": "Foundations & Math", "difficulty": "BASIC", "title": "Loss / Cost Function", "whatItIs": "A single number measuring how wrong the model's predictions are. Training means changing the model to make this number as small as possible.", "example": "If the true price is $300k and the model predicts $250k, a squared-error loss penalises that $50k miss."}, {"n": 14, "cardNo": 14, "type": "concept", "section": "Data & Preprocessing", "difficulty": "BASIC", "title": "Data Cleaning & Missing Values", "whatItIs": "Real data has gaps, errors and duplicates. Cleaning fixes or removes them and fills (imputes) missing values before modelling.", "example": "A customer's age is blank; you fill it with the median age, or drop the row if too much else is missing."}, {"n": 15, "cardNo": 15, "type": "concept", "section": "Data & Preprocessing", "difficulty": "BASIC", "title": "Feature Scaling", "whatItIs": "Putting features on a comparable scale so large-range features don't dominate. Normalization squeezes to 0-1; standardization centres to mean 0, SD 1.", "example": "Income (0-200,000) and age (0-100) are rescaled so a distance-based model treats them fairly."}, {"n": 16, "cardNo": 16, "type": "concept", "section": "Data & Preprocessing", "difficulty": "BASIC", "title": "Encoding Categorical Variables", "whatItIs": "Models need numbers, so text categories are converted. One-hot makes a 0/1 column per category; label encoding assigns an integer.", "example": "Red/Green/Blue becomes three 0/1 columns, so the model never wrongly assumes Blue > Red."}, {"n": 17, "cardNo": 17, "type": "concept", "section": "Data & Preprocessing", "difficulty": "BASIC", "title": "Feature Engineering", "whatItIs": "Creating new, more useful inputs from raw data using domain knowledge - often the single biggest driver of model quality.", "example": "From a timestamp, deriving 'hour of day' and 'is weekend' predicts ride-hailing demand far better than the raw date."}, {"n": 18, "cardNo": 18, "type": "concept", "section": "Data & Preprocessing", "difficulty": "BASIC", "title": "Curse of Dimensionality", "whatItIs": "As the number of features grows, data becomes sparse and distances lose meaning, so models need exponentially more data to learn.", "example": "Finding nearest neighbours is easy with 2 features but nearly meaningless with 1,000 unless you have enormous data."}, {"n": 19, "cardNo": 19, "type": "concept", "section": "Data & Preprocessing", "difficulty": "BASIC", "title": "Data Leakage", "whatItIs": "When information unavailable at prediction time sneaks into training, giving falsely great results that collapse in production.", "example": "Using 'date account was closed' to predict churn - that fact only exists after the customer has already left."}, {"n": 20, "cardNo": 20, "type": "concept", "section": "Data & Preprocessing", "difficulty": "BASIC", "title": "Imbalanced Data", "whatItIs": "When one class is far rarer than another, a model can score high by ignoring the rare class; needs resampling or reweighting.", "example": "If 1% of transactions are fraud, a model that always predicts 'not fraud' is 99% accurate yet completely useless."}, {"n": 21, "cardNo": 21, "type": "concept", "section": "Data & Preprocessing", "difficulty": "BASIC", "title": "Outliers", "whatItIs": "Data points far from the rest. They may be errors or genuinely important rare events, and can distort models if mishandled.", "example": "A salary of $9,999,999 from a typo skews the average; a real large fraud is a meaningful outlier worth keeping."}, {"n": 22, "cardNo": 22, "type": "concept", "section": "Core Supervised Learning", "difficulty": "BASIC - MEDIUM", "title": "Linear Regression", "whatItIs": "Fits a straight line (or plane) to predict a continuous number from inputs, by minimising squared error.", "example": "Predicting price = w1 x size + w2 x bedrooms + b, drawing the best-fit line through past sales."}, {"n": 23, "cardNo": 23, "type": "concept", "section": "Core Supervised Learning", "difficulty": "BASIC - MEDIUM", "title": "Logistic Regression", "whatItIs": "Despite the name, a classification method. It outputs a probability between 0 and 1 via the sigmoid function, then thresholds it into a class.", "example": "Predicting whether a loan will default (yes/no), outputting '0.8 chance of default'."}, {"n": 24, "cardNo": 24, "type": "concept", "section": "Core Supervised Learning", "difficulty": "BASIC - MEDIUM", "title": "Decision Tree", "whatItIs": "A flowchart of yes/no questions that splits data into branches until reaching a prediction at the leaves; easy to interpret.", "example": "'Income > 50k? -> Owns home? -> Approve loan.' Each split narrows the decision."}, {"n": 25, "cardNo": 25, "type": "concept", "section": "Core Supervised Learning", "difficulty": "BASIC - MEDIUM", "title": "Random Forest", "whatItIs": "An ensemble of many decision trees trained on random subsets; their votes are averaged, which reduces overfitting and lifts accuracy.", "example": "500 slightly different trees each vote 'default or not', and the majority vote becomes the final answer."}, {"n": 26, "cardNo": 26, "type": "concept", "section": "Core Supervised Learning", "difficulty": "BASIC - MEDIUM", "title": "Gradient Boosting (XGBoost / LightGBM)", "whatItIs": "Builds trees sequentially, each new tree correcting the previous ones' mistakes; often the top performer on tabular data.", "example": "Tree 1 predicts roughly; tree 2 focuses on the cases tree 1 got wrong, and so on, sharpening the result."}, {"n": 27, "cardNo": 27, "type": "concept", "section": "Core Supervised Learning", "difficulty": "BASIC - MEDIUM", "title": "K-Nearest Neighbours (KNN)", "whatItIs": "Classifies a new point by the majority label of its 'k' closest known points; there is no real training, just storage and lookup.", "example": "To label a new fruit, look at the 5 most similar fruits by weight and colour; if most are apples, call it an apple."}, {"n": 28, "cardNo": 28, "type": "concept", "section": "Core Supervised Learning", "difficulty": "BASIC - MEDIUM", "title": "Naive Bayes", "whatItIs": "A fast probabilistic classifier applying Bayes' theorem, 'naively' assuming features are independent; very strong for text.", "example": "Classifying email as spam by combining the individual probabilities of words like 'free', 'win' and 'prize'."}, {"n": 29, "cardNo": 29, "type": "concept", "section": "Core Supervised Learning", "difficulty": "BASIC - MEDIUM", "title": "Support Vector Machine (SVM)", "whatItIs": "Finds the boundary that separates classes with the widest possible margin; kernels let it handle curved boundaries.", "example": "Drawing the line that separates 'approve' from 'reject' applicants with the biggest possible gap between the two groups."}, {"n": 30, "cardNo": 30, "type": "concept", "section": "Core Supervised Learning", "difficulty": "BASIC - MEDIUM", "title": "Bagging vs Boosting", "whatItIs": "Two ensemble strategies. Bagging trains models in parallel on random samples and averages them (cuts variance); boosting trains them in sequence to fix errors (cuts bias).", "example": "Random Forest is bagging; XGBoost is boosting."}, {"n": 31, "cardNo": 31, "type": "concept", "section": "Unsupervised Learning", "difficulty": "MEDIUM", "title": "K-Means Clustering", "whatItIs": "Groups data into k clusters by repeatedly assigning points to the nearest centre and moving each centre to the mean of its points.", "example": "Segmenting customers into 4 groups by spend and frequency, with no pre-existing labels."}, {"n": 32, "cardNo": 32, "type": "concept", "section": "Unsupervised Learning", "difficulty": "MEDIUM", "title": "Hierarchical Clustering", "whatItIs": "Builds a tree of clusters by repeatedly merging the closest groups, letting you choose the number of clusters afterwards.", "example": "Grouping species into a tree where the most similar merge first, forming a dendrogram you can cut at any level."}, {"n": 33, "cardNo": 33, "type": "concept", "section": "Unsupervised Learning", "difficulty": "MEDIUM", "title": "DBSCAN", "whatItIs": "Density-based clustering that groups closely packed points and labels sparse points as noise; it finds arbitrary shapes and needs no k upfront.", "example": "Detecting dense crowd clusters on a map while flagging isolated individuals as outliers."}, {"n": 34, "cardNo": 34, "type": "concept", "section": "Unsupervised Learning", "difficulty": "MEDIUM", "title": "Principal Component Analysis (PCA)", "whatItIs": "Reduces many correlated features to a few new axes (components) that capture most of the variation, for compression and visualisation.", "example": "Compressing 50 survey questions into 2 components that still explain most of the differences between respondents."}, {"n": 35, "cardNo": 35, "type": "concept", "section": "Unsupervised Learning", "difficulty": "MEDIUM", "title": "t-SNE / UMAP", "whatItIs": "Techniques that project high-dimensional data down to 2-D or 3-D so you can visually see clusters, preserving local neighbourhoods.", "example": "Plotting thousands of word embeddings on a 2-D map where similar words land close together."}, {"n": 36, "cardNo": 36, "type": "concept", "section": "Unsupervised Learning", "difficulty": "MEDIUM", "title": "Association Rule Mining", "whatItIs": "Finds items that frequently occur together, producing if-then rules scored by support and confidence.", "example": "'Customers who buy bread and butter also buy jam' - the classic market-basket recommendation."}, {"n": 37, "cardNo": 37, "type": "concept", "section": "Model Evaluation & Tuning", "difficulty": "MEDIUM", "title": "Overfitting vs Underfitting", "whatItIs": "Overfitting means the model memorises training data and fails on new data; underfitting means it's too simple to capture the pattern.", "example": "Overfit: a student memorising past answers; underfit: studying only one page. Both fail the real exam."}, {"n": 38, "cardNo": 38, "type": "concept", "section": "Model Evaluation & Tuning", "difficulty": "MEDIUM", "title": "Bias-Variance Tradeoff", "whatItIs": "Bias is error from oversimplifying; variance is error from being too sensitive to the training data. Lowering one often raises the other.", "example": "A straight line (high bias) vs a wiggly curve through every point (high variance) - the sweet spot sits in between."}, {"n": 39, "cardNo": 39, "type": "concept", "section": "Model Evaluation & Tuning", "difficulty": "MEDIUM", "title": "Cross-Validation", "whatItIs": "Splitting data into k folds and training/testing k times so every record is tested once, giving a more reliable performance estimate.", "example": "5-fold CV trains on 4/5 of the data and tests on the last 1/5, rotating five times and averaging the scores."}, {"n": 40, "cardNo": 40, "type": "concept", "section": "Model Evaluation & Tuning", "difficulty": "MEDIUM", "title": "Confusion Matrix", "whatItIs": "A table of correct and incorrect predictions per class: true positives, true negatives, false positives and false negatives.", "example": "Of 100 fraud cases, it shows 80 caught (TP) and 20 missed (FN), plus how many legitimate ones were wrongly flagged (FP)."}, {"n": 41, "cardNo": 41, "type": "concept", "section": "Model Evaluation & Tuning", "difficulty": "MEDIUM", "title": "Precision, Recall and F1", "whatItIs": "Precision: of flagged positives, how many were right. Recall: of actual positives, how many were caught. F1 balances the two.", "example": "A cancer screen with high recall catches most cases; high precision means few false alarms; F1 summarises the trade-off."}, {"n": 42, "cardNo": 42, "type": "concept", "section": "Model Evaluation & Tuning", "difficulty": "MEDIUM", "title": "ROC Curve and AUC", "whatItIs": "The ROC curve plots true-positive vs false-positive rate across thresholds; AUC summarises it as one 0.5-1.0 score of ranking quality.", "example": "AUC 0.5 is random guessing; 0.9 means the model ranks a random positive above a random negative 90% of the time."}, {"n": 43, "cardNo": 43, "type": "concept", "section": "Model Evaluation & Tuning", "difficulty": "MEDIUM", "title": "Regularization (L1 / L2)", "whatItIs": "Penalising large model weights to prevent overfitting. L1 (Lasso) can zero out features entirely; L2 (Ridge) shrinks them smoothly.", "example": "Adding an L1 penalty drops irrelevant features automatically, leaving a simpler, more robust model."}, {"n": 44, "cardNo": 44, "type": "concept", "section": "Model Evaluation & Tuning", "difficulty": "MEDIUM", "title": "Hyperparameter Tuning", "whatItIs": "Hyperparameters are settings chosen before training (tree depth, learning rate). Tuning searches combinations via grid or random search.", "example": "Trying tree depths of 3, 5 and 10 with grid search to see which gives the best validation score."}, {"n": 45, "cardNo": 45, "type": "concept", "section": "Model Evaluation & Tuning", "difficulty": "MEDIUM", "title": "Gradient Descent (Batch, SGD, Mini-batch)", "whatItIs": "The optimisation that nudges weights downhill on the loss. Batch uses all data per step, stochastic uses one example, mini-batch a small group.", "example": "A mini-batch of 32 examples per update is the common balance of speed and stability in deep learning."}, {"n": 46, "cardNo": 46, "type": "concept", "section": "Model Evaluation & Tuning", "difficulty": "MEDIUM", "title": "Learning Rate", "whatItIs": "How big a step gradient descent takes each update. Too high overshoots and diverges; too low trains painfully slowly.", "example": "Like walking downhill: huge leaps bounce past the valley, while tiny shuffles take forever to arrive."}, {"n": 47, "cardNo": 47, "type": "concept", "section": "Neural Networks", "difficulty": "MEDIUM - ADVANCED", "title": "Perceptron", "whatItIs": "The simplest neural unit: it multiplies inputs by weights, adds a bias, and fires 0 or 1 through a step function. The building block of all neural nets.", "example": "Inputs [hours studied, hours slept] x weights, summed; above a threshold it predicts 'pass', otherwise 'fail'."}, {"n": 48, "cardNo": 48, "type": "concept", "section": "Neural Networks", "difficulty": "MEDIUM - ADVANCED", "title": "Multilayer Perceptron (MLP)", "whatItIs": "Stacking layers of perceptrons with non-linear activations, so the network learns curved, complex relationships a single perceptron cannot.", "example": "A 3-layer network can learn the XOR pattern, which one perceptron alone can never separate."}, {"n": 49, "cardNo": 49, "type": "concept", "section": "Neural Networks", "difficulty": "MEDIUM - ADVANCED", "title": "Activation Functions", "whatItIs": "Non-linear functions applied at each neuron so the network can model complexity. Common ones: sigmoid, tanh, ReLU, and softmax for output probabilities.", "example": "ReLU passes positive values unchanged and turns negatives into 0, helping deep networks train quickly."}, {"n": 50, "cardNo": 50, "type": "concept", "section": "Neural Networks", "difficulty": "MEDIUM - ADVANCED", "title": "Forward Propagation", "whatItIs": "Passing input through the network layer by layer - multiply by weights, add bias, apply activation - until it produces an output prediction.", "example": "An image's pixels flow through the layers and out comes '85% cat, 15% dog'."}, {"n": 51, "cardNo": 51, "type": "concept", "section": "Neural Networks", "difficulty": "MEDIUM - ADVANCED", "title": "Loss Function (Neural Networks)", "whatItIs": "Measures the gap between the network's output and the true answer - the value the network tries to minimise. Cross-entropy for classification, MSE for regression.", "example": "Cross-entropy loss is high when the network confidently predicts 'dog' but the truth is 'cat'."}, {"n": 52, "cardNo": 52, "type": "concept", "section": "Neural Networks", "difficulty": "MEDIUM - ADVANCED", "title": "Backpropagation", "whatItIs": "The algorithm that sends the output error backward through the network, using the chain rule to find how much each weight contributed, so they can be adjusted.", "example": "After a wrong prediction, blame flows backward: each weight learns 'you pushed the answer this far in the wrong direction'."}, {"n": 53, "cardNo": 53, "type": "concept", "section": "Neural Networks", "difficulty": "MEDIUM - ADVANCED", "title": "Optimizers (Momentum, Adam)", "whatItIs": "Smarter versions of gradient descent that adapt step sizes and use past gradients to converge faster and more stably. Adam is the popular default.", "example": "Momentum is like a ball rolling downhill gathering speed; Adam also tunes the pace for each weight automatically."}, {"n": 54, "cardNo": 54, "type": "concept", "section": "Neural Networks", "difficulty": "MEDIUM - ADVANCED", "title": "Vanishing & Exploding Gradients", "whatItIs": "In deep networks, gradients can shrink toward zero (learning stalls) or blow up (training diverges) as they propagate back through many layers.", "example": "With sigmoid in many layers, early-layer gradients become tiny, so the first layers barely learn anything."}, {"n": 55, "cardNo": 55, "type": "concept", "section": "Neural Networks", "difficulty": "MEDIUM - ADVANCED", "title": "Weight Initialization", "whatItIs": "Setting starting weights sensibly (e.g. Xavier, He) so signals neither vanish nor explode early in training.", "example": "Starting all weights at zero is fatal - every neuron learns the same thing; small random values break that symmetry."}, {"n": 56, "cardNo": 56, "type": "concept", "section": "Neural Networks", "difficulty": "MEDIUM - ADVANCED", "title": "Batch Normalization", "whatItIs": "Normalising the inputs to each layer during training, which stabilises and speeds up learning and adds mild regularisation.", "example": "Keeping each layer's inputs at a steady scale lets you train deeper networks with higher learning rates."}, {"n": 57, "cardNo": 57, "type": "concept", "section": "Neural Networks", "difficulty": "MEDIUM - ADVANCED", "title": "Dropout", "whatItIs": "Randomly switching off a fraction of neurons during each training step so the network can't over-rely on any one, which reduces overfitting.", "example": "With 50% dropout the network learns redundant, robust features - like a team that still performs when members are absent."}, {"n": 58, "cardNo": 58, "type": "concept", "section": "Neural Networks", "difficulty": "MEDIUM - ADVANCED", "title": "Epochs, Batches and Iterations", "whatItIs": "An epoch is one full pass over the data; a batch is the subset used per weight update; an iteration is one update.", "example": "10,000 samples with batch size 100 = 100 iterations per epoch; 20 epochs means 20 full passes over the data."}, {"n": 59, "cardNo": 59, "type": "concept", "section": "Deep Learning Architectures", "difficulty": "ADVANCED", "title": "Convolutional Neural Network (CNN)", "whatItIs": "Slides small filters across an image to detect local patterns (edges, textures, shapes), building up to whole-object recognition. Ideal for images.", "example": "Early layers spot edges, deeper layers combine them into eyes and faces for photo classification."}, {"n": 60, "cardNo": 60, "type": "concept", "section": "Deep Learning Architectures", "difficulty": "ADVANCED", "title": "Pooling and Filters", "whatItIs": "Filters (kernels) are small weight grids that detect features; pooling shrinks the feature maps, keeping the strongest signals and cutting computation.", "example": "Max-pooling takes the largest value in each 2x2 region, halving image size while keeping the key features."}, {"n": 61, "cardNo": 61, "type": "concept", "section": "Deep Learning Architectures", "difficulty": "ADVANCED", "title": "Recurrent Neural Network (RNN)", "whatItIs": "A network with a memory loop that processes a sequence one step at a time, passing a hidden state forward - suited to text, speech and time order.", "example": "Reading a sentence word by word, carrying context so 'bank' near 'river' differs from 'bank' near 'money'."}, {"n": 62, "cardNo": 62, "type": "concept", "section": "Deep Learning Architectures", "difficulty": "ADVANCED", "title": "LSTM & GRU", "whatItIs": "Improved RNNs with gates that control what to remember and forget, solving the vanishing-gradient problem over long sequences.", "example": "An LSTM remembers a subject mentioned 20 words earlier to correctly choose 'he' vs 'they' later in the sentence."}, {"n": 63, "cardNo": 63, "type": "concept", "section": "Deep Learning Architectures", "difficulty": "ADVANCED", "title": "Encoder-Decoder (Seq2Seq)", "whatItIs": "One network compresses an input sequence into a context vector (encoder), and another generates an output sequence from it (decoder).", "example": "Translation: the encoder reads the English sentence, the decoder writes the French one."}, {"n": 64, "cardNo": 64, "type": "concept", "section": "Deep Learning Architectures", "difficulty": "ADVANCED", "title": "Attention Mechanism", "whatItIs": "Lets a model focus on the most relevant parts of the input when producing each output, instead of squeezing everything into one fixed vector.", "example": "When translating a word, attention 'looks back' at the specific source words that matter most for it."}, {"n": 65, "cardNo": 65, "type": "concept", "section": "Deep Learning Architectures", "difficulty": "ADVANCED", "title": "Transformers", "whatItIs": "An architecture built entirely on attention (no recurrence), processing all positions in parallel. The foundation of modern large language models.", "example": "GPT and BERT are transformers; they read a whole sentence at once rather than word by word, enabling huge scale."}, {"n": 66, "cardNo": 66, "type": "concept", "section": "Deep Learning Architectures", "difficulty": "ADVANCED", "title": "Self-Attention & Multi-Head Attention", "whatItIs": "Self-attention lets every token weigh every other token in the same sequence; multiple 'heads' capture different relationship types in parallel.", "example": "In 'the animal didn't cross because it was tired', self-attention links 'it' back to 'animal'."}, {"n": 67, "cardNo": 67, "type": "concept", "section": "Deep Learning Architectures", "difficulty": "ADVANCED", "title": "Positional Encoding", "whatItIs": "Because transformers see all tokens at once with no built-in order, positional encodings add information about each token's position.", "example": "Without it, 'dog bites man' and 'man bites dog' would look identical to the model."}, {"n": 68, "cardNo": 68, "type": "concept", "section": "Deep Learning Architectures", "difficulty": "ADVANCED", "title": "Transfer Learning", "whatItIs": "Reusing a model pre-trained on huge data and fine-tuning it on your smaller, specific task - saving data, time and compute.", "example": "Taking a model trained on millions of images and adapting it to classify your products with only a few thousand photos."}, {"n": 69, "cardNo": 69, "type": "concept", "section": "Deep Learning Architectures", "difficulty": "ADVANCED", "title": "Autoencoders", "whatItIs": "Networks that compress input into a small code (encoder) and reconstruct it (decoder); used for compression, denoising and anomaly detection.", "example": "Trained on normal machine data, an autoencoder reconstructs faults poorly - high reconstruction error flags an anomaly."}, {"n": 70, "cardNo": 70, "type": "concept", "section": "Deep Learning Architectures", "difficulty": "ADVANCED", "title": "Generative Adversarial Networks (GANs)", "whatItIs": "Two networks compete: a generator creates fake samples and a discriminator tries to spot them, pushing the generator toward realistic data.", "example": "Generating photorealistic faces of people who don't exist, as the two networks keep improving against each other."}, {"n": 71, "cardNo": 71, "type": "concept", "section": "Deep Learning Architectures", "difficulty": "ADVANCED", "title": "Embeddings", "whatItIs": "Dense numeric vectors that represent items (words, products, users) so that similar items sit close together in vector space.", "example": "'king' - 'man' + 'woman' is approximately 'queen' - embeddings capture meaning as geometry."}, {"n": 72, "cardNo": 72, "type": "concept", "section": "Natural Language Processing", "difficulty": "MEDIUM - ADVANCED", "title": "Tokenization", "whatItIs": "Splitting text into smaller units (words, subwords or characters) that the model can process.", "example": "'unhappiness' may split into the subword tokens 'un', 'happi', 'ness', so even rare words still get represented."}, {"n": 73, "cardNo": 73, "type": "concept", "section": "Natural Language Processing", "difficulty": "MEDIUM - ADVANCED", "title": "Stemming & Lemmatization", "whatItIs": "Reducing words to a base form. Stemming chops crudely; lemmatization uses grammar to find the proper dictionary form.", "example": "'running / ran / runs' all stem to 'run'; lemmatization maps 'better' to 'good'."}, {"n": 74, "cardNo": 74, "type": "concept", "section": "Natural Language Processing", "difficulty": "MEDIUM - ADVANCED", "title": "Stop Words", "whatItIs": "Extremely common words (the, is, and) that often carry little meaning and may be removed to focus on the informative terms.", "example": "'The cat sat on the mat' reduces to 'cat sat mat' for a keyword search."}, {"n": 75, "cardNo": 75, "type": "concept", "section": "Natural Language Processing", "difficulty": "MEDIUM - ADVANCED", "title": "Bag of Words", "whatItIs": "Representing text as counts of each word, ignoring order. Simple, but it loses sequence and context.", "example": "'dog bites man' and 'man bites dog' get the identical bag {dog:1, bites:1, man:1}."}, {"n": 76, "cardNo": 76, "type": "concept", "section": "Natural Language Processing", "difficulty": "MEDIUM - ADVANCED", "title": "TF-IDF", "whatItIs": "Weights words by how frequent they are in a document but rare across all documents, highlighting the distinctive terms.", "example": "'the' appears everywhere so scores low; 'photosynthesis' in a biology document scores high and signals the topic."}, {"n": 77, "cardNo": 77, "type": "concept", "section": "Natural Language Processing", "difficulty": "MEDIUM - ADVANCED", "title": "N-grams", "whatItIs": "Sequences of n consecutive words (or characters) that capture some local order which single words miss.", "example": "The bigram 'New York' carries meaning that the separate words 'New' and 'York' lose."}, {"n": 78, "cardNo": 78, "type": "concept", "section": "Natural Language Processing", "difficulty": "MEDIUM - ADVANCED", "title": "Word Embeddings (Word2Vec, GloVe)", "whatItIs": "Learned dense vectors where words used in similar contexts have similar vectors, capturing meaning numerically.", "example": "'Paris' and 'London' land near each other, and 'Paris' - 'France' + 'Italy' is approximately 'Rome'."}, {"n": 79, "cardNo": 79, "type": "concept", "section": "Natural Language Processing", "difficulty": "MEDIUM - ADVANCED", "title": "Cosine Similarity", "whatItIs": "Measures the angle between two vectors to gauge how similar they are, ignoring magnitude; values near 1 mean very similar.", "example": "Scoring how closely a sales lead's profile matches your ideal-customer vector, to rank prospects."}, {"n": 80, "cardNo": 80, "type": "concept", "section": "Natural Language Processing", "difficulty": "MEDIUM - ADVANCED", "title": "Named Entity Recognition (NER)", "whatItIs": "Detecting and classifying named things in text - people, places, organisations, dates and amounts.", "example": "In 'Apple opened in Mumbai in 2024', NER tags Apple = ORG, Mumbai = LOCATION, 2024 = DATE."}, {"n": 81, "cardNo": 81, "type": "concept", "section": "Natural Language Processing", "difficulty": "MEDIUM - ADVANCED", "title": "Part-of-Speech (POS) Tagging", "whatItIs": "Labelling each word with its part of speech (noun, verb, adjective...), which helps parsing and meaning.", "example": "In 'book a flight', POS tagging knows 'book' is a verb here, not a noun."}, {"n": 82, "cardNo": 82, "type": "concept", "section": "Natural Language Processing", "difficulty": "MEDIUM - ADVANCED", "title": "Language Models", "whatItIs": "Models that learn the probability of word sequences, predicting the next token from context - the basis of text generation.", "example": "Given 'The capital of France is', the model assigns very high probability to 'Paris'."}, {"n": 83, "cardNo": 83, "type": "concept", "section": "Natural Language Processing", "difficulty": "MEDIUM - ADVANCED", "title": "BERT", "whatItIs": "A transformer trained to understand text bidirectionally by predicting masked words; strong for classification, search and Q&A.", "example": "BERT fills the blank in 'I went to the [MASK] to deposit money' with 'bank', using context from both sides."}, {"n": 84, "cardNo": 84, "type": "concept", "section": "Natural Language Processing", "difficulty": "MEDIUM - ADVANCED", "title": "GPT & Autoregressive Models", "whatItIs": "Transformers that generate text left to right, predicting each next token from all previous ones - the basis of modern chat and writing assistants.", "example": "Given a prompt, GPT produces the next word, then the next, building up a fluent response."}, {"n": 85, "cardNo": 85, "type": "concept", "section": "Natural Language Processing", "difficulty": "MEDIUM - ADVANCED", "title": "Fine-tuning vs Prompting", "whatItIs": "Fine-tuning retrains a model's weights on your data; prompting steers a frozen model using instructions and examples in the input.", "example": "Prompting: 'Classify this review as positive/negative...'; fine-tuning: training on 5,000 of your own labelled reviews."}, {"n": 86, "cardNo": 86, "type": "concept", "section": "Advanced & Production", "difficulty": "ADVANCED", "title": "Reinforcement Learning", "whatItIs": "An agent learns by acting in an environment and receiving rewards or penalties, optimising long-term reward through trial and error.", "example": "A delivery-routing agent earns reward for fast, fuel-efficient routes and learns better policies over time."}, {"n": 87, "cardNo": 87, "type": "concept", "section": "Advanced & Production", "difficulty": "ADVANCED", "title": "Q-Learning", "whatItIs": "A reinforcement-learning method that learns the value (Q) of taking each action in each state, then favours actions with the highest expected reward.", "example": "A maze-solving agent learns which turns eventually lead to the exit by updating action values from experience."}, {"n": 88, "cardNo": 88, "type": "concept", "section": "Advanced & Production", "difficulty": "ADVANCED", "title": "Explainability (SHAP & LIME)", "whatItIs": "Techniques that explain why a model made a prediction by attributing it to individual features - vital for trust and regulation.", "example": "SHAP shows a loan was declined mainly due to a high debt-to-income ratio and a short credit history."}, {"n": 89, "cardNo": 89, "type": "concept", "section": "Advanced & Production", "difficulty": "ADVANCED", "title": "Feature Store", "whatItIs": "A central system to define, store, serve and reuse features consistently across training and live serving, avoiding duplication and skew.", "example": "The '30-day average spend' feature is computed once and reused by the churn, fraud and growth models alike."}, {"n": 90, "cardNo": 90, "type": "concept", "section": "Advanced & Production", "difficulty": "ADVANCED", "title": "Model Drift & Monitoring", "whatItIs": "Live data changes over time, degrading accuracy (data and concept drift). Monitoring tracks inputs and performance to trigger retraining.", "example": "A spending model trained pre-pandemic misreads new behaviour; monitoring catches the accuracy drop and signals a refresh."}, {"n": 91, "cardNo": 91, "type": "concept", "section": "Advanced & Production", "difficulty": "ADVANCED", "title": "A/B Testing", "whatItIs": "Randomly splitting users into groups to compare a new model or feature against the current one and measure the real-world impact.", "example": "Half of users get the new recommendation model; if their purchases rise significantly, it wins."}, {"n": 92, "cardNo": 92, "type": "concept", "section": "Advanced & Production", "difficulty": "ADVANCED", "title": "MLOps", "whatItIs": "Practices and tooling to build, deploy, version, monitor and retrain models reliably in production - DevOps for machine learning.", "example": "An automated pipeline retrains, tests and safely rolls out a new fraud model every week with no manual steps."}, {"n": 93, "cardNo": 93, "type": "concept", "section": "Advanced & Production", "difficulty": "ADVANCED", "title": "Anomaly Detection", "whatItIs": "Identifying rare points that deviate sharply from normal patterns, often without any labelled examples of the anomaly.", "example": "Flagging a sudden $20,000 charge on a card that normally sees $50 purchases."}, {"n": 94, "cardNo": 94, "type": "concept", "section": "Advanced & Production", "difficulty": "ADVANCED", "title": "Recommendation Systems", "whatItIs": "Predicting what a user will like via collaborative filtering (similar users), content-based methods (similar items), or hybrids.", "example": "'Customers who bought this also bought...' suggests products based on similar shoppers' behaviour."}, {"n": 95, "cardNo": 95, "type": "concept", "section": "Health Economics", "difficulty": "APPLIED", "title": "Health Economics", "whatItIs": "The study of how scarce healthcare resources are allocated - weighing the costs and health outcomes of treatments, programmes and policies.", "example": "Deciding whether a system should fund an expensive new drug given its benefit and a fixed budget."}, {"n": 96, "cardNo": 96, "type": "concept", "section": "Health Economics", "difficulty": "APPLIED", "title": "Cost-Effectiveness Analysis (CEA)", "whatItIs": "Compares the cost of interventions against an outcome in natural units (e.g. life-years gained), expressed as cost per unit of effect.", "example": "Drug A costs $5,000 per extra life-year, Drug B costs $12,000 - CEA favours A if their outcomes are similar."}, {"n": 97, "cardNo": 97, "type": "concept", "section": "Health Economics", "difficulty": "APPLIED", "title": "Cost-Utility Analysis (CUA)", "whatItIs": "A form of CEA where outcomes are measured in quality-adjusted life years, capturing both the length and the quality of life.", "example": "A treatment that extends life but with severe side effects may score worse than a gentler option under CUA."}, {"n": 98, "cardNo": 98, "type": "concept", "section": "Health Economics", "difficulty": "APPLIED", "title": "QALY (Quality-Adjusted Life Year)", "whatItIs": "One year in perfect health = 1 QALY; years in impaired health count for less. It combines length and quality of life into one number.", "example": "Two years lived at 0.5 health-related quality of life equals 1 QALY."}, {"n": 99, "cardNo": 99, "type": "concept", "section": "Health Economics", "difficulty": "APPLIED", "title": "DALY (Disability-Adjusted Life Year)", "whatItIs": "One DALY is one healthy year of life lost, summing years lost to early death and years lived with disability; used to measure disease burden.", "example": "A region's malaria burden is expressed as the total DALYs lost per year."}, {"n": 100, "cardNo": 100, "type": "concept", "section": "Health Economics", "difficulty": "APPLIED", "title": "ICER (Incremental Cost-Effectiveness Ratio)", "whatItIs": "The extra cost of a new treatment divided by its extra health benefit versus the alternative - the central number in funding decisions.", "example": "ICER = (cost_new - cost_old) / (QALY_new - QALY_old) = $30,000 per QALY gained."}, {"n": 101, "cardNo": 101, "type": "concept", "section": "Health Economics", "difficulty": "APPLIED", "title": "Cost-Benefit Analysis (CBA)", "whatItIs": "Values both costs and health outcomes in money, so interventions in different sectors can be compared on a common scale.", "example": "Expressing a vaccination programme's benefit in dollars to compare it against a road-safety project."}, {"n": 102, "cardNo": 102, "type": "concept", "section": "Health Economics", "difficulty": "APPLIED", "title": "Markov Models (Health Economics)", "whatItIs": "Models that move patients between health states (healthy, sick, dead) over cycles with set transition probabilities, to project long-term costs and outcomes.", "example": "Simulating a chronic-disease cohort year by year to estimate lifetime treatment cost and QALYs."}, {"n": 103, "cardNo": 103, "type": "concept", "section": "Health Economics", "difficulty": "APPLIED", "title": "Discounting", "whatItIs": "Future costs and health benefits are worth less than present ones, so they're reduced by an annual discount rate to compare them fairly today.", "example": "A benefit 10 years away is discounted at, say, 3% per year before being added to today's totals."}, {"n": 104, "cardNo": 104, "type": "concept", "section": "Health Economics", "difficulty": "APPLIED", "title": "Willingness-to-Pay Threshold", "whatItIs": "The maximum a payer will spend per unit of health gain (e.g. per QALY). Treatments below it are judged cost-effective.", "example": "With a $50,000/QALY threshold, an intervention at $30,000/QALY is funded; one at $90,000/QALY likely isn't."}, {"n": 105, "cardNo": 105, "type": "concept", "section": "Health Economics", "difficulty": "APPLIED", "title": "Budget Impact Analysis", "whatItIs": "Estimates the total cost to a budget of adopting a new intervention across the whole eligible population over time - affordability, not just efficiency.", "example": "A cost-effective drug may still be rejected if treating every eligible patient would blow the annual budget."}, {"n": 106, "cardNo": 106, "type": "concept", "section": "Health Economics", "difficulty": "APPLIED", "title": "Sensitivity Analysis", "whatItIs": "Testing how results change when uncertain inputs (costs, effectiveness, discount rate) are varied, to gauge how robust a conclusion is.", "example": "Re-running the model with the drug 20% more expensive to check whether it stays cost-effective."}, {"n": 107, "cardNo": 107, "type": "concept", "section": "Health Economics", "difficulty": "APPLIED", "title": "Health Technology Assessment (HTA)", "whatItIs": "A structured evaluation of a health technology's clinical effectiveness, cost-effectiveness and broader impact, informing coverage decisions.", "example": "An HTA body reviews the evidence before recommending whether a national system should reimburse a new device."}, {"n": 108, "cardNo": 108, "type": "concept", "section": "Health Economics", "difficulty": "APPLIED", "title": "Real-World Evidence (RWE)", "whatItIs": "Evidence on a treatment's effects drawn from routine real-world data (claims, registries, records) rather than controlled trials.", "example": "Using insurance claims to see how a drug performs across ordinary patients, not only trial volunteers."}, {"n": 109, "cardNo": 109, "type": "concept", "section": "Health Economics", "difficulty": "APPLIED", "title": "ML in Health Economics", "whatItIs": "Machine learning strengthens health-economic work through risk stratification, cost prediction and outcome modelling on large real-world datasets.", "example": "A model predicts which patients will be high-cost next year, so care and budgets can be targeted early."}, {"n": 110, "cardNo": 110, "type": "concept", "section": "Genetic Coding & Bioinformatics", "difficulty": "APPLIED", "title": "DNA, RNA and Genes", "whatItIs": "DNA stores genetic instructions as sequences of four bases (A, C, G, T); genes are segments that code for products; RNA carries DNA's message to build proteins.", "example": "A gene is a recipe in the DNA cookbook; RNA is the copied page taken to the kitchen to be made."}, {"n": 111, "cardNo": 111, "type": "concept", "section": "Genetic Coding & Bioinformatics", "difficulty": "APPLIED", "title": "The Genetic Code & Codons", "whatItIs": "DNA/RNA is read in three-base units called codons, each specifying an amino acid or a stop signal - the rule that maps genes to proteins.", "example": "The codon AUG means 'start' and codes for methionine; UAA means 'stop'."}, {"n": 112, "cardNo": 112, "type": "concept", "section": "Genetic Coding & Bioinformatics", "difficulty": "APPLIED", "title": "Transcription & Translation", "whatItIs": "Transcription copies a gene's DNA into messenger RNA; translation reads that mRNA in codons to assemble amino acids into a protein.", "example": "DNA -> (transcription) -> mRNA -> (translation) -> protein: the central dogma of molecular biology."}, {"n": 113, "cardNo": 113, "type": "concept", "section": "Genetic Coding & Bioinformatics", "difficulty": "APPLIED", "title": "Genome", "whatItIs": "The complete set of an organism's DNA, including all genes and non-coding regions. The human genome holds about 3 billion base pairs.", "example": "Sequencing a person's genome reads all roughly 3 billion letters of their genetic code."}, {"n": 114, "cardNo": 114, "type": "concept", "section": "Genetic Coding & Bioinformatics", "difficulty": "APPLIED", "title": "DNA Sequencing", "whatItIs": "Determining the exact order of bases in a DNA strand. Modern high-throughput sequencing produces enormous datasets for analysis.", "example": "Next-generation sequencing reads millions of short DNA fragments that are later assembled into a full sequence."}, {"n": 115, "cardNo": 115, "type": "concept", "section": "Genetic Coding & Bioinformatics", "difficulty": "APPLIED", "title": "SNPs (Single-Nucleotide Polymorphisms)", "whatItIs": "Single-base differences in DNA between individuals - the most common type of genetic variation, often linked to traits or disease risk.", "example": "A single base change (A to G) at one position may raise the risk of a particular disease."}, {"n": 116, "cardNo": 116, "type": "concept", "section": "Genetic Coding & Bioinformatics", "difficulty": "APPLIED", "title": "Gene Expression", "whatItIs": "How actively a gene is turned into RNA and protein. Expression patterns differ across cells, conditions and diseases.", "example": "A cancer cell may over-express growth genes; measuring expression levels helps classify tumour types."}, {"n": 117, "cardNo": 117, "type": "concept", "section": "Genetic Coding & Bioinformatics", "difficulty": "APPLIED", "title": "One-Hot Encoding of DNA", "whatItIs": "Converting each base into a 4-length binary vector so neural networks can process genetic sequences numerically.", "example": "A=[1,0,0,0], C=[0,1,0,0], G=[0,0,1,0], T=[0,0,0,1]; a sequence becomes a matrix of these vectors."}, {"n": 118, "cardNo": 118, "type": "concept", "section": "Genetic Coding & Bioinformatics", "difficulty": "APPLIED", "title": "K-mers", "whatItIs": "All substrings of length k from a sequence - the genomics analogue of n-grams in text, used as features for ML.", "example": "For 'ATGC' the 2-mers are AT, TG, GC; counting k-mer frequencies turns DNA into a feature vector."}, {"n": 119, "cardNo": 119, "type": "concept", "section": "Genetic Coding & Bioinformatics", "difficulty": "APPLIED", "title": "Sequence Alignment", "whatItIs": "Lining up two or more sequences to find regions of similarity, which reveal evolutionary or functional relationships.", "example": "Aligning a patient's gene against a reference shows exactly where their mutations differ."}, {"n": 120, "cardNo": 120, "type": "concept", "section": "Genetic Coding & Bioinformatics", "difficulty": "APPLIED", "title": "Variant Calling", "whatItIs": "Identifying where an individual's genome differs from a reference (SNPs, insertions, deletions) using sequencing data.", "example": "Tools like DeepVariant use deep learning to call genetic variants accurately from raw sequencing reads."}, {"n": 121, "cardNo": 121, "type": "concept", "section": "Genetic Coding & Bioinformatics", "difficulty": "APPLIED", "title": "GWAS (Genome-Wide Association Study)", "whatItIs": "Scanning many genomes to find genetic variants statistically associated with a trait or disease across a population.", "example": "A GWAS across 100,000 people links specific SNPs to a higher risk of type-2 diabetes."}, {"n": 122, "cardNo": 122, "type": "concept", "section": "Genetic Coding & Bioinformatics", "difficulty": "APPLIED", "title": "ML & Deep Learning in Genomics", "whatItIs": "Models learn directly from biological sequences to predict function, variants, expression and structure, handling a scale humans can't.", "example": "AlphaFold predicts a protein's 3-D shape from its amino-acid sequence; CNNs predict regulatory regions in DNA."}, {"n": 123, "cardNo": 123, "type": "concept", "section": "Genetic Coding & Bioinformatics", "difficulty": "APPLIED", "title": "Sequence Embeddings (Biological)", "whatItIs": "Like word embeddings for language, these represent DNA or protein sequences as dense vectors that capture biological meaning for downstream ML.", "example": "Protein language models embed sequences so that functionally similar proteins sit close together in vector space."}, {"n": 124, "cardNo": 124, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "Classical Linear Regression (OLS)", "whatItIs": "Estimates a linear relationship by minimising the sum of squared residuals. It assumes errors are independent, of constant variance and normally (Gaussian) distributed - the classical baseline.", "example": "Estimating how interest rates and income jointly drive consumer spending, fitting the best straight-line relationship."}, {"n": 125, "cardNo": 125, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "Maximum Likelihood Estimation (MLE)", "whatItIs": "Chooses the parameter values that make the observed data most probable under an assumed distribution. It is the engine behind most non-Gaussian econometric models, not just least squares.", "example": "Fitting a default-probability model by finding the coefficients under which the actual defaults and repayments are most likely."}, {"n": 126, "cardNo": 126, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "Generalized Linear Models (GLM)", "whatItIs": "Extends linear regression to non-Gaussian outcomes using a link function and a distribution from the exponential family (Gaussian, Binomial, Poisson, Gamma). One framework, many response types.", "example": "A Gamma GLM for skewed positive insurance claim sizes; a Poisson GLM for claim counts."}, {"n": 127, "cardNo": 127, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "Logit & Probit Models", "whatItIs": "Model a binary outcome as a probability. Logit uses the logistic link; probit assumes a Gaussian latent variable crossing a threshold - both squashing a linear score into 0-1.", "example": "Estimating the probability a borrower defaults (yes / no) from income, leverage and history."}, {"n": 128, "cardNo": 128, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "Multinomial & Ordered Choice", "whatItIs": "Discrete-choice models for categorical outcomes - multinomial logit for unordered options, ordered logit or probit when the categories have a natural ranking.", "example": "Which of three card products a customer picks (unordered); a credit rating bucket AAA > AA > A (ordered)."}, {"n": 129, "cardNo": 129, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "Poisson Regression", "whatItIs": "Models count outcomes using the Poisson distribution, where the mean equals the variance and values are non-negative integers.", "example": "The number of claims filed per policy per year, or transactions per customer per month."}, {"n": 130, "cardNo": 130, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "Negative Binomial Regression", "whatItIs": "A count model like Poisson but with an extra parameter allowing overdispersion - variance larger than the mean - which real-world counts almost always show.", "example": "Claim counts that vary far more than a pure Poisson model permits, with many zeros and occasional spikes."}, {"n": 131, "cardNo": 131, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "Tobit / Censored Regression", "whatItIs": "Handles outcomes limited or censored at a boundary, so observed values pile up at a floor or ceiling. It separates the chance of hitting the limit from the amount beyond it.", "example": "Customer spend where many record exactly zero and the rest are positive, or losses capped at a policy limit."}, {"n": 132, "cardNo": 132, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "Quantile Regression", "whatItIs": "Models a chosen quantile of the outcome (median, 90th, 95th percentile) rather than the mean, making no Gaussian assumption and resisting outliers.", "example": "Modelling the 95th-percentile loss (tail risk) instead of the average loss, for stress testing."}, {"n": 133, "cardNo": 133, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "Heteroskedasticity & Robust SEs", "whatItIs": "When error variance is not constant, OLS coefficients stay unbiased but their standard errors are wrong. Robust (White / Huber) standard errors correct the inference.", "example": "Larger firms show far more variable returns than small ones, so naive error bars understate uncertainty."}, {"n": 134, "cardNo": 134, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "Autocorrelation & AR / MA / ARMA", "whatItIs": "Time-series models where today's value depends on the past: AR on past values, MA on past shocks, ARMA on both. They capture momentum and mean reversion.", "example": "This month's sales depend on last month's level (AR) and last month's unexpected demand shock (MA)."}, {"n": 135, "cardNo": 135, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "ARIMA / SARIMA", "whatItIs": "ARMA plus differencing (I) to remove trends and make the series stationary; SARIMA adds seasonal terms for repeating patterns.", "example": "Forecasting monthly demand that has both an upward trend and a strong yearly seasonal cycle."}, {"n": 136, "cardNo": 136, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "ARCH / GARCH (Volatility)", "whatItIs": "Model time-varying variance - volatility that clusters in calm versus turbulent periods - and the fat-tailed, non-Gaussian behaviour of financial returns.", "example": "Forecasting a stock's changing volatility for Value-at-Risk and option pricing, where quiet spells follow quiet spells."}, {"n": 137, "cardNo": 137, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "Vector Autoregression (VAR)", "whatItIs": "Models several time series jointly, each as a function of past values of all of them, capturing how variables feed back on one another.", "example": "How GDP growth, inflation and interest rates jointly evolve and respond to a shock in any one of them."}, {"n": 138, "cardNo": 138, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "Cointegration & VECM", "whatItIs": "For non-stationary series that share a stable long-run relationship. The error-correction model captures the short-run dynamics pulling them back to equilibrium.", "example": "Spot and futures prices wander individually but stay tied together; the VECM models how the gap closes."}, {"n": 139, "cardNo": 139, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "Instrumental Variables (2SLS)", "whatItIs": "Corrects endogeneity - a regressor correlated with the error term - using an instrument related to the cause but not the error, recovering a causal effect.", "example": "Using distance to the nearest college as an instrument for years of education when estimating its effect on wages."}, {"n": 140, "cardNo": 140, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "Panel Data: Fixed vs Random Effects", "whatItIs": "For repeated observations on the same units over time. Fixed effects control for each unit's stable traits; random effects treat those traits as random draws for efficiency.", "example": "Tracking many banks across years, with fixed effects absorbing each bank's unchanging characteristics."}, {"n": 141, "cardNo": 141, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "Difference-in-Differences", "whatItIs": "Estimates a policy or treatment effect by comparing the before-versus-after change in a treated group with the change in an untreated control group.", "example": "Measuring how a new lending regulation affected banks subject to it versus comparable banks that were exempt."}, {"n": 142, "cardNo": 142, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "GMM (Generalized Method of Moments)", "whatItIs": "Estimates parameters by matching theoretical moment conditions to their sample counterparts. It is flexible, needs no full distribution, and underlies dynamic panel methods.", "example": "Arellano-Bond estimation of a dynamic panel using lagged values as instruments for persistent firm behaviour."}, {"n": 143, "cardNo": 143, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "Gaussian vs Non-Gaussian Models", "whatItIs": "Gaussian models (OLS, Gaussian GLM, Gaussian processes) assume symmetric, thin-tailed normal errors. Non-Gaussian models (Poisson, Gamma, logit, GARCH, Student-t, skewed) handle counts, bounds, skew, fat tails and volatility clustering.", "example": "Asset returns are skewed and fat-tailed, so a Gaussian model understates crash risk while a Student-t or GARCH model captures it."}, {"n": 144, "cardNo": 144, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "Gaussian Processes", "whatItIs": "A Bayesian, non-parametric model placing a Gaussian distribution over entire functions, giving flexible fits with calibrated uncertainty bands rather than point estimates.", "example": "Fitting a yield curve or demand relationship with confidence intervals that widen where data is sparse."}, {"n": 145, "cardNo": 145, "type": "concept", "section": "Econometric Models", "difficulty": "ECONOMETRICS", "title": "Copulas", "whatItIs": "Separate the dependence structure between variables from their individual (often non-Gaussian) distributions, so each margin and the linkage can be modelled independently.", "example": "Capturing joint tail risk between assets - the tendency to crash together - even when each return series has fat tails."}, {"n": 146, "cardNo": null, "type": "reference", "section": "Algorithm Hyperparameters", "difficulty": "REFERENCE", "title": "Linear / Ridge / Lasso / ElasticNet", "body": "alpha (λ)   —   penalty strength; higher shrinks coefficients toward zero (simpler, more bias, less overfit)\nl1_ratio   —   ElasticNet mix: 1 = pure Lasso (zeros out features), 0 = pure Ridge (smooth shrink)\nfit_intercept   —   whether to learn a bias / offset term\nsolver   —   optimization routine (svd, cholesky, saga); affects speed and which penalties work\nselection   —   Lasso updates coefficients cyclically or at random\npositive   —   constrain coefficients to be non-negative when negatives make no sense\nmax_iter / tol   —   optimizer budget and the stopping tolerance"}, {"n": 147, "cardNo": null, "type": "reference", "section": "Algorithm Hyperparameters", "difficulty": "REFERENCE", "title": "Logistic Regression", "body": "C   —   inverse regularization; high C trusts the data (overfit risk), low C forces a simpler boundary\npenalty   —   L1 (sparse), L2 (smooth), elasticnet, or none\nl1_ratio   —   L1 / L2 mix when penalty is elasticnet\nsolver   —   optimizer (lbfgs, liblinear, saga); limits which penalties are allowed\nmulti_class   —   ovr (one-vs-rest) vs multinomial (softmax) for more than two classes\nclass_weight   —   up-weight rare classes to handle imbalance\nmax_iter / tol   —   optimizer iterations and stopping precision"}, {"n": 148, "cardNo": null, "type": "reference", "section": "Algorithm Hyperparameters", "difficulty": "REFERENCE", "title": "K-Nearest Neighbours (KNN)", "body": "n_neighbors (k)   —   how many neighbours vote; small = jagged / noisy, large = smooth / biased\nweights   —   uniform vote vs distance-weighted (closer points count more)\nmetric / p   —   distance type; p = 2 Euclidean, p = 1 Manhattan\nalgorithm   —   kd_tree / ball_tree / brute - how neighbours are searched\nleaf_size   —   leaf size of the search tree; speed and memory trade-off"}, {"n": 149, "cardNo": null, "type": "reference", "section": "Algorithm Hyperparameters", "difficulty": "REFERENCE", "title": "Support Vector Machine (SVM)", "body": "C   —   penalty on margin violations; high = tight fit / narrow margin, low = wide / tolerant\nkernel   —   linear / rbf / poly / sigmoid - the shape of the boundary\ngamma   —   rbf or poly reach of one point; high = local / wiggly, low = global / smooth\ndegree   —   polynomial degree (poly kernel)\ncoef0   —   independent term in poly and sigmoid kernels\nepsilon   —   SVR tube width within which errors are not penalised\nclass_weight   —   reweight classes for imbalance\ndecision_function_shape   —   ovo vs ovr for multiclass"}, {"n": 150, "cardNo": null, "type": "reference", "section": "Algorithm Hyperparameters", "difficulty": "REFERENCE", "title": "Naive Bayes", "body": "alpha   —   Laplace / Lidstone smoothing; hedges against zero-probability unseen combinations\nfit_prior   —   learn class priors from data or assume them uniform\nclass_prior   —   manually set prior class probabilities\nvar_smoothing   —   (Gaussian) stability added to feature variances\nbinarize   —   (Bernoulli) threshold that turns features into 0 / 1"}, {"n": 151, "cardNo": null, "type": "reference", "section": "Algorithm Hyperparameters", "difficulty": "REFERENCE", "title": "Decision Tree", "body": "criterion   —   split quality: gini / entropy (class) or squared_error (regression)\nmax_depth   —   depth cap; deeper means more complex and prone to overfit\nmin_samples_split   —   minimum samples needed to split a node (higher = more conservative)\nmin_samples_leaf   —   minimum samples required in a leaf (smooths predictions)\nmax_features   —   how many features are considered per split\nmax_leaf_nodes   —   cap on total leaves - another complexity limit\nmin_impurity_decrease   —   only split if it improves purity by at least this much\nccp_alpha   —   cost-complexity pruning strength (prunes weak branches)\nclass_weight   —   reweight classes for imbalance"}, {"n": 152, "cardNo": null, "type": "reference", "section": "Algorithm Hyperparameters", "difficulty": "REFERENCE", "title": "Random Forest", "body": "n_estimators   —   number of trees averaged; more = steadier, slower\nmax_features   —   features sampled per split; lower = more decorrelated trees, less variance\nmax_depth   —   per-tree depth limit\nmin_samples_leaf / split   —   minimum data per leaf or to split (smoothing)\nbootstrap   —   sample rows with replacement for each tree\nmax_samples   —   fraction of rows drawn per tree when bootstrapping\noob_score   —   use out-of-bag rows as a free validation estimate\nclass_weight   —   balanced / balanced_subsample for imbalance\ncriterion   —   split quality measure"}, {"n": 153, "cardNo": null, "type": "reference", "section": "Algorithm Hyperparameters", "difficulty": "REFERENCE", "title": "Gradient Boosting (XGBoost / LightGBM)", "body": "learning_rate (eta)   —   size of each tree's correction; small = careful, needs more trees\nn_estimators   —   number of sequential boosting rounds\nmax_depth / num_leaves   —   complexity of each tree\nmin_child_weight / min_data_in_leaf   —   minimum evidence to keep a split (higher = conservative)\ngamma (min_split_loss)   —   minimum loss reduction required to make a split\nsubsample   —   fraction of rows per tree (stochastic boosting)\ncolsample_bytree   —   fraction of columns per tree\nreg_alpha / reg_lambda   —   L1 / L2 penalty on leaf weights\nscale_pos_weight   —   up-weight the positive class for imbalance\nearly_stopping_rounds   —   stop when the validation metric stops improving"}, {"n": 154, "cardNo": null, "type": "reference", "section": "Algorithm Hyperparameters", "difficulty": "REFERENCE", "title": "AdaBoost", "body": "n_estimators   —   number of weak learners added in sequence\nlearning_rate   —   contribution / shrinkage of each learner (trades off with n_estimators)\nestimator   —   the base weak learner, usually a shallow stump; its depth sets its strength\nalgorithm   —   SAMME vs SAMME.R (discrete vs probability-based boosting)\nloss   —   (regressor) linear / square / exponential reweighting"}, {"n": 155, "cardNo": null, "type": "reference", "section": "Algorithm Hyperparameters", "difficulty": "REFERENCE", "title": "K-Means", "body": "n_clusters (k)   —   number of groups to find (chosen via elbow or silhouette)\ninit   —   k-means++ (spread-out starts) vs random\nn_init   —   number of restarts; the best result is kept (avoids bad local optima)\nmax_iter / tol   —   convergence budget and tolerance\nalgorithm   —   lloyd vs elkan (faster on dense data)"}, {"n": 156, "cardNo": null, "type": "reference", "section": "Algorithm Hyperparameters", "difficulty": "REFERENCE", "title": "Hierarchical Clustering", "body": "n_clusters   —   number of clusters - where to cut the dendrogram\nlinkage   —   ward / complete / average / single - how inter-cluster distance is defined (drives shapes)\nmetric / affinity   —   base distance (Euclidean, cosine, ...)\ndistance_threshold   —   cut by distance instead of a fixed cluster count"}, {"n": 157, "cardNo": null, "type": "reference", "section": "Algorithm Hyperparameters", "difficulty": "REFERENCE", "title": "DBSCAN", "body": "eps   —   neighbourhood radius that defines what counts as close\nmin_samples   —   neighbours needed for a point to be a dense core point\nmetric   —   distance measure used\nalgorithm / leaf_size   —   neighbour-search structure and its speed"}, {"n": 158, "cardNo": null, "type": "reference", "section": "Algorithm Hyperparameters", "difficulty": "REFERENCE", "title": "Gaussian Mixture (GMM)", "body": "n_components   —   number of Gaussian blobs assumed\ncovariance_type   —   full / tied / diag / spherical - how much shape freedom each cluster gets\nreg_covar   —   small value added to covariances for numerical stability\ninit_params   —   kmeans vs random initialization of components\nn_init / max_iter / tol   —   EM restarts and convergence controls"}, {"n": 159, "cardNo": null, "type": "reference", "section": "Algorithm Hyperparameters", "difficulty": "REFERENCE", "title": "PCA", "body": "n_components   —   axes kept (compression vs information retained); can be a variance share like 0.95\nsvd_solver   —   full / randomized / arpack - exactness vs speed\nwhiten   —   rescale components to unit variance (decorrelate for downstream models)\nrandom_state   —   reproducibility for the randomized solver"}, {"n": 160, "cardNo": null, "type": "reference", "section": "Algorithm Hyperparameters", "difficulty": "REFERENCE", "title": "t-SNE / UMAP", "body": "perplexity (t-SNE)   —   effective neighbours balanced; local vs global emphasis\nlearning_rate / n_iter   —   optimization step size and length\nearly_exaggeration   —   how tightly clusters pull together early in training\nn_neighbors (UMAP)   —   local vs global structure trade-off\nmin_dist (UMAP)   —   how tightly points may pack (small = clumps, large = spread)\nn_components   —   output dimensions, usually 2 or 3"}, {"n": 161, "cardNo": null, "type": "reference", "section": "Algorithm Hyperparameters", "difficulty": "REFERENCE", "title": "Neural Network / MLP", "body": "learning_rate (+ schedule)   —   gradient step size; too high diverges, too low crawls\nhidden layers / units   —   model capacity - how complex a function it can represent\nbatch_size   —   samples per update; small = noisy / regularizing, large = stable / memory-heavy\nepochs   —   number of passes over the training data\nactivation   —   nonlinearity (relu, tanh, gelu ...)\noptimizer   —   SGD / Adam / RMSprop - how updates are computed\nmomentum / beta1, beta2   —   smoothing of the update direction (Adam moments)\nweight_decay (L2)   —   penalty on large weights\ndropout   —   fraction of neurons randomly disabled to curb overfit\nearly_stopping   —   halt when validation stops improving"}, {"n": 162, "cardNo": null, "type": "reference", "section": "Algorithm Hyperparameters", "difficulty": "REFERENCE", "title": "Association Rules (Apriori)", "body": "min_support   —   minimum frequency for an itemset to be considered\nmin_confidence   —   how reliably the rule if A then B holds\nmin_lift   —   co-occurrence above chance (a real link vs both being popular)\nmin_conviction   —   strength of implication - sensitivity to A occurring without B\nmax_len   —   maximum itemset size to search"}, {"n": 163, "cardNo": null, "type": "reference", "section": "Goodness Of Fit & Error Metrics", "difficulty": "REFERENCE", "title": "Regression Metrics", "body": "R²   —   fraction of variance explained (1 = perfect, 0 = no better than the mean)\nAdjusted R²   —   R² penalized for adding features that do not help\nMAE   —   mean absolute error; average error size, robust to outliers\nMSE   —   mean squared error; punishes large errors heavily\nRMSE   —   root MSE; error in the target's own units (most interpretable)\nMAPE   —   mean absolute percentage error; scale-free but unstable near zero\nHuber / Quantile loss   —   outlier-robust or asymmetric error alternatives"}, {"n": 164, "cardNo": null, "type": "reference", "section": "Goodness Of Fit & Error Metrics", "difficulty": "REFERENCE", "title": "Classification Metrics", "body": "Confusion matrix   —   the TP / FP / FN / TN breakdown everything else derives from\nAccuracy   —   overall share correct (misleading under class imbalance)\nPrecision   —   of predicted positives, the share actually positive\nRecall / Sensitivity   —   of true positives, the share the model caught\nF1   —   harmonic mean of precision and recall\nROC-AUC   —   threshold-free ranking quality (0.5 = random, 1 = perfect)\nPR-AUC   —   precision-recall area; better when positives are rare\nLog loss / cross-entropy   —   penalizes confident wrong probabilities (the usual training loss)\nMCC / Cohen's κ   —   chance- and imbalance-adjusted agreement\nBrier score   —   calibration of the predicted probabilities"}, {"n": 165, "cardNo":
