<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>SQL · Flashcards</title>
<style>
  :root{
    --bg:#eef2f7; --surface:#ffffff; --ink:#0f1b2d; --muted:#5b6878; --faint:#8a96a6;
    --line:#e3e8ef; --line-soft:#eef1f6;
    --accent:#7c3aed; --accent-dark:#5b21b6; --accent-soft:#efe7fd;
    --green:#0f9d58; --green-soft:#e6f6ec; --red:#e0443e; --red-soft:#fdecea;
    --shadow:0 10px 30px rgba(17,34,64,.10); --shadow-lg:0 24px 60px rgba(17,34,64,.16);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;
    display:flex; flex-direction:column; height:100dvh; overflow:hidden;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  /* ---- top app bar ---- */
  .appbar{display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--surface);
    border-bottom:1px solid var(--line); flex:0 0 auto}
  .appbar a.home{display:inline-flex; align-items:center; gap:6px; color:var(--muted); text-decoration:none;
    font-size:13px; font-weight:600; padding:6px 8px; border-radius:8px}
  .appbar a.home:hover{background:var(--line-soft); color:var(--ink)}
  .appbar .deck{min-width:0}
  .appbar .deck h1{font-size:15px; margin:0; font-weight:700; letter-spacing:-.2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .appbar .deck .sub{font-size:11px; color:var(--faint); margin-top:1px}
  .appbar .spacer{flex:1}
  .ghost{background:var(--surface); border:1px solid var(--line); color:var(--muted); border-radius:9px;
    padding:7px 11px; font-size:12px; font-weight:600; cursor:pointer; display:inline-flex; gap:5px; align-items:center; white-space:nowrap}
  .ghost:hover{border-color:#cfd8e3; color:var(--ink)}
  .ghost:active{transform:scale(.97)}
  /* ---- controls ---- */
  .controls{padding:12px 16px 4px; flex:0 0 auto}
  select,input{background:var(--surface); border:1px solid var(--line); color:var(--ink); border-radius:10px;
    padding:10px 12px; font-size:14px; outline:none; -webkit-appearance:none}
  select:focus,input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .searchrow{display:flex; gap:8px}
  .searchrow input{flex:1; min-width:0}
  .searchrow .go{background:var(--accent); color:#fff; border:none; border-radius:10px; padding:10px 16px;
    font-size:14px; font-weight:600; cursor:pointer}
  .searchrow .go:active{transform:scale(.97); background:var(--accent-dark)}
  .row2{display:flex; gap:8px; margin-top:8px}
  .row2 select{flex:1; min-width:0}
  .pills{display:flex; gap:7px; margin-top:10px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px}
  .pill{flex:0 0 auto; background:var(--surface); border:1px solid var(--line); color:var(--muted);
    border-radius:99px; padding:7px 13px; font-size:12.5px; font-weight:600; cursor:pointer; display:flex; gap:6px; align-items:center}
  .pill .c{font-weight:800; color:var(--ink)}
  .pill.active{background:var(--accent); border-color:var(--accent); color:#fff}
  .pill.active .c{color:#fff}
  .progresswrap{margin-top:11px}
  .bar{height:8px; background:#dde4ee; border-radius:99px; overflow:hidden}
  .bar > i{display:block; height:100%; width:0; border-radius:99px;
    background:linear-gradient(90deg,var(--accent),var(--green)); transition:width .35s ease}
  .stats{display:flex; justify-content:space-between; font-size:11.5px; color:var(--muted); margin-top:7px; font-weight:600}
  /* ---- card stage ---- */
  .stage{flex:1 1 auto; position:relative; display:flex; align-items:center; justify-content:center; padding:10px 16px 4px}
  .deckwrap{position:relative; width:100%; max-width:460px; height:100%; max-height:580px}
  .card{position:absolute; inset:0; border-radius:20px; background:var(--surface); color:var(--ink);
    box-shadow:var(--shadow-lg); border:1px solid var(--line); cursor:pointer; user-select:none;
    transition:transform .12s ease, opacity .2s ease; will-change:transform; touch-action:pan-y}
  .card.flipped .inner{transform:rotateY(180deg)}
  .inner{position:absolute; inset:0; transition:transform .55s cubic-bezier(.2,.7,.2,1); transform-style:preserve-3d}
  .face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
    border-radius:20px; padding:24px 24px 20px; display:flex; flex-direction:column; overflow:hidden}
  .back{transform:rotateY(180deg); background:var(--surface)}
  .meta{display:flex; align-items:center; justify-content:space-between; gap:8px}
  .section{font-size:11px; font-weight:800; letter-spacing:.7px; text-transform:uppercase; color:var(--accent)}
  .badge{font-size:10px; font-weight:800; letter-spacing:.4px; padding:4px 9px; border-radius:99px;
    background:var(--accent-soft); color:var(--accent-dark); white-space:nowrap}
  .badge.REF{background:#fef0e4; color:#b5651d}
  .state-dot{font-size:10px; font-weight:800; padding:3px 9px; border-radius:99px}
  .state-known{background:var(--green-soft); color:#0f7a45}
  .state-review{background:var(--red-soft); color:#c2362f}
  .num{font-size:11px; color:var(--faint); font-weight:700}
  .front .title{font-size:clamp(23px,6.6vw,33px); font-weight:800; line-height:1.16; margin:auto 0;
    letter-spacing:-.4px; color:var(--ink)}
  .hint{font-size:11px; color:var(--faint); text-align:center; margin-top:8px; font-weight:600}
  .back .scroll{overflow:auto; -webkit-overflow-scrolling:touch; margin-top:12px; padding-right:2px}
  .back .title{font-size:18px; font-weight:800; margin:2px 0 2px; color:var(--ink)}
  .label{font-size:10px; font-weight:800; letter-spacing:.9px; color:var(--accent); text-transform:uppercase; margin:15px 0 5px}
  .body{font-size:15px; line-height:1.55; color:#243244}
  .refbody{font-size:13.5px; line-height:1.6; color:#243244}
  .refbody .row{padding:7px 0; border-bottom:1px solid var(--line-soft)}
  .refbody .row:last-child{border-bottom:0}
  .refbody .k{font-weight:800; color:var(--ink)}
  mark{background:#fff1a8; color:inherit; padding:0 2px; border-radius:3px}
  .stamp{position:absolute; top:22px; font-size:23px; font-weight:900; letter-spacing:1px;
    padding:6px 13px; border-radius:10px; border:3px solid; opacity:0; transform:rotate(-11deg); pointer-events:none}
  .stamp.know{left:20px; color:var(--green); border-color:var(--green)}
  .stamp.dont{right:20px; color:var(--red); border-color:var(--red)}
  /* ---- footer actions ---- */
  .footer{flex:0 0 auto; padding:8px 16px calc(14px + env(safe-area-inset-bottom)); display:flex;
    align-items:center; justify-content:center; gap:16px}
  .fab{width:60px; height:60px; border-radius:50%; border:none; font-size:23px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); color:#fff}
  .fab:active{transform:scale(.92)}
  .fab.no{background:var(--red)}
  .fab.flip{width:50px; height:50px; font-size:17px; background:var(--surface); color:var(--muted); border:1px solid var(--line)}
  .fab.yes{background:var(--green)}
  .fab.undo{width:46px; height:46px; font-size:17px; background:var(--surface); color:var(--muted); border:1px solid var(--line)}
  .fab.undo:disabled{opacity:.4; cursor:default}
  .empty{position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; color:var(--ink); padding:30px}
  .empty h2{margin:0 0 8px; font-size:22px}
  .empty p{margin:0 0 18px; color:var(--muted); font-size:14px; line-height:1.5}
  .empty button{background:var(--accent); color:#fff; border:none; padding:12px 22px; border-radius:11px; font-size:15px; font-weight:600; cursor:pointer}
  .toast{position:fixed; left:50%; bottom:94px; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:9px 15px; border-radius:10px; font-size:13px; font-weight:600;
    opacity:0; pointer-events:none; transition:.25s; z-index:30}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="appbar">
  <a class="home" href="index.html">← All decks</a>
  <div class="deck">
    <h1>SQL</h1>
    <div class="sub" id="subline">Foundations → joins → aggregation → windows → CTEs → transactions → performance → analytics</div>
  </div>
  <div class="spacer"></div>
  <button class="ghost" id="shuffleBtn" title="Shuffle">🔀 Shuffle</button>
</div>

<div class="controls">
  <div class="searchrow">
    <input id="searchInput" type="search" enterkeyhint="search"
       placeholder="Search by number or keyword…" aria-label="Search by number or keyword">
    <button class="go" id="goBtn">Go</button>
  </div>
  <div class="row2"><select id="sectionSel" aria-label="Filter by section"></select></div>
  <div class="pills" id="pills">
    <button class="pill active" data-pile="ALL">All <span class="c" id="cAll">0</span></button>
    <button class="pill" data-pile="new">New <span class="c" id="cNew">0</span></button>
    <button class="pill" data-pile="review">Review <span class="c" id="cReview">0</span></button>
    <button class="pill" data-pile="known">Known <span class="c" id="cKnown">0</span></button>
  </div>
  <div class="progresswrap">
    <div class="bar"><i id="barFill"></i></div>
    <div class="stats"><span id="statMastered">Mastered 0</span><span id="statPos">0 / 0</span></div>
  </div>
</div>

<div class="stage">
  <div class="deckwrap" id="deck"></div>
  <div class="empty" id="empty">
    <h2>🎉 All done!</h2>
    <p id="emptyMsg">You've gone through every card in this view.</p>
    <button id="restartBtn">Study again</button>
  </div>
</div>

<div class="footer">
  <button class="fab undo" id="undoBtn" title="Undo last swipe" disabled>↶</button>
  <button class="fab no" id="noBtn" title="Review later">✗</button>
  <button class="fab flip" id="flipBtn" title="Flip">⟳</button>
  <button class="fab yes" id="yesBtn" title="Got it">✓</button>
</div>
<div class="toast" id="toast"></div>

<script>
const CARDS = [{"n": 1, "cardNo": 1, "type": "concept", "section": "Relational Foundations", "difficulty": "FUNDAMENTALS", "title": "Relation (Table)", "whatItIs": "A relation is a set of tuples (rows) that all share the same schema (columns). In SQL this is a table: an unordered bag of rows where every row has the same named, typed attributes.", "example": "A 'customers' table with columns customer_id, name, email is a relation; every row is one customer tuple."}, {"n": 2, "cardNo": 2, "type": "concept", "section": "Relational Foundations", "difficulty": "FUNDAMENTALS", "title": "Primary Key", "whatItIs": "A column or set of columns whose values uniquely identify every row in a table and cannot be NULL. The DBMS enforces uniqueness and uses the PK to locate rows efficiently.", "example": "In an 'orders' table, order_id INT PRIMARY KEY guarantees no two orders share the same id."}, {"n": 3, "cardNo": 3, "type": "concept", "section": "Relational Foundations", "difficulty": "FUNDAMENTALS", "title": "Foreign Key", "whatItIs": "A column (or group) in one table that references the primary key of another, enforcing referential integrity -- every FK value must match an existing PK or be NULL.", "example": "orders.customer_id is a FK to customers.customer_id; inserting an order with a nonexistent customer_id raises a constraint violation."}, {"n": 4, "cardNo": 4, "type": "concept", "section": "Relational Foundations", "difficulty": "FUNDAMENTALS", "title": "Candidate Key", "whatItIs": "Any minimal set of columns that uniquely identifies rows -- minimal meaning no proper subset also uniquely identifies them. A table can have multiple candidate keys; the chosen one becomes the primary key.", "example": "In an 'employees' table, both employee_id and national_id may be candidate keys; only one is elected PK."}, {"n": 5, "cardNo": 5, "type": "concept", "section": "Relational Foundations", "difficulty": "FUNDAMENTALS", "title": "Surrogate vs Natural Key", "whatItIs": "A surrogate key is a system-generated identifier (e.g., auto-increment integer) with no business meaning. A natural key is derived from real-world data (e.g., email, ISBN). Surrogates are stable; natural keys can change.", "example": "order_id SERIAL is a surrogate; an email address used as PK is a natural key (fragile if users change email)."}, {"n": 6, "cardNo": 6, "type": "concept", "section": "Relational Foundations", "difficulty": "FUNDAMENTALS", "title": "NULL Semantics", "whatItIs": "NULL represents an unknown or inapplicable value. Any comparison with NULL (including NULL = NULL) evaluates to UNKNOWN, not TRUE, so you must use IS NULL or IS NOT NULL. NULL propagates through arithmetic -- any expression involving NULL returns NULL.", "example": "WHERE salary > 50000 silently excludes rows where salary IS NULL; use OR salary IS NULL to include them."}, {"n": 7, "cardNo": 7, "type": "concept", "section": "Relational Foundations", "difficulty": "FUNDAMENTALS", "title": "Three-Valued Logic", "whatItIs": "SQL Boolean expressions can be TRUE, FALSE, or UNKNOWN (when NULL is involved). A WHERE clause filters in only rows that evaluate to TRUE; UNKNOWN rows are filtered out, the same as FALSE.", "example": "NULL <> 5 is UNKNOWN, so rows where a column IS NULL are excluded by WHERE col <> 5."}, {"n": 8, "cardNo": 8, "type": "concept", "section": "Relational Foundations", "difficulty": "FUNDAMENTALS", "title": "Data Types Overview", "whatItIs": "SQL defines types for integers (INT, BIGINT), exact decimals (NUMERIC/DECIMAL), floats (FLOAT/REAL), text (VARCHAR, TEXT, CHAR), dates/times (DATE, TIME, TIMESTAMP), and booleans. Choosing the right type enforces domain constraints and affects storage and index behaviour.", "example": "Store monetary amounts as NUMERIC(12,2) not FLOAT to avoid floating-point rounding errors."}, {"n": 9, "cardNo": 9, "type": "concept", "section": "Relational Foundations", "difficulty": "FUNDAMENTALS", "title": "Schema vs Database vs Catalog", "whatItIs": "A catalog is the top-level container (a running server). A database (in many systems) is a named set of schemas. A schema is a named namespace containing tables, views, functions. The fully-qualified name is catalog.schema.table.", "example": "In PostgreSQL: SELECT * FROM mydb.analytics.fact_sales -- mydb is the database, analytics is the schema."}, {"n": 10, "cardNo": 10, "type": "concept", "section": "Core Select Mechanics", "difficulty": "FOUNDATIONS", "title": "Logical Query Processing Order", "whatItIs": "SQL evaluates clauses in this logical order: FROM -> JOIN -> WHERE -> GROUP BY -> HAVING -> SELECT -> DISTINCT -> ORDER BY -> LIMIT/OFFSET. Writing order differs -- SELECT appears first in syntax but is processed nearly last.", "example": "You cannot reference a SELECT alias in WHERE because WHERE runs before SELECT; move the expression or use a subquery."}, {"n": 11, "cardNo": 11, "type": "concept", "section": "Core Select Mechanics", "difficulty": "FOUNDATIONS", "title": "SELECT Clause", "whatItIs": "Specifies which expressions become columns in the result set. Supports column names, arithmetic, functions, CASE expressions, literals, and '*' (all columns). SELECT is processed after filtering and grouping, so it sees aggregated data.", "example": "SELECT customer_id, total_amount * 1.10 AS total_with_gst FROM orders;"}, {"n": 12, "cardNo": 12, "type": "concept", "section": "Core Select Mechanics", "difficulty": "FOUNDATIONS", "title": "WHERE Clause", "whatItIs": "Filters individual rows before any grouping. Accepts comparison operators (=, <>, <, >, BETWEEN, LIKE, IN, IS NULL) combined with AND, OR, NOT. Applied row-by-row on base tables.", "example": "WHERE status = 'active' AND created_at >= '2024-01-01' returns only active records from 2024 onward."}, {"n": 13, "cardNo": 13, "type": "concept", "section": "Core Select Mechanics", "difficulty": "FOUNDATIONS", "title": "LIKE and Wildcards", "whatItIs": "LIKE enables pattern matching on strings. % matches zero or more characters; _ matches exactly one character. Case sensitivity depends on collation. ILIKE (PostgreSQL) forces case-insensitive matching.", "example": "WHERE email LIKE '%@gmail.com' matches any Gmail address; '_ _ _' matches exactly three characters."}, {"n": 14, "cardNo": 14, "type": "concept", "section": "Core Select Mechanics", "difficulty": "FOUNDATIONS", "title": "BETWEEN and IN", "whatItIs": "BETWEEN a AND b is inclusive on both ends (equivalent to >= a AND <= b). IN (list) checks membership in a literal list or subquery result, and is cleaner than many OR conditions.", "example": "WHERE amount BETWEEN 100 AND 500 -- includes 100 and 500. WHERE country IN ('SG','MY','ID') is cleaner than three ORs."}, {"n": 15, "cardNo": 15, "type": "concept", "section": "Core Select Mechanics", "difficulty": "FOUNDATIONS", "title": "ORDER BY", "whatItIs": "Sorts the result set by one or more expressions. ASC (default) for ascending, DESC for descending. NULLs sort LAST by default in most databases (NULLS FIRST / NULLS LAST override this). ORDER BY is the only guaranteed way to get a consistent row order.", "example": "ORDER BY revenue DESC NULLS LAST, customer_name ASC -- sort by revenue descending, ties broken by name."}, {"n": 16, "cardNo": 16, "type": "concept", "section": "Core Select Mechanics", "difficulty": "FOUNDATIONS", "title": "LIMIT and OFFSET", "whatItIs": "LIMIT n returns at most n rows; OFFSET k skips the first k rows before returning. Together they implement pagination. Always pair with ORDER BY -- without it, the 'page' returned is non-deterministic.", "example": "SELECT * FROM products ORDER BY price DESC LIMIT 10 OFFSET 20 -- page 3, 10 items per page."}, {"n": 17, "cardNo": 17, "type": "concept", "section": "Core Select Mechanics", "difficulty": "FOUNDATIONS", "title": "DISTINCT", "whatItIs": "Removes duplicate rows from the result set, comparing all selected columns as a unit. Applied after SELECT expressions are evaluated. DISTINCT is expensive on large sets because it requires a sort or hash.", "example": "SELECT DISTINCT country FROM customers returns each country once, even if thousands of customers share it."}, {"n": 18, "cardNo": 18, "type": "concept", "section": "Core Select Mechanics", "difficulty": "FOUNDATIONS", "title": "Column Aliases (AS)", "whatItIs": "AS assigns a name to a computed column or renames an existing column in the result. Aliases are visible in ORDER BY and (in some databases) HAVING, but NOT in WHERE or GROUP BY at the same level.", "example": "SELECT price * quantity AS line_total, SUM(price * quantity) AS order_total FROM order_lines;"}, {"n": 19, "cardNo": 19, "type": "concept", "section": "Joins", "difficulty": "CORE SKILL", "title": "INNER JOIN", "whatItIs": "Returns only rows where the join condition matches in BOTH tables. Non-matching rows from either side are excluded. It is the default JOIN when you write just 'JOIN'.", "example": "SELECT o.order_id, c.name FROM orders o JOIN customers c ON o.customer_id = c.customer_id -- excludes orders with no matching customer."}, {"n": 20, "cardNo": 20, "type": "concept", "section": "Joins", "difficulty": "CORE SKILL", "title": "LEFT (OUTER) JOIN", "whatItIs": "Returns all rows from the left table plus matching rows from the right. Where no match exists, right-table columns appear as NULL. Used to preserve all left-side rows regardless of match.", "example": "SELECT c.name, o.order_id FROM customers c LEFT JOIN orders o ON c.customer_id = o.customer_id -- shows customers with zero orders (order_id = NULL)."}, {"n": 21, "cardNo": 21, "type": "concept", "section": "Joins", "difficulty": "CORE SKILL", "title": "RIGHT (OUTER) JOIN", "whatItIs": "Mirror of LEFT JOIN: all rows from the right table, with NULLs for unmatched left columns. Rarely needed -- the same result is achievable by swapping table order and using LEFT JOIN.", "example": "Swapping to: orders o RIGHT JOIN customers c is equivalent to: customers c LEFT JOIN orders o."}, {"n": 22, "cardNo": 22, "type": "concept", "section": "Joins", "difficulty": "CORE SKILL", "title": "FULL OUTER JOIN", "whatItIs": "Returns all rows from both tables. Where a row in one table has no match in the other, the missing side's columns are NULL. Useful for finding unmatched rows on either side.", "example": "SELECT * FROM table_a FULL OUTER JOIN table_b ON a.id = b.id WHERE a.id IS NULL OR b.id IS NULL -- rows in either table with no match."}, {"n": 23, "cardNo": 23, "type": "concept", "section": "Joins", "difficulty": "CORE SKILL", "title": "CROSS JOIN", "whatItIs": "Produces the Cartesian product: every row from the left table paired with every row from the right. If left has m rows and right has n, the result has m*n rows. Rarely intentional; ensure a WHERE condition filters it down.", "example": "5 sizes CROSS JOIN 3 colors = 15 product variants with no join condition needed."}, {"n": 24, "cardNo": 24, "type": "concept", "section": "Joins", "difficulty": "CORE SKILL", "title": "Self Join", "whatItIs": "A table joined to itself using two different aliases. Useful for hierarchical or comparative queries within a single table. No special syntax -- just alias the same table twice.", "example": "SELECT e.name, m.name AS manager FROM employees e JOIN employees m ON e.manager_id = m.employee_id."}, {"n": 25, "cardNo": 25, "type": "concept", "section": "Joins", "difficulty": "CORE SKILL", "title": "Non-Equi Join", "whatItIs": "A join whose condition uses an operator other than = (e.g., <, >, BETWEEN). Useful for range lookups such as matching a transaction date to a rate that was valid within a date range.", "example": "SELECT t.amount, r.rate FROM transactions t JOIN fx_rates r ON t.txn_date BETWEEN r.valid_from AND r.valid_to."}, {"n": 26, "cardNo": 26, "type": "concept", "section": "Joins", "difficulty": "CORE SKILL", "title": "Join Order and Optimizer", "whatItIs": "The query optimizer chooses the physical join order and algorithm (nested loop, hash, merge) regardless of the written order. Writing JOINs in logical reading order helps clarity; use EXPLAIN to understand what the engine actually does.", "example": "EXPLAIN SELECT ... shows whether Postgres chose a Hash Join or Nested Loop and in what order it scanned tables."}, {"n": 27, "cardNo": 27, "type": "concept", "section": "Joins", "difficulty": "CORE SKILL", "title": "LATERAL JOIN", "whatItIs": "A LATERAL subquery or function in the FROM clause can reference columns from tables listed to its left. This enables per-row subqueries -- like applying a function or subquery independently for each outer row.", "example": "SELECT u.name, top_orders.total FROM users u, LATERAL (SELECT SUM(amount) AS total FROM orders WHERE user_id = u.id LIMIT 1) top_orders."}, {"n": 28, "cardNo": 28, "type": "concept", "section": "Aggregation & Grouping", "difficulty": "CORE SKILL", "title": "Aggregate Functions", "whatItIs": "Operate on sets of rows and return a single value per group: COUNT, SUM, AVG, MIN, MAX, and others. Aggregate functions ignore NULLs (except COUNT(*)). They appear in SELECT or HAVING, not WHERE.", "example": "SELECT region, SUM(revenue) AS total, AVG(revenue) AS avg_deal FROM deals GROUP BY region."}, {"n": 29, "cardNo": 29, "type": "concept", "section": "Aggregation & Grouping", "difficulty": "CORE SKILL", "title": "COUNT(*) vs COUNT(col)", "whatItIs": "COUNT(*) counts every row including those with NULLs. COUNT(col) counts only rows where col is NOT NULL. COUNT(DISTINCT col) counts distinct non-NULL values. The difference matters when nulls are present.", "example": "If 1000 rows exist but 200 have NULL email: COUNT(*) = 1000, COUNT(email) = 800, COUNT(DISTINCT email) <= 800."}, {"n": 30, "cardNo": 30, "type": "concept", "section": "Aggregation & Grouping", "difficulty": "CORE SKILL", "title": "GROUP BY", "whatItIs": "Collapses rows sharing the same values in the listed columns into one output row per group. Every non-aggregate column in SELECT must appear in GROUP BY (or be functionally dependent on the GROUP BY key in some databases).", "example": "SELECT product_id, SUM(quantity) FROM order_lines GROUP BY product_id -- one row per product."}, {"n": 31, "cardNo": 31, "type": "concept", "section": "Aggregation & Grouping", "difficulty": "CORE SKILL", "title": "HAVING", "whatItIs": "Filters groups after aggregation -- the WHERE for aggregate results. WHERE filters individual rows before grouping; HAVING filters groups after aggregation. You can reference aggregate expressions in HAVING.", "example": "SELECT customer_id, COUNT(*) AS orders FROM orders GROUP BY customer_id HAVING COUNT(*) >= 5 -- customers with 5+ orders."}, {"n": 32, "cardNo": 32, "type": "concept", "section": "Aggregation & Grouping", "difficulty": "CORE SKILL", "title": "FILTER (per-aggregate)", "whatItIs": "The FILTER (WHERE ...) clause after an aggregate function applies a row-level filter to that specific aggregate only, without needing conditional logic. Cleaner than CASE WHEN inside SUM.", "example": "SELECT SUM(amount) FILTER (WHERE status = 'paid') AS paid_total, SUM(amount) AS total FROM invoices."}, {"n": 33, "cardNo": 33, "type": "concept", "section": "Aggregation & Grouping", "difficulty": "CORE SKILL", "title": "ROLLUP", "whatItIs": "An extension to GROUP BY that generates subtotals and a grand total. GROUP BY ROLLUP(a, b) produces groupings: (a,b), (a), () -- subtotals for each 'a' and an overall total. NULLs in the result mark the rolled-up positions.", "example": "GROUP BY ROLLUP(region, product) gives sales by region+product, then by region alone, then a grand total."}, {"n": 34, "cardNo": 34, "type": "concept", "section": "Aggregation & Grouping", "difficulty": "CORE SKILL", "title": "CUBE", "whatItIs": "Like ROLLUP but produces all 2^n combinations of groupings for n columns. GROUP BY CUBE(a, b) gives (a,b), (a), (b), () -- a full cross-tabulation. Useful for OLAP pivot-style reports.", "example": "CUBE(year, quarter, region) produces 8 grouping combinations: all combinations of those three dimensions."}, {"n": 35, "cardNo": 35, "type": "concept", "section": "Aggregation & Grouping", "difficulty": "CORE SKILL", "title": "GROUPING SETS", "whatItIs": "Allows specifying exactly which groupings to compute in a single pass, instead of UNION ALL-ing multiple GROUP BYs. GROUPING SETS ((a,b),(a),())) is equivalent to ROLLUP(a,b). More flexible than ROLLUP or CUBE.", "example": "GROUP BY GROUPING SETS ((region),(product),()) computes three aggregations in one query without a UNION."}, {"n": 36, "cardNo": 36, "type": "concept", "section": "Aggregation & Grouping", "difficulty": "CORE SKILL", "title": "GROUPING() Function", "whatItIs": "Returns 1 when a column is in a 'rolled-up' (null due to ROLLUP/CUBE) group and 0 when it is a real value. Lets you distinguish a genuine NULL from a rollup placeholder NULL in the output.", "example": "SELECT GROUPING(region) AS is_rollup, region, SUM(sales) FROM ... GROUP BY ROLLUP(region)."}, {"n": 37, "cardNo": 37, "type": "concept", "section": "Window Functions", "difficulty": "ADVANCED CORE", "title": "Window Function Concept", "whatItIs": "A window function computes a value for each row based on a 'window' of related rows, without collapsing those rows into one. The result set keeps all original rows; each row also carries the window computation result.", "example": "SELECT name, salary, AVG(salary) OVER (PARTITION BY dept) AS dept_avg FROM employees -- each employee row shows their dept average alongside their own salary."}, {"n": 38, "cardNo": 38, "type": "concept", "section": "Window Functions", "difficulty": "ADVANCED CORE", "title": "OVER Clause", "whatItIs": "Defines the window: PARTITION BY divides rows into independent groups; ORDER BY sets the logical row order within each partition; the frame clause bounds which rows are 'in the window' for each row.", "example": "SUM(amount) OVER (PARTITION BY customer_id ORDER BY txn_date) computes a running total per customer, in date order."}, {"n": 39, "cardNo": 39, "type": "concept", "section": "Window Functions", "difficulty": "ADVANCED CORE", "title": "ROW_NUMBER()", "whatItIs": "Assigns a unique sequential integer to each row within a partition, starting at 1. Ties get different numbers (arbitrary order among ties). Useful for deduplication and top-N per group.", "example": "ROW_NUMBER() OVER (PARTITION BY customer_id ORDER BY order_date DESC) = 1 selects each customer's most recent order."}, {"n": 40, "cardNo": 40, "type": "concept", "section": "Window Functions", "difficulty": "ADVANCED CORE", "title": "RANK() and DENSE_RANK()", "whatItIs": "RANK() gives tied rows the same rank and then skips numbers (1,1,3,...). DENSE_RANK() gives tied rows the same rank without skipping (1,1,2,...). Use DENSE_RANK when you need contiguous rank numbers.", "example": "For scores 90,90,85: RANK gives 1,1,3; DENSE_RANK gives 1,1,2."}, {"n": 41, "cardNo": 41, "type": "concept", "section": "Window Functions", "difficulty": "ADVANCED CORE", "title": "NTILE(n)", "whatItIs": "Divides rows in a partition into n approximately equal buckets and assigns each row its bucket number (1 through n). Extra rows go to the earlier buckets. Used to create quartiles, deciles, etc.", "example": "NTILE(4) OVER (ORDER BY revenue) assigns each customer to quartile 1-4 by revenue."}, {"n": 42, "cardNo": 42, "type": "concept", "section": "Window Functions", "difficulty": "ADVANCED CORE", "title": "LAG() and LEAD()", "whatItIs": "LAG(col, n) accesses the value of col from n rows before the current row in the partition order. LEAD(col, n) accesses n rows ahead. A third argument provides a default when the offset goes out of bounds.", "example": "LAG(close_price, 1) OVER (ORDER BY trade_date) gives the previous day's closing price on each row for a day-over-day change calculation."}, {"n": 43, "cardNo": 43, "type": "concept", "section": "Window Functions", "difficulty": "ADVANCED CORE", "title": "FIRST_VALUE() and LAST_VALUE()", "whatItIs": "Return the first or last value of an expression in the current window frame. LAST_VALUE is tricky because the default frame ends at the current row, not the partition end -- you usually need ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING.", "example": "FIRST_VALUE(price) OVER (PARTITION BY product_id ORDER BY date) gives the initial recorded price for each product on every row."}, {"n": 44, "cardNo": 44, "type": "concept", "section": "Window Functions", "difficulty": "ADVANCED CORE", "title": "Frame Clause (ROWS vs RANGE)", "whatItIs": "The frame defines which rows are 'in window' relative to the current row. ROWS BETWEEN counts by physical row position; RANGE BETWEEN uses logical value-based boundaries (e.g., rows with the same ORDER BY value). Common frames: UNBOUNDED PRECEDING, CURRENT ROW, UNBOUNDED FOLLOWING.", "example": "SUM(amount) OVER (ORDER BY date ROWS BETWEEN 6 PRECEDING AND CURRENT ROW) computes a rolling 7-day sum."}, {"n": 45, "cardNo": 45, "type": "concept", "section": "Window Functions", "difficulty": "ADVANCED CORE", "title": "Window Function Processing Order", "whatItIs": "Window functions are evaluated AFTER WHERE, GROUP BY, and HAVING but BEFORE ORDER BY and LIMIT. This means window functions see the filtered, grouped result -- but you cannot filter on a window function result in the same WHERE clause; wrap in a subquery or CTE.", "example": "To filter WHERE row_num = 1 on ROW_NUMBER(), wrap: WITH r AS (SELECT *, ROW_NUMBER() OVER ... AS rn FROM ...) SELECT * FROM r WHERE rn = 1."}, {"n": 46, "cardNo": 46, "type": "concept", "section": "Subqueries & Ctes", "difficulty": "INTERMEDIATE", "title": "Scalar Subquery", "whatItIs": "A subquery that returns exactly one row and one column. It can appear anywhere a single value is expected: in SELECT, WHERE, or even FROM. If it returns more than one row, the query errors at runtime.", "example": "SELECT name, salary - (SELECT AVG(salary) FROM employees) AS diff_from_avg FROM employees."}, {"n": 47, "cardNo": 47, "type": "concept", "section": "Subqueries & Ctes", "difficulty": "INTERMEDIATE", "title": "Subquery in FROM (Derived Table)", "whatItIs": "A subquery placed in the FROM clause creates a temporary inline result set (derived table) that the outer query treats like a regular table. Must be aliased. Evaluated once per outer query in most optimisers.", "example": "SELECT dept, avg_sal FROM (SELECT dept, AVG(salary) AS avg_sal FROM emp GROUP BY dept) t WHERE avg_sal > 80000."}, {"n": 48, "cardNo": 48, "type": "concept", "section": "Subqueries & Ctes", "difficulty": "INTERMEDIATE", "title": "Correlated Subquery", "whatItIs": "A subquery that references a column from the outer query. It is re-executed for each outer row, which makes it potentially slow on large tables. EXISTS and NOT EXISTS are the most common correlated patterns.", "example": "SELECT * FROM orders o WHERE EXISTS (SELECT 1 FROM payments p WHERE p.order_id = o.order_id) -- orders that have at least one payment."}, {"n": 49, "cardNo": 49, "type": "concept", "section": "Subqueries & Ctes", "difficulty": "INTERMEDIATE", "title": "EXISTS vs IN", "whatItIs": "EXISTS returns TRUE as soon as one matching row is found (short-circuits). IN materialises all matching values and then checks membership. EXISTS is generally faster for large right-side sets; IN is cleaner when the list is small or static.", "example": "Prefer EXISTS for 'does at least one match exist?' and IN for 'is this value in this small list?'"}, {"n": 50, "cardNo": 50, "type": "concept", "section": "Subqueries & Ctes", "difficulty": "INTERMEDIATE", "title": "ANY / ALL", "whatItIs": "ANY (or SOME) returns TRUE if the comparison is true for at least one value in the subquery result. ALL returns TRUE only if the comparison is true for every value. Often replaceable by MIN/MAX for clarity.", "example": "WHERE salary > ALL (SELECT salary FROM employees WHERE dept = 'Support') -- earns more than every Support employee."}, {"n": 51, "cardNo": 51, "type": "concept", "section": "Subqueries & Ctes", "difficulty": "INTERMEDIATE", "title": "Common Table Expression (CTE)", "whatItIs": "A named temporary result set defined with WITH ... AS (...) that is referenced in the main query. CTEs improve readability by naming intermediate steps. In most databases they are inlined (not materialised) unless specified.", "example": "WITH ranked AS (SELECT *, ROW_NUMBER() OVER (PARTITION BY dept ORDER BY salary DESC) AS rn FROM emp) SELECT * FROM ranked WHERE rn = 1."}, {"n": 52, "cardNo": 52, "type": "concept", "section": "Subqueries & Ctes", "difficulty": "INTERMEDIATE", "title": "CTE Materialisation", "whatItIs": "PostgreSQL 12+ inlines CTEs by default (treats them like subqueries and optimises through them). You can force materialisation with AS MATERIALIZED, which evaluates the CTE once and caches it -- useful when it is referenced multiple times or for isolation.", "example": "WITH expensive AS MATERIALIZED (SELECT ... huge computation ...) SELECT * FROM expensive e1 JOIN expensive e2 ON ... -- runs once."}, {"n": 53, "cardNo": 53, "type": "concept", "section": "Subqueries & Ctes", "difficulty": "INTERMEDIATE", "title": "Recursive CTE", "whatItIs": "A CTE that references itself, enabling traversal of hierarchical data (trees, graphs). Structure: anchor member UNION ALL recursive member that joins back to the CTE. Must terminate (CYCLE detection or row limit). Uses: org charts, bill of materials, graph traversal.", "example": "WITH RECURSIVE org AS (SELECT id, name, manager_id FROM emp WHERE manager_id IS NULL UNION ALL SELECT e.id, e.name, e.manager_id FROM emp e JOIN org o ON e.manager_id = o.id) SELECT * FROM org."}, {"n": 54, "cardNo": 54, "type": "concept", "section": "Subqueries & Ctes", "difficulty": "INTERMEDIATE", "title": "LATERAL Subquery vs Correlated", "whatItIs": "A LATERAL subquery in FROM is like a correlated subquery but can return multiple rows and columns. It is re-evaluated for each outer row, like a correlated subquery, but its full result set joins into the outer FROM context.", "example": "FROM customers c, LATERAL (SELECT * FROM orders WHERE customer_id = c.id ORDER BY date DESC LIMIT 3) recent -- last 3 orders per customer."}, {"n": 55, "cardNo": 55, "type": "concept", "section": "Set Operations", "difficulty": "CORE SKILL", "title": "UNION vs UNION ALL", "whatItIs": "UNION stacks two result sets and removes duplicate rows (requires a sort or hash dedup -- expensive). UNION ALL stacks them without removing duplicates and is always faster. Both require matching column count and compatible data types.", "example": "SELECT email FROM customers UNION ALL SELECT email FROM newsletter_signups -- all emails including duplicates (fast)."}, {"n": 56, "cardNo": 56, "type": "concept", "section": "Set Operations", "difficulty": "CORE SKILL", "title": "INTERSECT", "whatItIs": "Returns only rows present in BOTH result sets, eliminating duplicates. Equivalent to an INNER JOIN on all columns or a subquery with IN. Requires matching column count and compatible types.", "example": "SELECT customer_id FROM high_value INTERSECT SELECT customer_id FROM active_last_90d -- high-value AND recently active."}, {"n": 57, "cardNo": 57, "type": "concept", "section": "Set Operations", "difficulty": "CORE SKILL", "title": "EXCEPT (MINUS)", "whatItIs": "Returns rows from the first result set that do NOT appear in the second. Order matters: A EXCEPT B != B EXCEPT A. MINUS is Oracle syntax for the same operation.", "example": "SELECT product_id FROM all_products EXCEPT SELECT product_id FROM sold_products -- products never sold."}, {"n": 58, "cardNo": 58, "type": "concept", "section": "Set Operations", "difficulty": "CORE SKILL", "title": "Set Operation Rules", "whatItIs": "All set operations require the same number of columns and compatible (or castable) data types. Column names in the result come from the first SELECT. ORDER BY goes at the very end and applies to the combined result.", "example": "SELECT id, name FROM a UNION SELECT id, label FROM b ORDER BY name -- 'name' is the alias from the first SELECT."}, {"n": 59, "cardNo": 59, "type": "concept", "section": "Data Modification (Dml)", "difficulty": "CORE SKILL", "title": "INSERT", "whatItIs": "Adds new rows to a table. INSERT INTO ... VALUES (...) inserts literal values. INSERT INTO ... SELECT inserts from a query. Listing columns explicitly is best practice -- it decouples your statement from table column order.", "example": "INSERT INTO orders (customer_id, amount, status) VALUES (42, 199.99, 'pending') -- explicit column list guards against schema changes."}, {"n": 60, "cardNo": 60, "type": "concept", "section": "Data Modification (Dml)", "difficulty": "CORE SKILL", "title": "UPDATE", "whatItIs": "Modifies existing rows matching the WHERE clause. Without WHERE, every row in the table is updated -- a common destructive mistake. SET can reference the row's own values (e.g., SET balance = balance - 100).", "example": "UPDATE accounts SET balance = balance - 100 WHERE account_id = 7 AND balance >= 100 -- safe debit with guard."}, {"n": 61, "cardNo": 61, "type": "concept", "section": "Data Modification (Dml)", "difficulty": "CORE SKILL", "title": "DELETE vs TRUNCATE", "whatItIs": "DELETE removes rows matching a WHERE clause, fires triggers, and is logged row-by-row -- recoverable. TRUNCATE removes all rows instantly (DDL in some databases), bypasses triggers, and cannot have a WHERE clause but is much faster.", "example": "TRUNCATE staging.raw_events resets a staging table instantly; DELETE FROM staging.raw_events WHERE created < '2024-01-01' removes specific rows with full logging."}, {"n": 62, "cardNo": 62, "type": "concept", "section": "Data Modification (Dml)", "difficulty": "CORE SKILL", "title": "UPSERT (INSERT ... ON CONFLICT)", "whatItIs": "Inserts a row or updates it if a unique/PK constraint would be violated. PostgreSQL uses ON CONFLICT (col) DO UPDATE SET ...; MySQL uses INSERT ... ON DUPLICATE KEY UPDATE. Enables idempotent writes.", "example": "INSERT INTO daily_stats (date, clicks) VALUES ('2024-06-01', 500) ON CONFLICT (date) DO UPDATE SET clicks = EXCLUDED.clicks + 500."}, {"n": 63, "cardNo": 63, "type": "concept", "section": "Data Modification (Dml)", "difficulty": "CORE SKILL", "title": "RETURNING Clause", "whatItIs": "PostgreSQL extension: appends RETURNING col1, col2 to INSERT, UPDATE, or DELETE to return affected rows as a result set. Eliminates a separate SELECT to retrieve auto-generated keys or verify modifications.", "example": "INSERT INTO orders (...) VALUES (...) RETURNING order_id -- immediately get the new auto-generated order_id."}, {"n": 64, "cardNo": 64, "type": "concept", "section": "Data Modification (Dml)", "difficulty": "CORE SKILL", "title": "MERGE (Upsert Standard)", "whatItIs": "SQL standard command that conditionally INSERTs, UPDATEs, or DELETEs target rows based on whether they match source rows. Useful for applying a delta/diff table onto a target. Available in SQL Server, Oracle, DB2; PostgreSQL added MERGE in v15.", "example": "MERGE INTO orders USING updates ON orders.id = updates.id WHEN MATCHED THEN UPDATE ... WHEN NOT MATCHED THEN INSERT ...;"}, {"n": 65, "cardNo": 65, "type": "concept", "section": "Data Modification (Dml)", "difficulty": "CORE SKILL", "title": "CTE in DML", "whatItIs": "CTEs can prefix UPDATE, INSERT, and DELETE statements, enabling complex logic before the write. The CTE and the DML statement form a single atomic statement.", "example": "WITH top_cust AS (SELECT id FROM customers ORDER BY ltv DESC LIMIT 100) UPDATE customers SET tier = 'gold' WHERE id IN (SELECT id FROM top_cust)."}, {"n": 66, "cardNo": 66, "type": "concept", "section": "Data Modification (Dml)", "difficulty": "CORE SKILL", "title": "COPY / Bulk Load", "whatItIs": "COPY (PostgreSQL) or LOAD DATA (MySQL) bulk-loads data from a flat file much faster than individual INSERTs by bypassing row-level overhead. Used for initial loads, staging area ingestion, and data pipeline inputs.", "example": "COPY transactions FROM '/tmp/txns.csv' WITH (FORMAT CSV, HEADER true, DELIMITER ',') -- loads millions of rows in seconds."}, {"n": 67, "cardNo": 67, "type": "concept", "section": "Transactions & Concurrency", "difficulty": "INTERMEDIATE", "title": "ACID Properties", "whatItIs": "Atomicity: all operations in a transaction succeed or none do. Consistency: the transaction leaves the database in a valid state. Isolation: concurrent transactions behave as if serialised. Durability: committed changes survive crashes.", "example": "A bank transfer that debits one account and credits another is atomic -- a crash between the two operations cannot leave money in limbo."}, {"n": 68, "cardNo": 68, "type": "concept", "section": "Transactions & Concurrency", "difficulty": "INTERMEDIATE", "title": "BEGIN / COMMIT / ROLLBACK", "whatItIs": "BEGIN starts a transaction. COMMIT makes all changes permanent. ROLLBACK undoes all changes since BEGIN. Unhandled errors should always trigger ROLLBACK to avoid partial state. In autocommit mode each statement is its own transaction.", "example": "BEGIN; UPDATE accounts SET balance = balance - 100 WHERE id = 1; UPDATE accounts SET balance = balance + 100 WHERE id = 2; COMMIT;"}, {"n": 69, "cardNo": 69, "type": "concept", "section": "Transactions & Concurrency", "difficulty": "INTERMEDIATE", "title": "SAVEPOINT", "whatItIs": "A named point within a transaction to which you can partially roll back without aborting the entire transaction. After ROLLBACK TO SAVEPOINT, execution continues from the savepoint, and the transaction can still be committed.", "example": "SAVEPOINT sp1; ... risky operation ...; ROLLBACK TO SAVEPOINT sp1; ... retry alternative ...; COMMIT;"}, {"n": 70, "cardNo": 70, "type": "concept", "section": "Transactions & Concurrency", "difficulty": "INTERMEDIATE", "title": "Dirty Read", "whatItIs": "A transaction reads data written by another uncommitted transaction. If the writer later rolls back, the reader acted on data that never 'existed'. Prevented at READ COMMITTED and above.", "example": "Transaction A reads a balance updated by Transaction B; B rolls back -- A saw a ghost value that was never committed."}, {"n": 71, "cardNo": 71, "type": "concept", "section": "Transactions & Concurrency", "difficulty": "INTERMEDIATE", "title": "Non-Repeatable Read", "whatItIs": "A transaction reads the same row twice and gets different values because another transaction committed an update in between. Prevented at REPEATABLE READ and above.", "example": "T1 reads price = 100; T2 updates price to 150 and commits; T1 reads price again and sees 150 -- inconsistent within one transaction."}, {"n": 72, "cardNo": 72, "type": "concept", "section": "Transactions & Concurrency", "difficulty": "INTERMEDIATE", "title": "Phantom Read", "whatItIs": "A transaction re-executes a query and sees rows that were inserted (or deleted) by another committed transaction in between. REPEATABLE READ prevents value changes but not phantom rows; SERIALIZABLE prevents phantoms.", "example": "T1 counts orders > $1000 and gets 5; T2 inserts a new qualifying order; T1 recounts and gets 6 -- a phantom appeared."}, {"n": 73, "cardNo": 73, "type": "concept", "section": "Transactions & Concurrency", "difficulty": "INTERMEDIATE", "title": "Isolation Levels", "whatItIs": "SQL defines four levels: READ UNCOMMITTED (allows dirty reads), READ COMMITTED (default in most systems -- prevents dirty reads), REPEATABLE READ (prevents non-repeatable reads), SERIALIZABLE (prevents phantoms, full isolation). Higher isolation reduces anomalies but increases contention.", "example": "PostgreSQL default is READ COMMITTED; use SERIALIZABLE for financial aggregations that must not see concurrent partial updates."}, {"n": 74, "cardNo": 74, "type": "concept", "section": "Transactions & Concurrency", "difficulty": "INTERMEDIATE", "title": "Optimistic vs Pessimistic Locking", "whatItIs": "Pessimistic locking acquires locks before accessing data (SELECT ... FOR UPDATE) to block concurrent writes. Optimistic locking checks a version/timestamp at commit time and retries on conflict -- better for low-contention workloads.", "example": "SELECT ... FOR UPDATE locks the row immediately; an optimistic approach stores version = 5 and at UPDATE checks WHERE version = 5 then increments it."}, {"n": 75, "cardNo": 75, "type": "concept", "section": "Transactions & Concurrency", "difficulty": "INTERMEDIATE", "title": "Deadlock", "whatItIs": "Two (or more) transactions each hold a lock the other needs, causing both to wait forever. The DBMS detects this via a wait-for graph and kills one transaction (the 'victim'), which must retry. Prevention: always acquire locks in the same order.", "example": "T1 locks Account A then waits for B; T2 locks Account B then waits for A -- classic deadlock, DBMS aborts one."}, {"n": 76, "cardNo": 76, "type": "concept", "section": "Indexes & Query Performance", "difficulty": "INTERMEDIATE", "title": "B-Tree Index", "whatItIs": "The default index type in most relational databases. A balanced tree where leaf nodes point to heap rows, sorted by key. Supports equality (=), range (<, >, BETWEEN), and ORDER BY operations efficiently. Log(n) lookup time.", "example": "CREATE INDEX idx_orders_customer ON orders(customer_id) -- B-tree; WHERE customer_id = 42 becomes a fast index scan."}, {"n": 77, "cardNo": 77, "type": "concept", "section": "Indexes & Query Performance", "difficulty": "INTERMEDIATE", "title": "Hash Index", "whatItIs": "Maps index keys to buckets via a hash function. O(1) equality lookups -- faster than B-tree for pure equality. Cannot support range queries or ORDER BY. In PostgreSQL, hash indexes are WAL-logged since v10.", "example": "A hash index on email supports WHERE email = 'a@b.com' instantly but cannot support WHERE email LIKE 'a%'."}, {"n": 78, "cardNo": 78, "type": "concept", "section": "Indexes & Query Performance", "difficulty": "INTERMEDIATE", "title": "Covering Index", "whatItIs": "An index that contains all columns needed by a query in the index leaf pages themselves, so no heap (table) access is needed. Called an 'index-only scan' in PostgreSQL. Eliminates the most expensive I/O step.", "example": "CREATE INDEX ON orders(customer_id) INCLUDE (total_amount) -- a query selecting customer_id and total_amount needs no table access."}, {"n": 79, "cardNo": 79, "type": "concept", "section": "Indexes & Query Performance", "difficulty": "INTERMEDIATE", "title": "Composite Index", "whatItIs": "An index on two or more columns. Useful only when the query filters on a left-prefix of the index columns (leftmost prefix rule). Column order matters -- put the highest-cardinality or most-filtered column first.", "example": "INDEX ON (status, created_at) helps WHERE status = 'paid' AND created_at > '2024-01-01' but NOT a query filtering only on created_at."}, {"n": 80, "cardNo": 80, "type": "concept", "section": "Indexes & Query Performance", "difficulty": "INTERMEDIATE", "title": "Partial Index", "whatItIs": "An index built on a subset of rows satisfying a WHERE condition. Smaller and faster than a full-table index when queries consistently filter the same condition.", "example": "CREATE INDEX idx_active ON accounts(email) WHERE status = 'active' -- index covers only active accounts, much smaller than a full index."}, {"n": 81, "cardNo": 81, "type": "concept", "section": "Indexes & Query Performance", "difficulty": "INTERMEDIATE", "title": "Index Selectivity", "whatItIs": "The ratio of distinct values to total rows. High selectivity (many distinct values, e.g., unique IDs) makes indexes highly effective. Low selectivity (e.g., a boolean flag) means the planner often prefers a sequential scan.", "example": "An index on a 'gender' column with 2 values has near-zero selectivity -- the planner may ignore it and scan the table instead."}, {"n": 82, "cardNo": 82, "type": "concept", "section": "Indexes & Query Performance", "difficulty": "INTERMEDIATE", "title": "EXPLAIN / EXPLAIN ANALYZE", "whatItIs": "EXPLAIN shows the query plan the optimizer chose without executing. EXPLAIN ANALYZE actually runs the query and shows planned vs actual row counts and timings. Look for sequential scans on large tables, high row estimates vs actuals, and hash batches.", "example": "EXPLAIN ANALYZE SELECT ... reveals a Seq Scan on a 10M-row table -- the missing index opportunity."}, {"n": 83, "cardNo": 83, "type": "concept", "section": "Indexes & Query Performance", "difficulty": "INTERMEDIATE", "title": "Sequential Scan vs Index Scan", "whatItIs": "A sequential scan reads every page of the table -- efficient when most rows qualify. An index scan uses the index to find specific rows then fetches heap pages -- efficient for selective queries. The planner chooses based on cost estimates using table statistics.", "example": "Fetching 80% of rows -> seq scan wins. Fetching 0.1% of rows -> index scan wins. The threshold varies by table size and I/O cost."}, {"n": 84, "cardNo": 84, "type": "concept", "section": "Indexes & Query Performance", "difficulty": "INTERMEDIATE", "title": "Vacuum and Statistics", "whatItIs": "PostgreSQL's VACUUM reclaims space from dead rows left by MVCC updates/deletes. ANALYZE collects column statistics (histograms, distinct counts) that the query planner uses to estimate row counts. Stale statistics cause bad plans.", "example": "ANALYZE orders after a large bulk load ensures the planner knows the new data distribution and picks accurate execution plans."}, {"n": 85, "cardNo": 85, "type": "concept", "section": "Indexes & Query Performance", "difficulty": "INTERMEDIATE", "title": "Index Bloat", "whatItIs": "Indexes accumulate dead entries from UPDATEs and DELETEs (because old versions remain for MVCC). Over time the index grows bloated, slowing scans. REINDEX or periodic VACUUM ANALYZE mitigates this.", "example": "A heavily updated 'status' column index may become 3x its logical size due to bloat; pg_stat_user_indexes shows index size vs table size."}, {"n": 86, "cardNo": 86, "type": "concept", "section": "Schema Design & Normalization", "difficulty": "DESIGN PATTERNS", "title": "First Normal Form (1NF)", "whatItIs": "Each column holds a single atomic value (no repeating groups or arrays stored as CSV). Every row is uniquely identifiable. 1NF is the baseline for relational design.", "example": "Storing 'tag1,tag2,tag3' in one column violates 1NF; the fix is a separate 'tags' table with one row per tag."}, {"n": 87, "cardNo": 87, "type": "concept", "section": "Schema Design & Normalization", "difficulty": "DESIGN PATTERNS", "title": "Second Normal Form (2NF)", "whatItIs": "Requires 1NF plus: every non-key attribute must depend on the whole primary key, not just part of it (no partial dependencies). Applies only when the PK is composite.", "example": "In order_items(order_id, product_id, product_name): product_name depends only on product_id, not the full composite PK -- violates 2NF. Move product_name to a products table."}, {"n": 88, "cardNo": 88, "type": "concept", "section": "Schema Design & Normalization", "difficulty": "DESIGN PATTERNS", "title": "Third Normal Form (3NF)", "whatItIs": "Requires 2NF plus: no non-key attribute should depend on another non-key attribute (no transitive dependencies). Each fact belongs in exactly one place.", "example": "In employees(emp_id, dept_id, dept_name): dept_name depends on dept_id (a non-key column) -- transitive dep. Move dept_name to a departments table."}, {"n": 89, "cardNo": 89, "type": "concept", "section": "Schema Design & Normalization", "difficulty": "DESIGN PATTERNS", "title": "Boyce-Codd Normal Form (BCNF)", "whatItIs": "A slightly stronger version of 3NF: for every functional dependency X -> Y, X must be a superkey. Eliminates anomalies that 3NF misses when there are multiple overlapping candidate keys.", "example": "In (student, course, teacher) where teacher always teaches one course: teacher -> course but teacher is not a superkey -- BCNF violation; split the table."}, {"n": 90, "cardNo": 90, "type": "concept", "section": "Schema Design & Normalization", "difficulty": "DESIGN PATTERNS", "title": "Denormalization", "whatItIs": "Intentionally violating normal forms by duplicating data to improve read performance. Reduces join depth at the cost of storage and update anomaly risk. Common in OLAP data warehouses, hot caches, and reporting layers.", "example": "Copying customer_name into the orders table avoids joining customers on every order query -- acceptable in a read-heavy reporting schema."}, {"n": 91, "cardNo": 91, "type": "concept", "section": "Schema Design & Normalization", "difficulty": "DESIGN PATTERNS", "title": "Star Schema", "whatItIs": "A data warehouse design with a central fact table (measurable events: sales, clicks) surrounded by dimension tables (who, what, when, where). Dimensions are denormalized for fast query performance. Joins are always one-hop from fact to dimension.", "example": "fact_sales(sale_id, date_key, product_key, customer_key, amount) + dim_date, dim_product, dim_customer."}, {"n": 92, "cardNo": 92, "type": "concept", "section": "Schema Design & Normalization", "difficulty": "DESIGN PATTERNS", "title": "Snowflake Schema", "whatItIs": "Like a star schema but dimensions are normalized into sub-dimensions, forming a snowflake shape. Saves storage and avoids update anomalies in dimensions, but requires more joins for queries.", "example": "dim_product -> dim_category -> dim_department: three tables instead of one flat product dimension."}, {"n": 93, "cardNo": 93, "type": "concept", "section": "Schema Design & Normalization", "difficulty": "DESIGN PATTERNS", "title": "Slowly Changing Dimension (SCD)", "whatItIs": "A dimension (e.g., customer address, product price) whose values change over time. SCD Type 1 overwrites old values; Type 2 inserts a new row with valid_from/valid_to date range, preserving history; Type 3 adds a 'previous value' column.", "example": "SCD Type 2 on dim_customer: a customer who moves gets a new row with valid_from = move date; old row's valid_to is set to move date - 1."}, {"n": 94, "cardNo": 94, "type": "concept", "section": "Schema Design & Normalization", "difficulty": "DESIGN PATTERNS", "title": "Entity-Attribute-Value (EAV)", "whatItIs": "Stores schema-flexible data as (entity_id, attribute_name, value) triples instead of columns. Avoids DDL changes for new attributes but makes queries verbose, breaks type safety, and is hard to index effectively. An anti-pattern in most OLTP systems.", "example": "product_attributes(product_id, attr_name, attr_value): to get color and size requires two self-joins on the same table."}, {"n": 95, "cardNo": 95, "type": "concept", "section": "Advanced Sql Features", "difficulty": "ADVANCED", "title": "JSON / JSONB", "whatItIs": "PostgreSQL stores JSON as text (JSON) or as a binary decomposed format (JSONB). JSONB is indexable with GIN, supports containment operators (@>, <@), and is faster to query at the cost of slightly slower writes. Use JSONB for semi-structured columns you need to query.", "example": "SELECT payload->>'user_id' FROM events WHERE payload @> '{\"event\":\"purchase\"}' -- JSONB containment query with a GIN index."}, {"n": 96, "cardNo": 96, "type": "concept", "section": "Advanced Sql Features", "difficulty": "ADVANCED", "title": "GIN Index (for JSON/Array/Text)", "whatItIs": "Generalised Inverted Index: maps each element (word, array item, JSON key) to the rows containing it. Ideal for full-text search, JSONB operators, and array containment. Slower to build and update than B-tree but essential for element-level searches.", "example": "CREATE INDEX idx_payload ON events USING GIN(payload) -- enables fast @>, <@, ? operators on the JSONB column."}, {"n": 97, "cardNo": 97, "type": "concept", "section": "Advanced Sql Features", "difficulty": "ADVANCED", "title": "Generated Columns", "whatItIs": "A column whose value is automatically computed from other columns in the same row, defined at DDL time. STORED generated columns are persisted to disk and can be indexed. VIRTUAL (supported in MySQL/SQLite) are computed on read.", "example": "revenue NUMERIC GENERATED ALWAYS AS (quantity * unit_price) STORED -- automatically updated whenever quantity or unit_price changes."}, {"n": 98, "cardNo": 98, "type": "concept", "section": "Advanced Sql Features", "difficulty": "ADVANCED", "title": "Table Partitioning", "whatItIs": "Splitting a large table into smaller physical partitions on a partition key. RANGE partitioning (common for dates), LIST partitioning (by category), and HASH partitioning (even distribution). The query planner prunes irrelevant partitions (partition pruning).", "example": "Partition fact_sales by RANGE (sale_date) -- a query WHERE sale_date = '2024-06-01' scans only the June 2024 partition."}, {"n": 99, "cardNo": 99, "type": "concept", "section": "Advanced Sql Features", "difficulty": "ADVANCED", "title": "Materialized View", "whatItIs": "A view whose result is physically stored on disk and can be indexed. Queries hit the stored copy (fast), but the data is stale until REFRESH MATERIALIZED VIEW is run. Use for expensive aggregations queried frequently but not needing real-time data.", "example": "CREATE MATERIALIZED VIEW monthly_revenue AS SELECT ... GROUP BY month; REFRESH MATERIALIZED VIEW monthly_revenue CONCURRENTLY -- non-blocking refresh."}, {"n": 100, "cardNo": 100, "type": "concept", "section": "Advanced Sql Features", "difficulty": "ADVANCED", "title": "FULL-TEXT SEARCH (tsvector / tsquery)", "whatItIs": "PostgreSQL converts text to a tsvector (lexeme tokens) and a search query to a tsquery. The @@ operator matches them. Supports ranking (ts_rank), stemming, and stop words. GIN index on tsvector makes it scalable.", "example": "WHERE to_tsvector('english', body) @@ to_tsquery('english', 'credit & card') -- finds all rows mentioning both words in English."}, {"n": 101, "cardNo": 101, "type": "concept", "section": "Advanced Sql Features", "difficulty": "ADVANCED", "title": "Range Types", "whatItIs": "PostgreSQL native types for ranges of values: int4range, daterange, tsrange, numrange. Support containment (@>), overlap (&&), and adjacency (--|-) operators. GiST indexes enable efficient range queries.", "example": "WHERE '[2024-01-01,2024-12-31]'::daterange @> subscription_start -- subscriptions starting inside 2024."}, {"n": 102, "cardNo": 102, "type": "concept", "section": "Advanced Sql Features", "difficulty": "ADVANCED", "title": "Foreign Data Wrappers (FDW)", "whatItIs": "An SQL/MED standard mechanism to query external data sources (other databases, CSVs, APIs) as if they were local tables, without ETL. PostgreSQL's postgres_fdw connects to remote Postgres instances; mysql_fdw, file_fdw, and others extend this.", "example": "CREATE FOREIGN TABLE remote_orders SERVER other_db OPTIONS (table_name 'orders') -- then SELECT as if local."}, {"n": 103, "cardNo": 103, "type": "concept", "section": "Advanced Sql Features", "difficulty": "ADVANCED", "title": "Sequences and SERIAL", "whatItIs": "A SEQUENCE is a database object that generates unique integers. SERIAL / BIGSERIAL is syntactic sugar that creates a sequence and links it to a column default. GENERATED ALWAYS AS IDENTITY is the SQL standard equivalent and preferred.", "example": "id BIGINT GENERATED ALWAYS AS IDENTITY PRIMARY KEY -- auto-incrementing PK without a separate SEQUENCE object."}, {"n": 104, "cardNo": 104, "type": "concept", "section": "Advanced Sql Features", "difficulty": "ADVANCED", "title": "Triggers", "whatItIs": "Stored procedures that fire automatically BEFORE or AFTER INSERT/UPDATE/DELETE (or INSTEAD OF for views). Used for audit logging, constraint enforcement, and derived column maintenance. Overuse makes behaviour implicit and hard to trace.", "example": "A BEFORE INSERT trigger on orders can auto-set created_at = NOW() and validate business rules before any row is written."}, {"n": 105, "cardNo": 105, "type": "concept", "section": "Sql For Analytics & Ml", "difficulty": "APPLIED", "title": "Pivoting with Conditional Aggregation", "whatItIs": "Rotating row values into columns using CASE WHEN inside aggregate functions. This is the SQL-native pivot -- no vendor extension needed and works everywhere. Each column in the pivot is one CASE WHEN aggregate.", "example": "SELECT customer_id, SUM(CASE WHEN product = 'A' THEN revenue END) AS prod_a, SUM(CASE WHEN product = 'B' THEN revenue END) AS prod_b FROM sales GROUP BY customer_id."}, {"n": 106, "cardNo": 106, "type": "concept", "section": "Sql For Analytics & Ml", "difficulty": "APPLIED", "title": "Running Total / Cumulative Sum", "whatItIs": "A running total is computed with SUM() OVER (ORDER BY ...) using the default frame (rows preceding to current). The sum grows with each row. Used for cumulative revenue, balance, etc.", "example": "SELECT date, revenue, SUM(revenue) OVER (ORDER BY date) AS cumulative_revenue FROM daily_sales."}, {"n": 107, "cardNo": 107, "type": "concept", "section": "Sql For Analytics & Ml", "difficulty": "APPLIED", "title": "Moving Average", "whatItIs": "Smooths a time series by averaging over a sliding window. Computed with AVG() OVER (ORDER BY date ROWS BETWEEN n PRECEDING AND CURRENT ROW). Adjust n for 7-day, 30-day windows.", "example": "AVG(daily_active_users) OVER (ORDER BY date ROWS BETWEEN 6 PRECEDING AND CURRENT ROW) AS dau_7d_avg."}, {"n": 108, "cardNo": 108, "type": "concept", "section": "Sql For Analytics & Ml", "difficulty": "APPLIED", "title": "Sessionisation", "whatItIs": "Grouping user events into sessions based on inactivity gaps. Pattern: use LAG to find the previous event time, flag a new session when the gap exceeds a threshold, then cumulative SUM of flags assigns a session id.", "example": "WITH gaps AS (SELECT *, CASE WHEN event_time - LAG(event_time) OVER (PARTITION BY user_id ORDER BY event_time) > INTERVAL '30 min' THEN 1 ELSE 0 END AS new_sess FROM events) SELECT *, SUM(new_sess) OVER (PARTITION BY user_id ORDER BY event_time) AS session_id FROM gaps."}, {"n": 109, "cardNo": 109, "type": "concept", "section": "Sql For Analytics & Ml", "difficulty": "APPLIED", "title": "Funnel Analysis", "whatItIs": "Counting users at each step of a conversion funnel. Pattern: LEFT JOIN each step's user set to the previous step, or use SUM of CASE WHEN flags. Identifies drop-off rates between steps.", "example": "SELECT COUNT(DISTINCT signup_id) AS signups, COUNT(DISTINCT verified_id) AS verified, COUNT(DISTINCT paid_id) AS paid FROM funnel_steps."}, {"n": 110, "cardNo": 110, "type": "concept", "section": "Sql For Analytics & Ml", "difficulty": "APPLIED", "title": "Cohort Analysis", "whatItIs": "Grouping users by their join/first-purchase date (cohort) and tracking behaviour over time periods. Uses DATE_TRUNC to bin dates and a self-join or window function to compute period number from cohort date.", "example": "SELECT DATE_TRUNC('month', first_purchase) AS cohort, EXTRACT(MONTH FROM AGE(txn_date, first_purchase)) AS period, COUNT(DISTINCT user_id) AS retained FROM ..."}, {"n": 111, "cardNo": 111, "type": "concept", "section": "Sql For Analytics & Ml", "difficulty": "APPLIED", "title": "Percentile Functions", "whatItIs": "PERCENTILE_CONT(p) WITHIN GROUP (ORDER BY col) returns the p-th percentile by linear interpolation. PERCENTILE_DISC returns the nearest actual data value. Both are ordered-set aggregate functions -- not window functions.", "example": "SELECT PERCENTILE_CONT(0.5) WITHIN GROUP (ORDER BY loan_amount) AS median_loan, PERCENTILE_CONT(0.95) WITHIN GROUP (ORDER BY loan_amount) AS p95_loan FROM loans."}, {"n": 112, "cardNo": 112, "type": "concept", "section": "Sql For Analytics & Ml", "difficulty": "APPLIED", "title": "Sampling in SQL", "whatItIs": "TABLESAMPLE SYSTEM(p) returns approximately p% of table blocks (fast, biased toward co-located rows). TABLESAMPLE BERNOULLI(p) samples each row independently (unbiased, slower). ORDER BY RANDOM() LIMIT n is simple but expensive on large tables.", "example": "SELECT * FROM transactions TABLESAMPLE BERNOULLI(1) -- random 1% sample for quick model prototyping."}, {"n": 113, "cardNo": 113, "type": "concept", "section": "Sql For Analytics & Ml", "difficulty": "APPLIED", "title": "LAG-Based Feature Engineering", "whatItIs": "Creating lag features for ML directly in SQL: LAG(value, n) OVER (PARTITION BY entity ORDER BY time) gives the n-period-ago value. Ratio and difference features derive from current vs lagged values -- standard practice for forecasting datasets.", "example": "SELECT customer_id, month, revenue, LAG(revenue,1) OVER (PARTITION BY customer_id ORDER BY month) AS revenue_prev_month, revenue / NULLIF(LAG(revenue,1) OVER (...), 0) - 1 AS mom_growth FROM monthly_revenue."}, {"n": 114, "cardNo": 114, "type": "concept", "section": "Sql For Analytics & Ml", "difficulty": "APPLIED", "title": "Window Frame for Rolling Features", "whatItIs": "Rolling aggregates for feature stores: use ROWS BETWEEN n PRECEDING AND 1 PRECEDING to compute look-back features without data leakage (the current row is excluded). Critical for point-in-time correctness in training data.", "example": "AVG(txn_amount) OVER (PARTITION BY customer_id ORDER BY txn_date ROWS BETWEEN 29 PRECEDING AND 1 PRECEDING) AS avg_30d_excl_today -- avoids target leakage."}];
const PROG_KEY = "fc_sql_v1";
const RESUME_KEY = "fc_sql_resume";
const $ = id => document.getElementById(id);

let prog = {};
try { prog = JSON.parse(localStorage.getItem(PROG_KEY)) || {}; } catch(e){ prog = {}; }
function saveProg(){ try{ localStorage.setItem(PROG_KEY, JSON.stringify(prog)); }catch(e){} }

let baseSeq = CARDS.map((c,i)=>i);
let sectionFilter = "ALL", pile = "ALL", order = [], pos = 0;
let lastAction = null, lastQuery = "", lastMatchPos = -1;

try { const r = JSON.parse(localStorage.getItem(RESUME_KEY));
  if(r){ sectionFilter=r.sectionFilter||"ALL"; pile=r.pile||"ALL"; pos=r.pos||0; } } catch(e){}
function saveResume(){ try{ localStorage.setItem(RESUME_KEY, JSON.stringify({sectionFilter,pile,pos})); }catch(e){} }

(function(){
  const sel=$("sectionSel");
  const sections=[...new Set(CARDS.map(c=>c.section))];
  sel.innerHTML='<option value="ALL">All sections ('+CARDS.length+')</option>'+
    sections.map(s=>{const n=CARDS.filter(c=>c.section===s).length;
      return '<option value="'+encodeURIComponent(s)+'">'+s+' ('+n+')</option>';}).join('');
  sel.value=sectionFilter==="ALL"?"ALL":encodeURIComponent(sectionFilter);
  sel.addEventListener('change',()=>{sectionFilter=sel.value==="ALL"?"ALL":decodeURIComponent(sel.value);
    pos=0; buildOrder(); render();});
})();

$("pills").addEventListener('click',e=>{const b=e.target.closest('.pill');if(!b)return;
  pile=b.dataset.pile;[...document.querySelectorAll('.pill')].forEach(p=>p.classList.toggle('active',p===b));
  pos=0; buildOrder(); render();});

function inSection(i){return sectionFilter==="ALL"||CARDS[i].section===sectionFilter;}
function inPile(i){const st=prog[CARDS[i].n];if(pile==="ALL")return true;if(pile==="new")return !st;return st===pile;}
function buildOrder(){order=baseSeq.filter(i=>inSection(i)&&inPile(i));if(pos>order.length)pos=0;}
function shuffle(){for(let i=baseSeq.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[baseSeq[i],baseSeq[j]]=[baseSeq[j],baseSeq[i]];}}

function esc(s){return (s||"").replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function hl(s){s=esc(s);if(lastQuery&&!/^\d+$/.test(lastQuery)){
  try{s=s.replace(new RegExp('('+lastQuery.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>');}catch(e){}}return s;}
function refRows(body){return esc(body).split('\n').map(line=>{const p=line.split('—');
  if(p.length>=2)return '<div class="row"><span class="k">'+p[0].trim()+'</span> — '+p.slice(1).join('—').trim()+'</div>';
  return '<div class="row">'+line+'</div>';}).join('');}
function stateChip(n){const st=prog[n];
  if(st==="known")return '<span class="state-dot state-known">✓ known</span>';
  if(st==="review")return '<span class="state-dot state-review">↻ review</span>';
  return '<span class="num">new</span>';}
function cardHTML(c,vp,vt){
  const bc=c.difficulty==="REFERENCE"?"badge REF":"badge"; let back;
  if(c.type==="reference"){
    back='<div class="back face"><div class="meta"><span class="section">'+esc(c.section)+'</span><span class="'+bc+'">REFERENCE</span></div>'+
      '<div class="scroll"><div class="title">'+hl(c.title)+'</div><div class="refbody">'+refRows(c.body)+'</div></div></div>';
  } else {
    back='<div class="back face"><div class="meta"><span class="section">'+esc(c.section)+'</span><span class="'+bc+'">'+esc(c.difficulty)+'</span></div>'+
      '<div class="scroll"><div class="title">'+hl(c.title)+'</div><div class="label">What it is</div><div class="body">'+esc(c.whatItIs)+'</div>'+
      '<div class="label">Example</div><div class="body">'+esc(c.example)+'</div></div></div>';
  }
  const front='<div class="front face"><div class="meta"><span class="section">'+esc(c.section)+'</span><span class="'+bc+'">'+esc(c.difficulty)+'</span></div>'+
    '<div class="title">'+hl(c.title)+'</div><div class="meta">'+stateChip(c.n)+
    '<span class="num">'+(c.type==="reference"?("#"+c.n):("Card "+c.cardNo))+' · '+vp+'/'+vt+'</span></div>'+
    '<div class="hint">tap to flip · swipe ✓ / ✗</div></div>';
  return '<div class="inner">'+front+back+'</div><div class="stamp know">GOT IT</div><div class="stamp dont">REVIEW</div>';
}

let cardEl=null;
function render(){
  const deck=$("deck"); deck.innerHTML=""; updateStats(); saveResume();
  $("undoBtn").disabled=!lastAction;
  const total=order.length;
  if(total===0||pos>=total){ $("empty").style.display="flex";
    $("emptyMsg").textContent= total===0?"No cards in this pile/section.":
      "You've gone through all "+total+" cards here. Swipe again or pick another pile.";
    cardEl=null; return; }
  $("empty").style.display="none";
  const c=CARDS[order[pos]];
  const el=document.createElement("div"); el.className="card"; el.innerHTML=cardHTML(c,pos+1,total);
  deck.appendChild(el); cardEl=el; attachGestures(el);
  $("statPos").textContent=(pos+1)+" / "+total;
}
function counts(){const sec=baseSeq.filter(inSection);let nNew=0,nRev=0,nKnown=0;
  sec.forEach(i=>{const st=prog[CARDS[i].n];if(st==="known")nKnown++;else if(st==="review")nRev++;else nNew++;});
  return {all:sec.length,nNew,nRev,nKnown};}
function updateStats(){const k=counts();
  $("cAll").textContent=k.all; $("cNew").textContent=k.nNew; $("cReview").textContent=k.nRev; $("cKnown").textContent=k.nKnown;
  $("barFill").style.width=(k.all?Math.round(k.nKnown/k.all*100):0)+"%";
  $("statMastered").textContent="Mastered "+k.nKnown+" / "+k.all;}

function flip(){if(cardEl)cardEl.classList.toggle("flipped");}
function windowW(){return Math.max(window.innerWidth,360);}
function decide(gotIt){
  if(!cardEl)return; const c=CARDS[order[pos]];
  lastAction={n:c.n,prev:prog[c.n],sectionFilter,pile,pos};
  prog[c.n]=gotIt?"known":"review"; saveProg();
  const dir=gotIt?1:-1;
  cardEl.style.transition="transform .35s ease, opacity .35s ease";
  cardEl.style.transform="translateX("+(dir*windowW()*1.2)+"px) rotate("+(dir*18)+"deg)"; cardEl.style.opacity="0";
  toast(gotIt?"✓ Got it":"↻ Marked for review");
  setTimeout(()=>{buildOrder(); if(pile==="ALL")pos++; if(pos>order.length)pos=order.length; render();},280);
}
function undo(){
  if(!lastAction)return; const a=lastAction;
  if(a.prev===undefined)delete prog[a.n];else prog[a.n]=a.prev; saveProg();
  sectionFilter=a.sectionFilter; pile=a.pile;
  $("sectionSel").value=sectionFilter==="ALL"?"ALL":encodeURIComponent(sectionFilter);
  [...document.querySelectorAll('.pill')].forEach(p=>p.classList.toggle('active',p.dataset.pile===pile));
  buildOrder(); pos=Math.min(a.pos,Math.max(0,order.length-1)); lastAction=null; render(); toast("↶ Undone");
}
function attachGestures(el){
  let sx=0,sy=0,dx=0,dy=0,dragging=false,moved=false;
  const know=el.querySelector('.stamp.know'),dont=el.querySelector('.stamp.dont');
  el.addEventListener('pointerdown',e=>{dragging=true;moved=false;sx=e.clientX;sy=e.clientY;el.style.transition='none';});
  el.addEventListener('pointermove',e=>{if(!dragging)return;dx=e.clientX-sx;dy=e.clientY-sy;
    if(Math.abs(dx)>6||Math.abs(dy)>6)moved=true;
    if(Math.abs(dx)>Math.abs(dy)){el.style.transform='translate('+dx+'px,'+(dy*0.2)+'px) rotate('+(dx*0.05)+'deg)';
      know.style.opacity=Math.max(0,Math.min(1,dx/120));dont.style.opacity=Math.max(0,Math.min(1,-dx/120));}});
  function end(){if(!dragging)return;dragging=false;
    if(Math.abs(dx)>110&&Math.abs(dx)>Math.abs(dy)){decide(dx>0);return;}
    el.style.transition='transform .25s ease';el.style.transform='';know.style.opacity=0;dont.style.opacity=0;
    if(!moved)flip();}
  el.addEventListener('pointerup',end); el.addEventListener('pointercancel',end);
}
let toastT; function toast(msg){const t=$("toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),1100);}
function search(){
  const q=$("searchInput").value.trim(); if(!q){lastQuery="";return;}
  if(/^\d+$/.test(q)){const v=parseInt(q,10);lastQuery="";
    let t=order.findIndex(i=>CARDS[i].cardNo===v); if(t<0)t=order.findIndex(i=>CARDS[i].n===v);
    if(t<0){toast("No card #"+v+" in this view");return;} pos=t; render(); return;}
  const ql=q.toLowerCase();
  const matches=order.map((i,idx)=>({idx,i})).filter(o=>{const c=CARDS[o.i];
    return (c.title+' '+c.section+' '+(c.whatItIs||'')+' '+(c.body||'')).toLowerCase().includes(ql);});
  if(matches.length===0){toast('No match for "'+q+'"');return;}
  if(q!==lastQuery)lastMatchPos=-1; lastQuery=q; lastMatchPos=(lastMatchPos+1)%matches.length;
  pos=matches[lastMatchPos].idx; render(); toast('Match '+(lastMatchPos+1)+' of '+matches.length);
}
$("yesBtn").onclick=()=>decide(true); $("noBtn").onclick=()=>decide(false);
$("flipBtn").onclick=flip; $("undoBtn").onclick=undo; $("goBtn").onclick=search;
$("searchInput").addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();search();}});
$("shuffleBtn").onclick=()=>{shuffle();pos=0;buildOrder();render();toast("Shuffled");};
$("restartBtn").onclick=()=>{pos=0;render();};
document.addEventListener("keydown",e=>{if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT")return;
  if(e.key==="ArrowRight")decide(true); else if(e.key==="ArrowLeft")decide(false);
  else if(e.key==="z"||e.key==="Z")undo();
  else if(e.key===" "||e.key==="ArrowUp"||e.key==="ArrowDown"){e.preventDefault();flip();}});
[...document.querySelectorAll('.pill')].forEach(p=>p.classList.toggle('active',p.dataset.pile===pile));
buildOrder(); render();
</script>
</body>
</html>
